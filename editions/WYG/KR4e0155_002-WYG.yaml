body:
  text: 清惠集巻二明劉麟撰詩七言律詩頒朔待漏一統車書又紀年爉燈燒夜對風煙畨畨月令迎新候剪剪春風向曉天玉律總頒皇帝朔金蓮嘗賜近臣筵共期膏澤為民下莫漫心煎感嵗遷已丑科殿試閲巻宫闕東偏紫閣西九官分局主恩齊明明撫運收才俊穆穆臨文自品題手詔日中垂藻鑒御書時暝散雲霓安車打伴南宫宿中使宵傳有御批天夀山公幹二首風雨驅車出禁城侍臣辭印暫經營壯逰兄弟今誰健老去君臣自有情千古威靈如日近九霄香火與雲平椒房七載恩多少漫别君王向此行其二鶴袍病骨兼山役禱祭䖍誠欲代天雨過紅門千嶂出雲歸玉殿九龍眠誅茅闢土憐今日短栢新松擬萬年聖夀無疆仙馭逺老臣垂涕洒寒泉分獻北海氤氲佳氣布遥空肅穆皇禋仰帝宫夕駕鯤鵬珠斗外夜交溟渤彩雲中幽都宅潤歸神貺𤣥象無波識聖功赫赫司徒時並入曲陽飛石泰壇東顧華玉謫官全州二首暫屈髙賢論未平召歸行見聖明心共憐此夜參辰散獨向殊方瘴癘生衡嶽長沙才子路澧蘭沅沚故人情中州父老憂何劇墮淚甘棠有頌聲其二逺道新恩意若何到州惟有桂婆娑氣還光岳完名少天晩才賢謫宦多心逐鴈書廻嶺路香分蘭佩隔湘波千年屈賈真知已尚想摛詞獨酹過恒陽餞喬白巖二首斗柄濳移忽指西蒼凉呈影衆星稀古雲殘栁知誰緑閑苑流鶯轉自啼日日風雷聞偃稼湯湯霖潦惜沾衣當年太華峰頭路應與圖南訂此歸其二雨昏書劍對秋㸔衢路㝠㝠生晝寒時羡叔孫終制禮人榮疏傅早辭官交深不謂離羣易才大惟憂用世難一笑浮圖髙處别此中猶可望長安寄李古冲太宰冋寺論文氣獨雄真才端擬亮天工金淵刻燭春翻蝶苕水傳觴秋轉蓬展氏道昭三黜後劉楨今在九人中武夷髙並神仙宅謝屐張槎好過從夀文衡山人日衝泥獻夀巵追惟舊學老吾師際天丘壑聊揮翰滿目風雲盡入詩淇澳青青歌竹後渭川瀰瀰得魚時仁明見説東朝出何事商山久茹芝題許栁溪太守巻經書萬巻世生香曵履星辰總雁行列㦸門牆猶謹厚一麾江漢自循良天垂湛露恩難並風繼甘棠業有光誰繪栁溪溪上栁映空膏雨似鄖陽春日道中賤買魚鰕換酒嘗溧陽風物似丹陽踈林細雨開精舍古岸驚飈遲短航滿飣盤飡逢野老久張衾枕住他鄉搴帷逺憶西溪叟愁見春鴻有斷行開新社揺曵舟車上國來歡逰不許鬂絲催湖心夜月思君並巖畔春花逐我廻醉有狂歌書草木閒尋徃事掃莓苔江城别社收耆舊轉眼湖南有棄才卜里人日驅車向溧陽尋幽擇里静中忙官無苛政民風古國許蠲租帝澤長星駕獨廻鳬鴈曲釣臺遥亘水雲鄉鴟夷老去難匏繫鰕莱閒情伴野航送周司寇野寺淹流雪滿枝錦帆何意厭春遲千年神劍知離恨一夕寒燈長鬂絲卿月乍臨南極上法星常照楚江湄更攜經笥翩翩去碧草溪連處處隨夢岱屏崔京山尋君不似夢君頻永夜添香飬道真下榻論文光烱烱升朝對面禮循循腰横卞玉輕於葉手挽呉鈎絶有神一咏百篇星漢落虚懐猶避太常人僧慧過訪泠泠碧潤轉林霏旭日諸峯散逺輝小立暗香常襲履緩行空翠欲沾衣髙僧偶過分餘静鄉使遥傳訝久違門有扁舟從箬下清酣長望兩鳬歸峴山社燕峴山能醉即香山蔗境誰人識最閑冉冉慈雲生海屋霏霏紫氣隱禪闗千年好事同聲應九老眞風一咲還寄語元豐諸將相有人圖入㑹昌間與蔣石菴病入新年較轉多光廻腐草竟如何尊踰九老終當避義重三生强一過露浥金莖人盡醉春融玉燭鳥齊歌雍容宫保天垂眷八袠揮毫鬂未皤與陸玉厓古來明哲重先幾伯玉空知徃嵗非夜月輝輝開李酌秋風瑟瑟洒陶衣滄桑只在身前變松菊真從夢裏歸最憶與君為别處烹羔送酒説漁磯詠喬桂醉捻髙枝當酒籌少年折此比仙逰今抛世事死前死不向人間求所求枝葉盡除皆實地髙明漸近是吾樓誰云月窟無門逕短夢能棲最上頭登觀海樓乘桴老去笑無功莫以周流歎道窮六街車馬浮烟外千里鳶魚一鏡中攬勝欲呼今夜月憑虚時遡古人風報君此去蓬萊路况復朝宗盡向東平望舟中鷹脰湖邉送客歸剛談今是又全非鳳凰枝上披雲錦牛斗聲中賦短衣韓幹慣傳神駿骨嚴陵不下老漁磯獨憐殊勝僧無事載筆牽裳過虎溪和蔣石菴司空社韻風情常繫白鷗堤時序頻驚紫燕泥造物無情人自改山靈有相道盟齊都將健體酬佳句合把深盃酹此溪一笑幾時頭轉白煩君莫負手中藜次白巖山巾韻古製新傳手自裁滿頭瀟散㸔雲來欹如孟老元宜菊折似林宗不受埃鳬履有情從此狎鷗機慣見不相猜皤然洛社羣公裏黑髮髙簪共草萊同白巖逰蒼巖二首直窮幽勝幾人來兩壁齊雲繡若堆丹堊横空飛閣起螭龍擎日梵宫廻僧棲石罅頭顱易花散珠林眼界開方外閑居為第一掃煙時卧説經臺其二巖隂鐡􅐟度行雲天樂真從上界聞絶澗俯㸔雲起處危梁倒跨石中分醉磨蒼蘚留題遍静倚青松彌葢勤五十年來方一到可教三宿又離羣聞征都勻諷曹中丞都勻雖固且休征國有訏謨不在兵入井祗須憐赤子開疆何以及蒼生古稱干羽還能格近用覊縻亦暫寧我憶麟臺趙充國屯田千載有餘名恭遇册立中宫王教開端萬古傳厚哉坤軸上承天洽陽渭涘祥何定豐水岐山數已先荇莱入歌風穆穆雎鳩有象興翩翩因憐至聖刑于化須和周南第一篇甲辰春社曵履晨征試越羅芳園踐約正春和琴心迭奏臨幽澗酒意微醺上曲阿張弛總闗吾道在風情未必古人多堯天蕩蕩渾無事擊壤相將起浩歌送龍致時回金陵山館梅開又落花歸心日日渡江沙孤舟悵望平湖盡尊酒流連春日斜與子共分清澗水幾時還入白雲家好知學道須凝静莫漫都城戀物華湖上晩渡老興翩翩只自由皇天賜得五湖舟花開酒美不一醉水滿月明常獨逰處處登樓頻弔古年年垂釣儘銷憂有時鼾睡乘流去夜度香山蘆荻洲投閒春船載酒隨鷗去曲曲陂塘草自生棹拂浪花迷逺近忩迎雲月問隂晴常收藥物年年健早蛻塵纓事事輕一上神樓愁更下始知閒處有勲名植江蓮谷口春泉一鏡開深深逕路接層臺幽棲謝客常無事老興㸔雲只自來欲著方書酬白髪好將生理付青鞋多君為我沉疴計玉井芙蓉願早偕李民育誕日鬱葱佳氣抱層臺竹裏賔筵取次開隔座笙簧縁㟁起倚天屏障入簾來逡廵送酒客拚醉頃刻能花仙有才㑹報赤城丹訣獻光垂南極在霞杯聞京師建社二首京國誰開社約新乾坤一脉繫情親盡登耆舊歸仁里莫遣風流落後塵草草盤飡從古俗班班圖史總天眞春筵朗月通南極常照江城鶴髮人其二古俗淳龎百好空我來開社少人同春來耕鑿王民後老去衣冠聖澤中翻咲鄉音咻衆楚却沽村酒似新豐月明烏雀橋邉路照見柴車鶴髮翁與西溪甘泉聨句三首幽談不盡坐寒宵懶性真能逺市朝卧向好山猶是夢飲從鄰叟不須招燈前白髪人俱健身外浮名念已銷他日里中還結社一溪風月醉蘭苕其二折竹聲頻夜已沉夢寒應繞玉山岑溪容隔嵗將移棹草色逢春映盍簪雨暗細評髙士傳地深時見古人心明朝更有南池約吟對梅花思轉深其三隔簾風絮正漫漫㸃壑穿巖好醉㸔冷色映貂秦嶺上凍雲浮檻越溪寒低廻玉女凝粧素偃蹇山翁得句難咲索梅花轉墟曲杳然清夢落江千寄白巖太宰蒼巖髙處少人行宦不為家去住輕病後形骸皆長物老前丘壑有餘榮即㸔彩鷁浮星漢不用朱旗揷斗城寄語早朝鐘鼔客北忩紅日正希昇李民育别號有竹灑灑新梢正倚空嵗寒門巷幾家同清隂不斷三湘雨浄色長含萬里風欲借勁枝為椽筆更裁髙節製漁筒狂來直造非無為㸔竹何須問主翁夀張水南學士憶昔論文傍紫微碧桐丹棘共菲菲青宫進講恩常並玉殿含香願不違道在師儒身漸達人歸啟沃事全稀遥瞻夀域開天闕却詫文星在近畿孫太白苕溪草堂歸藏卜築向澄潭鷗鷺初盟亦未寒硯墨洗雲沉静影釣絲垂月亂文湍風前逺嘯應輕阮雪裏深居不愧安有約過來東望劇少微騰彩動秋巒與呉甘泉登董㠗絶頂山當天半氣全清影入湖波覺世輕足下過雲應縹緲此中㸔月更分明狂來欲賦傾才思醉後重登是性情却向歸樵時訊問轉疑深麓可逃名題画黄石赤松師授遲夢中牽引住茅茨充閭又識曾孫面賜杖仍過八袠期陶令真陶惟任酒放翁能放不縁詩含情欲問磻溪叟斷送仙凡一釣絲夢得九十晨起常先夜卧遲曾無晝寢亦無詩痴頑正合𤣥虚妙辛苦都非利禄時天上歸來無鶴伴谷中剰住有僧知百年本是囊中物只以狥名損一朞南野堂用韻似陸柱史髙誼如君逈不鄰晩於夷險見情真當臺持簡久無與滿閣著書還幾人共引江湖懐徃日獨分花鳥向青春更嗟堯舜方圖理却使山中有逸民留别孫太初二首住本無心去亦輕江湖深處更逃名水能廻棹如多恨山不留君空自清細草長松收健句夕陽朝雨對離情雲鴻未隔人間路應報紅顔羽翼成其二夕燈蛩語上空堂門外芙蓉繫野航髙興逐雲先到寺離心入雁不成行黄花伴客年年雨短髩彫秋夜夜霜岐路無情人自逺酌中戎馬過重陽九日初日輕煙隱薜蘿轉疑詩句在山阿道人不上青峰久黄葉忽隨霜髩多獨把菊杯迎物候故偏風㡌起髙歌川源浄好能無雨如此重陽一謾過喜聞古冲赴召兼訂殊勝寺之約明王𤣥攬與天通論相超然邁古風望惬羣心臨翥鳳情深共語屬㝠鴻最親東出新迎日不改商巖舊夢中官府神仙恒斷絶言詩何地可追從静虚院再集麥田鋪翠寺門開行盡松筠上佛堦壺觴擇勝人人醉香火逢僧事事佳豪吟漸覺隨年薄僻性終難與俗諧春雷漸覺時驚聼猶有風雲感舊懐同李半溪春社山亭共酌卧莓苔燈市纔收花又開皓首屢承同社約青氊猶記隔江來􅅨翁抱道真空世白也言詩獨擅才欲把漁竿銷蔗影中阿堂畔有髙臺空明樓望中樓觀倚天開老恊山林勝事催檻外風雲扶雨過梁間日月近人來幽尋出世延諸佛逸興辭家近五臺已卜吾身有仙骨青牙殘醉斗邊廻五言排律答李半溪丹竈非真訣青蚨豈壯圖逺心辭里巷清興落江湖世網浮雲隔庭幃衆美俱綵服迎詞客華筵走静姝素侯天富貴黄髪日懽娯有子輕千乘知翁壓萬夫贈顧華玉彪炳得之子鬱然滄海精詞華追徃哲道範廸羣英雄章時倚馬聲價日連城簪組已文鐸鉛丹仍短擎郡借董孤筆鄉歸李劭評鞚發真千里籠收擅八瓊偶遭傾蓋語遂辱斷金盟載酒論竒字題銘謝大烹移舟乘月曙揮麈坐參横幕巻霏微雨燈挑長短更一夕持衡去三秋薦剡成感時精鑒别慎職盡才名燕集歸無幾鶯遷去有程能將此别意播入古人聲慷慨上世訓徘徊知已情椽笛隨歌咽匏樽雜淚傾籍籍今安定翩翩老向平清歡苦未足逺道本難輕自合酬天子何因變友生惟余儆義範垂死獨牽縈五言絶句春日紅稀天有情綠暗春無興逰子雨中眠夢裏年光盡㸔月滿月昔未滿清輝常恨誰請㸔虧欲盡正是有情時賔旭堂述懶騎馬不如昔尋僧怯上船山中農務息懐抱白雲眠病中答饋藥二首坐室延師易登城取藥難感君傳遞至蹴踏試尋山其二肺病經冬苦仙丹此日傳若能安枕卧徐問董公年過王履吉墓二首嵗序嚴凝日仙踪斷隔時荒途無古劍髙塚有新枝其二壯嵗同逰地今晨獨到時夜臺無健筆殘菊有空枝題秋江􅂱􅂱有竒色紫雲無數新含咀得至理終屬商山人寄故人蒲葦三秋𣺌雲霞一鴈鳴片帆江海夢無限别離情種花二首好事今餘幾頻年不在家老興層臺上擔燈夜種花其二舊土新鋪石登臨日幾回若逢雙足老與我㸔花開七言絶句龍津門徑二首潭水澄清静裏心紫雲常護紫姑神耽逰誰似文夫子肖出丹丘贈與人其二終嵗尋真未得真歸舟猶幸及殘春吾家玉女潭如玉入谷通天自隔塵寓上興莊蒼蒼原野思依依咫尺茅峰東與西空齋養性無人共午夜時聞雞一啼有竹山居二首懶殘吟眺過春時芳恨猶傳石上詩天遣風雲常愛䕶莫教磨滅共花枝其二佳城寂寂長莓苔縱我臨觀日幾廻千載松楸人共老飛鳬常向月中來寄聞一山二詠排山風雨正懐人阻絶江舟自有神池塘春草今晨夢自插荆花滿角巾其二茅屋新營獨貯春自甘清苦作閒人一尊清醑牆頭過不用陶家漉酒巾山居二詠山空睡起鳥音稀平野虚堂萬象輝白髮翁來蒼栢下一樽徐論桔橰非其二十年山館始圍牆竹裏開門筍正長但著小車行得過不嫌春露濕衣裳懐溧尹王從喜記得空堂酌我時角巾清夜雨絲絲道機談罷雙鳬去秋草芊芊滿路岐鵝城南秋草碧於烟無數白鵝隨我船風帆乍舉驚呼散拍水過溪相對眠題明妃圖黄雲白磧戍樓空漢殿音微有鴈通纖纖殘月迢迢夢猶在昭陽女伴中山中偶成林扉過雨曉風開曲逕花香碧澗廻一巻道書尋未得山禽飛過竹梢來飛霞閣二首萬松如葢擁祥烟百尺名臺聚兩川嵗嵗春風吹杖履與君同醉玉樓前其二曉日舒情春可憐輕風吹送艶陽天泗洲堂下深盃後又醉桃花細雨前上興别墅答李空同學憲四首當年事事欲探奇老大無成只舊時卧隱空山朝倦起却囊碁子謝人詩其二坐深楊桞水邊枝似懶都忘是昔時寄得詩來如對語不知雷電滿龍池其三孤坐巖扉意若何澄清萬象合天多神明不逐諸魔散玉露光風轉至和其四玉露光風有至和道人何物竟蹉跎如顔尚恨違三月似孟還須集義多閒情道人習性似鳩偏半世無家半住船書畵捲來剛一束愁風愁雨過年年樵話軒春谷草生殘雪際石門人去夕陽時自將數數窮幽秘只恐隣牆道士知古意芙蓉易採波難渉只恐神龜住香葉月斜欹枕夢還佳道情不亂莊周蝶慨時盡瘁空悲亦罔功渭濵老子獨從容當時諸葛成何事只合終身作卧龍新築臺登翫永日登臺當一年不風不雨更忻然門無俗轍身無病何必飛昇始是僊逢僧懐𤣥黙黙向誰探小寺逢僧始一叅日暮孤舟風浪息滿蓬花雨自􅆴􅆴題廬山圖晝錦堂開醉客時蟠桃嵗嵗與山期楚人欲獻知何物㩦取匡廬到酒巵春日偶成三首日紅方是睡醒時澣濯從容出每遲簾幙乍開春正淺細吟生理上花枝其二春園無客晝常闗髙閣沉沉便見山燕子倐來還倐去有時繁語破人閒其三竹床深處晝烹茶上有長松下有花魚躍鳶飛池半畞不須重問玉皇家道養莫將朝市笑山林一刻清和抵萬金學到坐忘遺照處世間何物更闗心夜月􅅡香誰寄名香到草堂山童驚􅅡煮茶忙偶然風定月亦至一縷輕烟百尺長渡湖廣文遺韻留樗散雞犬圖書共一船自説江湖不歸事阻風中酒過年年有懐卧聼溪聲枕簟凉懐人中夜攬衣裳風雷偶作淙淙雨犬宿雞啼共一房與聞一山惜别二詠培塿槁壤藏蚯蚓寂寞寒江走蠧魚公論百年求斷案送窮文字絶交書其二君如陽鳥隨陽至興薄雲天亦苦寒極目字行中斷處月明蘆荻又江南與文衡山三首長烟樹杪見羣山過雨亭前響碧灘暮色牽情不知去喚誰來共倚欄干其二濕雲初斂見横山百道鳴泉落逺灘詩在眼中無客共興隨飛瀑逺長干其三水長平蕪兩岸齊千峰廻合樹髙低正憐虚寂存吾道莫遣時人識此溪築坦上秋風誅茅結草廬庭容旋馬地無餘面山臨水足真意與兒對忩俱讀書楊松泉水亭直窮幽勝掃莓苔竹裏虚亭向水開天上重陽且風雨飛鳬時過五湖來三月十日飲半溪家長㓜魚魚鼔枻來正愁春盡擬登臺堯夫玩易圖南睡説夢逢痴亦怪哉聞馬千里店有衡翁畫可買上有樓未贈先題夢卜乾坤第一流明王圖治説殷周商巗渭水傳真處千仭丹崖有似樓殊勝寺乍逢琴鶴碧湖來披毼匆匆夕舉杯意得乳羊扳一醉博公嘲咲下三台擬於石川舟覩北樓巻津吏傳呼太宰來米家船裏似樓開陽闗唱徹瞻辰卧南極何年接上台清惠集巻二
