body:
  text: 清惠集目録别集類五明巻一詩巻二詩巻三奏疏巻四奏疏巻五奏疏巻六奏疏巻七序記巻八碑墓誌墓表贊祭文巻九書簡巻十書簡巻十一雜著巻十二附録臣等謹案清惠集十二巻明劉麟撰麟字元瑞一字子振江西安仁人後流寓長興子孫遂隷籍焉𢎞治丙辰進士官至工部尚書初麟觀政工部時即與同年陸崑抗疏爭諫官下獄事及為紹興府知府又以忤劉瑾褫職後官尚書卒以爭蘇松織造為宦官所擠而罷葢始終介介自立者其自紹興歸也依其姻家吳珫於長興與孫一元文徵明等徃来倡和世傳徵明神樓圖即為麟作也是集凡詩二巻奏疏襍文九巻附録一巻麟曾孫􅀢陛所編萬厯丙午湖州知府無錫陳幼學刋之長興朱鳳翔為序稱其文出入秦漢詩則駸駸韋杜譽之固未免太過至稱其標格髙入雲霄胸中無一毫芥蔕故所發皆盎然天趣讀之足消鄙吝則得其實矣是亦文章闗乎人品之驗也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀清惠集序當世廟初旌别大僚御屛所書氷清玉潔者二人一為尚書劉清惠公麟一為大理卿陳公恪陳歸安人世稱矩齊先生是已劉豫章人先從安仁徙建業慕吾湖山水清逺復卜居吾邑東山之坦上因號坦翁云不佞鳯翔少時聞諸先達公杜門絶軌臺使監司守令之車轍盈門不得一見惟佳時勝日與高士吳甘泉孫太初諸公扁舟徃来菰蘆間人望之若神仙已復睹公家所藏神樓圖知公居萬山中欲搆一樓而不可得文太史徵明繪是圖以贈一時名公歌詠盈幅已復讀公所撰峴山浮碧亭碑記文最爾雅其所傳尺牘書法人間重如璣璧及索公全集大都散逸即陳大理公子方伯公應和有所摭次亦以垂槖故􅃦梓適錫山筠塘陳公來守吾郡詢及郡中典刑慨然有當于清惠公遂徵其集幸伊曾孫􅀢陛藏若干巻文則䟽鬯簡直出入秦漢詩則駸駸韋杜葢公之標格髙入雲霄胸中無一毫芥帶故所發皆盎然天趣讀之足消鄙吝恍若濯魄氷壺澄心玉井者想公之在朝耿耿大節如忤逆璫瑾首倡節慎庫等事足垂不朽守越甫五十日而百姓歌思尸祝之王學士華為去思記比之劉寵至今稽山有二劉祠公歿且五十餘年而其剛介絕塵之姿孤髙軼世之品凜凜猶有生氣筠塘陳公固公臭味公之集若有待於今日語云豐城之劍合於延津信然哉信然哉萬歴丙午秋七月既望朱鳯翔序
