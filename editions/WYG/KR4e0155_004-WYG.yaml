body:
  text: 清惠集巻四明劉麟撰奏疏推薦將官疏准兵部咨為傳奉事該司禮監太監扶安傳奉聖㫖説與兵部即今邊方多事原選團營聼征人馬着如法操練以備調用營伍官軍缺少的便上𦂳設法選補務要充實將官已經推舉不係見任的便行文取來聼用在京在外軍職有謀出衆可備征戰的還着兩京九卿科道官及撫按官從公具名推薦你部裏再加訪察奏請取來以備緩急之用但不可狥私濫舉欽此欽遵備咨到臣訪得分守保定地方副總兵官左軍都督府都督僉事楊鋭器度忠醇而不悍不渝韜畧優長而有為有守昔在安慶戮力討賊繕城浚井逆覩㺄吞之變破艦焚樓首挫烏合之鋒今守保定推食解衣傾赤心於軍士訓射辭田振清譽於屬僚况先是忠邪一疏士論相髙而迄今歌頌同聲賢名益著似兹武臣可謂内竭謀猷而外消禍亂隨試皆有成効者也然保定乃畿輔重地南連諸郡北接三闗在鋭領之必謂踰于涯分而總兵專職鎭守重權以鋭充之終當大有作為况前任廵撫都御史周季鳳夙嘗論薦不謂寢閣至今假令本官精力坐銷其於人材不無可惜如䝉乞勅兵部再加訪察果若臣言早為陞用或以保定地方之重更代茍難其人亦必查鋭勞績量議階勲改加服色責令分守行事照舊如此則輿論獲平臣工攸勸其為鋭者必將借前筯以報稱之餘而作長城於聖明之下矣積榖預備倉糧以賑民疏直𨽻廣平府知府蔣彬申據冀州武邑縣知縣王紀議稱本縣秋糧原額每年該二千八百餘石三年共訃七千餘石小民輸納不前甚至賣産鬻子若限三年之内積榖有三萬餘石揆之事勢實難舉行乞要寛減立為成法一節為照積榖一事天下大命所闗古者三年耕餘一年之食九年耕餘三年之食經國大計何以加此但地有南北産有肥瘠民有多寡誠有如王紀之所論者焉合無俯從本官所請具奏量為寛減或將在庫一應贜罰變賣銀兩糴榖上倉一則以備荒歉一則以通仕路惟復别有定奪等因具申到案又據武邑縣申准本府帖文備奉廵撫劉都御史案驗該吏部題奉聖㫖這行取各官還要歷俸三年以上知縣仍著撫按官查考任内照例積糓及數的方許起送欽此欽遵續該吏部覆題積榖事例户部議行未久將今次行取官員暫照舊規起送奏奉欽依准行外為照儲積大計方今風憲缺官取用之日天語丁寧垂念如此又云及數方許起送其綜覈名實之嚴思患預防之意可謂至切至重若非吏部用人之急再為寛請則各官皆難起送惰慢既彰遷除無望豈不靡然自棄雖有他美亦無以自贖也見今任淺未䝉行取官員可不各思其事及此閒暇勤政受詞多方區畫不訃私囊毎存國計片紙一錢俱為儲積損豪右之利抑緇黄之濫作奸者繩之犯科者繩之務使倉有餘粟民有所天災生則發賑以安人心盗起則足食以安兵訃陞遷則起送不留行取則考查無碍不惟公私有頼而上下亦交盡矣如不率從本院臨期亦行題請不容起程雖廷議急於用人而虚名無實之人亦難擢用慮恐各官因循誤事再此申明務須勉修職業毋貽後憂為此仰各府當該官吏俱查照節奉勅諭并近奉欽依内事理原行所屬各官務要照例積榖聼候本院委官查盤不許虚文抵飾以舊作新以無為有索民領狀冐作放支攪和糠粃以為實數一應弊端俱不准理仍題問罪即行罷黜又有地瘠民貧極災去處備由申來但不許一槩謬申惹咎抄案依准差該吏賫繳奉此案照先奉本府帖文為勅諭事節奉廵撫劉都御史案驗前事行令照數積榖已經遵行外今奉前因安敢玩視自取罪譴為照今議定積糧之數雖江南膏腴之地嵗嵗豐登猶或難完况江北以來地利不同若不分别等第一槩取盈竊恐徒為張急難收後効兹以武邑一縣言之原額二十五里三年扣該三萬通計一縣丁口三萬有餘毎年秋糧止該二千五百餘石總計三年不過七千有餘葢亦盡一縣丁口所輸僅得如此之數輸納不全中間鬻男賣女者已不能無若三萬措置又不能出此丁口之外且措置見行之法多在詞訟之門使人人皆訟然亦有貧富不同富者尚可貧者何堪豈能使其一一如法不恤其貧而必欲罰贖以充其數縱使不恤至於蕩産流移而復賑之是科之使貧而行吾惠也似非積榖本意且守令賢愚不能奉行偏駁不一竊恐令嚴事急衰懦者將引退以避責貪饕者或假此以營私急于功以圖進用者皆將不顧民命而刻意料理鼔舞好尚之間追徵逼廹之下安保不至於他虞如逆瑾之時徵求太急而山東河南之寇一時蠭起皆其所激征討勦捕之費與措置之入其利孰多事勢或致如此本欲濟民而反病民本欲彌變而反致變於此必有稱停損益之法可也若此數不足陞遷不得離任行取不得起送繼是任者亦不能神運鬼輸以足其數亦惟甘坐罷去耳為今之計必分别南北計嵗豐㓙量減分數立為成法其罪人紙米悉令納糓上倉不許折收輕價以圖侵漁贜罰銀錢及變賣贜物隨時變賣議糴不許久貯以致花費如此則倉廪雖未充盈而有司猶有善政生民之福社稷之福也為此合闗本縣煩為轉達裁處等因備闗到縣具申到臣已經牌仰本官議處囘報去後今據前因惟國以民為本百姓以食為天經制之大儲蓄為上故將欲安民者必先積糓但百里之外風氣頓殊而物之不齊物之情也今使九州一律勢豈能同若北方郡縣毎里必取一千五百之數十里百里以數而推地至百里糧至一十五萬北方里社戸口幾何生産幾何常賦㡬何詞訟幾何是就其耕桑所入盡數取之不足以充前數即以武邑一縣言之原額二十五里三年例該積糓二萬五千常出常賦三年不過七千餘石今欲至二萬五千則是額外巧取倍於常賦數多其他州縣亦多類此况是以十年為率災傷俱半又勢有所不能行者積穀惟詞訟一事其言為正但有力者少無力者多近有事例雖有力亦減若令事事輸榖人人贖罪則貧者死於縲絏猾者逃於異鄉本欲積糧而其源反塞非計之得此外又有勸諭一途不過望門横索未免濫及無辜加以官貪吏弊其害不可勝言昔也止於貧者不安今也富者亦無不病尤為失計縱使用刑勸諭一切不顧而見行之數太多亦恐未足本官有見於此所以闗申詳切揆之事勢委有不能若謂成命已下不敢違阻而大勢相懸難於責効循良者累嵗不遷横斂者胥䜛致慝蓄積未盈本根先瘁國家一舉而理財用人之道皆廢誠可憂也為今之計必須俯鑒北方地瘠民貧將前項積糓之數或照所辦秋糧以為嬴縮又視災傷輕重以為行止十里以下議積糧一萬五千石改積若干二十里三十里以至七百里八百里俱各以秋糧為則照前遞減如每嵗納糧千石者止可令其積榖九百石八百石秋糧萬石令其積榖九千石八千石而百十皆然又不及數方照前議夫復何詞中間又有水旱蟲荒兩收無望仍與官民分豁小饑則發銀逺糴大饑則開倉議賑不必更拘前數以恤貧民其應否分豁即照奏勘災傷以為分數如此則事有本末政有差等官才民力經久可行再查直𨽻保定六府見今數年水旱相仍而大奸大盗縦横之後民之憔悴其在北方尤為特甚欲議積榖如數必須仍待豐年見今勅㫖已布雖竭力奉行不過理刑贖罪盤驗賠補常行之數安能便有厚積惟是廵撫以來禁約諸司不敢擅興工作裁抑浮費月稽季考一錢寸帛囊括在公除起運糧站等項額例不敢輕重者聼其轉解外其餘百計清查但有贏餘上倉入庫一一查盤封號計今所積除已經放賑開除不算外見在倉糧共四十六萬五千九百七十三石有零自廵撫以後日月所積約有二十萬餘石銀兩亦除放賑修倉修庫等項開除不算外見在鞘封及新收未曾入鞘一應可以糴榖官銀通計共該銀十萬一千五十餘兩遵照勅㫖就其區畫救時之意莫如議糴雖前項銀數不多而費不煩公斂不動衆損上益下計出政平中熟而糴擇地而行擇户而授毎銀一兩糴糓三石每一上中人戸領銀不過三十兩糴糓不過百石或者以為價減斗增比之望門勸罰不為無故即使榖價稍貴斗石稍增每銀一兩所增三斗六斗有事而發悉以為民不為太甚但前項銀兩儲積一方命脉全在於此括索之煩怨有所集今欲倒囊動支誠非細故况此本六府掌印各官經收就令支銷出入一人之手必致事久難明合無勅下户部選差公正主事一員親詣各府望秋糴買督率各該官吏搶揚播晒潔浄乾圓仍預先定擬何處地僻有糧儲糓宜少何處地衝糧少儲糓宜多斟酌分派已定倉厫已修者如法鋪墊未修者一面完修若厫座不彀亦許量為增盖臣已預先行屬整理未盡其修倉糴糧地方亷幹官員俱聼本官從宜定委奸貪誤事者悉聼拘提參䆒臣亦多方覺察從公區處事完之日將支過銀兩糴過糧數通行造冊回奏不足之數許待豐年仍將舊積糧數通行查盤另厫收貯仍將新買舊積糧數分别明白置立木牌書記各厫之上以便查考其盤驗若侵欺短少悉聼本官拏䆒追賠如此則任土立法政有可經以義制利官有定守理財用人之道一舉而兩得矣分别情罪早賜發落以安地方疏按直𨽻順徳府内丘縣申稱本年七月二十八日䝉錦衣衛官校前去順徳府將知府羅玉邢臺縣署印大名府魏縣知縣王芳典史驛遞等官通行捉拏口稱奉有聖㫖未委虚的仍徃大名府去訖次月初三日大名府禀報兵備副使劉秉監被拏與内丘所禀相同案查先據副使劉秉監呈稱本年五月内前去順徳府公幹住宿察院本月二十四日公事已完欲囬大名府隨據該府龍岡驛禀稱有經過賴太監將到本職當令夫役搬運巻箱起行間忽有跟隨本官家人賴宗等騎馬從中門直入職衙門稱説甚麽兵備管着我等語職當將守門人役責治及將賴宗等戒諭就被各兇仍騎馬匹由中路前去架揑不知何等虚詞禀報太監賴義就被本官帶領賴宗等前來職衙門揪採凌辱詆罵之言至不忍聞職據理與論本官理屈詞窮稱説職不行廻避等因具呈到院㑹同廵按監察御史王鈞看得太監賴義等奉迎恭穆獻皇帝神主竭力奔馳日行常至三百餘里地方自有公幹以來未聞人衆速行如此電掣風飛官吏誠有不能前知而預待者方其始去也倐忽即至姓名不通是以兵備副使劉秉監迎候不及至入相見劉秉監既不廻避又復喧攘則罪豈可辭今彼各執一詞其事之有無聖明必能洞察臣等又復何言若奉迎既還之時臣等俱到地方叅候行禮别無違誤且臨近順徳府治沙河水漲神輿前渡官吏後行水勢驟增洶湧可畏因而阻隔然而僅差數刻之間追從不及人所共知是日各官隨即趨至内丘縣公同行禮亦是順徳境内地方中間如署印官魏縣知縣王芳部夫撥馬又在各官之後力所難及且居官平素公勤幹辦臣等選委在彼協助辦事誠有自取况不係邢臺縣的確正官前次賴義經過之時王芳又在原縣管事並無失禮今一旦誤遭逮繫其情不無可憫又切惟聖孝純篤奉迎之舉恨不親御六飛以申至敬顧乃託之義等戒以遄行惻隱可知今聞官吏有所違忤豈不赫然震怒以為大罪殊不知一義不合而百禮不成水患人情並成乖異地方之不幸耳夫馳驟太速人不及知䟦渉既難禮行不及此劉秉監羅玉所以小失而大廢也陛下仁聖天髙聼逺豈能䆒極細微各官事情本只如此何足深治臣等待罪撫按提挈綱維實膺重寄盛禮遄行而戒飭不嚴大水驟至而區處無術以致激怒近臣煩黷天聼烏得無罪亟欲罷黜庶足以為地方誤事之戒其為署印官王芳委的因人連累罪不由已伏希皇上宥而釋之以昭平明之度其劉秉監羅玊麤鄙忿厲相應推問但近日大同地方戕殺重臣軍情内叛山西與直𨽻壤地相連若冇奔潰旦夕可至易州兵備既已誤撤大名兵備又復拏觧則防守𦂳闗之處一切無人事機如此誠可寒心况副使劉秉監久寄兵民操守如法剿捕劇盗戰陣有功羅玊政拙心公民今愛戴俱係𦂳要應用官員亦乞勅下問官早與歸結責令囬任保障地方雖有急變猶為可及如此則聼徳惟聰綱維允賴而情法亦協於中矣乞恩休致疏臣係南京廣洋術官籍江西饒州府安仁縣人由進士歴官八任二十九年以至今職嘉靖二年二月二十日本院到任次月二十五日前到地方行事不料嘉靖三年正月以來得患脾胃虚瘵之症日就尫羸調理不復見今狼狽不能供職切思臣本草茅逺沐列聖陶鎔之徳近承陛下收用之仁叨享禄位不為不久于兹每欲竭智盡心圖惟報稱但臣識淺才凡身孱病劇空懐海嶽莫効涓埃是以日夜憂慙汗常沾背盖心有餘而力不逮也臣正徳年間久病在家本已不能供事及至仰承收用則已衰憊不支但陛下膺天繼統世際亨嘉當此風虎雲龍之㑹聖作物覩之時奔走疏附孰無是心故微臣受命懽忻踊躍止足之戒不勝其向徃之誠又熱中而妄進也黽勉從事殆將三年新政異恩躬逢其盛臣於此時妄擬頽齡或成强健亦將僥倖以副初心豈期量滿災生形枯氣竭時雖際遇命已衰殘耳目雖存視聼非舊强聞則眩强視則昏實奄奄垂盡而藥久無功也本欲觀風而身轉畏風本欲强食而食不稱事惻惻可哀將一朝僵仆而竟以貪得鮮終也嗟乎人臣事君進禮退義然而病瘁栖栖顧戀不去禮義之正固如是乎縱欲自留如曠廢何今臣藥餌自隨遷延僻縣一月之間多半閉門茍惟尸素猶之可也萬一貽患罪將何如今來撫屬地方二麥連天三闗無警是以臣雖抱病幸無誤事知止乞骸此其時也伏乞聖明憐臣新衰查臣舊病放歸田里使終餘年不勝仰感天恩之至臣又伏望陛下愼選賢能代臣廵撫俾之訓兵養民以佐太平之治是臣之退非直茍利臣身而已也仰乞天恩懇求休致疏臣南京廣洋衞千戸官籍江西饒州府安仁縣人臣頃因患病誤事備將遷除履歷並患病乞休緣由具本令家人劉亨齎赴通政司奏奉聖㫖劉麟素有才望着用心廵撫地方不准辭吏部知道欽此欽遵備咨到臣臣聞命之日感愧交至臨藥涕零夫狗馬已不堪驅逐而天地猶垂豢飬之恩其在人臣豈不勉圖報稱奈何微臣志願無窮而命分有限自前始奏以至於今前後二十餘日形容益减引歩益難皮骨空存神精非故未論生還何以供事况畿輔重地萬一誤事如國法何如公論何縱欲茍延待愈而鰥曠在躬憂畏焚灼不能一朝居也臣之詞懇悉具前奏冀有感悟惟是不奉命允再陳病狀今勢已廹切别無縁由伏望皇上念臣平生全臣末路憐臣疾苦賜臣生還實不勝感戴天恩之至終乞天恩亟求休致疏臣南京廣洋衞千戸官籍江西饒州府安仁縣人見任前職廵撫地方臣本薄劣誤䝉聖恩謂畿輔重地將臣以太僕寺卿超擢徃充其任鍚臣之榮踰臣之分疾病偶作恐懼弗寧已曾二次具本乞休濫荷洪恩俱未俞允吏部知道毎咨到臣輒自感激思奮犬馬至愚豢飬知戀而天地深恩負戴難名敢不專心藥物勉圖報稱緣臣身由南産形骸素弱宦途北土風氣相違兼以自少不能謹疾向衰即已彫殘夫省方問俗固君之所以命臣而立綱陳紀則臣之所以報君今臣在地方廵行未遍疾苦不知撫事久荒叨竊實甚凡若此者非惟内省之憂則足以減食而輿論之來能無抱恙又惟自古人君以任賢為明而人臣以修職為正陛下不以臣為不肖舉此大任付之將任賢以修職也而臣抱病曠職遲留不去罪孰甚焉况當朝廷清明之日乃有昏眊叨竊之人厚顔强立謂人容已謂已無罪凡庸自恕尤可怪也况六府三闗錢糧兵馬既繁恩怨是非亦衆非病倦衰殘之人所可久居伏望皇上大寛失職之誅俯置包荒之内憐臣於危廹有生之際察臣於懇惻無為之言敕下吏部容令致仕俾臣幸終偷惰卒獲固窮誠不勝感激之至終乞天恩四求休致疏臣思患病日久已嘗三次具本乞休其入仕以來遷除履歷之詳廵撫以後鰥曠誤事之實俱已悉陳不敢煩復以黷天聼臣竊思之一官久病陳乞再三别無他故何至謬䝉聖情久不俞允豈不以其人為可用之人或疑其疾為可藥之疾雖極言狼狽之狀而亦不加憫念也尸位已深豢飬如故渥恩所至死不能㤀然不知臣臣下瞻戀之私尤有甚於主上垂憐之意今不幸如斯豈期得已夫人中氣日虧則客邪日甚纒綿既久憔悴難言大凡攻治之法所資者藥也臣則脾虚不能傳送雖甘瞑眩而藥不可到頥飬之術所資者味也臣胃弱不能消納雖努力吞啖而食不下咽二者交廢理攝無方雖陛下盎以春陽膏同湛露其朽木寒灰無以承之也比日以來粥食减少脉理短濇自汗畏風瀉痢頻仍加以兩足消腫不常必賴扶持而起不聞畿輔重地委此奄奄欲仆之人也是以不避誅戮再此懇祈陛下許之雖若捐之設身處地其實哀之微臣得之雖若負之生順死安其實成之葢知止得止臣有安命之義而乞骸得骸上有造命之仁於國無損於臣有終自古聖賢亦不以為非也惟陛下少加憐察臣又伏枕深思病勢至此縱甘叨竊曾幾何時展轉求臣之志不能作臣之氣辭榮請罷如殍待餔不飽不已伏望皇上矜臣廹切固陋之情敕下吏部容令致仕俾臣早遂生還不勝感激之至終乞天恩五求休致疏臣頃因患病備將休退縁由四次具本令家人齎奏奉聖㫖劉麟着照前㫖亟出供職吏部知道聞命之時憂惶無措竊惟臣之所禀弱不勝衣人所共見幸不僵仆全由調理所以行年四十有三之日即乞致仕家居臣亦自知臣力之不足也况今年長於前心灰於舊加以風土不宜其弱其痼不言可知夫人孰無身而臣實已早衰身孰無病而臣實孤重託毎遇地方有事日永途長粥食不繼强吞餅餌滿悶無聊傳送不及瀉痢以作氣虚火動痰眩乘之是時喘息尚微遇事安能酬應以故累次陳情惟求一退且人之脾胃闗係一身醫書有言糓入於胃脉道以通其血氣乃行此之謂也今臣前後諸疾分毫不減誠以脾胃一敗而元氣隨之雖百計千方竟不可復入春以來肝木盛强前病已甚中滿痞痛耳瘁目黄人或駭於望聞醫亦失於工巧只今屏處尚憂殞絶其於撫事委的躭延雖聖明矜憫誅殛未加而愚昧叨竊悲慙無措伏望皇上憫臣難治之疾察臣難已之情勅下吏部容令休致使臣早還鄉土則雖死之年猶生之日臣不勝兢業感戴之至乞恩宥罪卒求休致疏臣頃以受病之源及誤事之實五次具本差家人賫奏無非畏死完名祈天返禄以終臣節而已猥䝉聖恩不加誅罰仍令供職寵榮踰分悲懼交并縁臣抱病以來庶事叢脞具奏以後百患紆縈雖狗馬之心本憐生飬而蒲栁之質日見彫零即今沉痼已深不能救藥心神恍惚難再當官邦畿重託撫鎮清階必不以臣為無恥授之此官以為飬疴素餐之計顧今垂死敢復遷延况三闗之兵馬錢糧力雖勤而績用未著六府之貪亷功過心雖勞而舉措或乖古人有言慈父不能愛無益之子仁君不能畜無用之臣臣之誤國妨賢必不可用震怒不加亦云幸矣蠱壊不治豈敢安然况臣始病迄今曠職又逾數月乎清惠集巻四
