body:
  text: 清惠集卷一明劉麟撰詩四言古詩述懷五詠今我樂矣敘舊以賢瞻彼眀德不以厥年生事匪多尺宅寸田暮色惟瞑返照復鮮君子保終夕厲愓然載我𤣥酒踐彼初筵悠悠我心無懷葛天其二今我樂矣塵勞靡夕俯仰褒然乾坤歸宅冠蓋各天妻孥在側知已辰星道途掃迹空谷足音使我太息返照入林牛羊是則其三今我樂矣自春徂秋髙人用息志士乃愁終風急雨恐撼吾樓樓有真人邈不可求求而得之泛我輕舟三山何許垂老一逰石川野航曰豫銷憂龍驤虎變挾小九州其四今我樂矣爰即我謀陂塘雨足上下其流百年垂盡寄興孤舟華胄玉臺浮逰石頭羣隂蔽空百神在樓此夕何夕夢逰九州初隨枕蝶終執沙鷗興倦而覺再夢再憂空谷多鬼其聲啾啾其五今我樂矣漸解塵緣藏修還謐始於今年八十有六十一師籖同生之士艾耄涸然我孫森森玉立滿前仰憶宗祧瓜瓞綿綿升髙有屐臨流有船邀我良友矢我新篇退休於室守真尚𤣥不忮於人不求於天詔爾後人勿忘勿愆五言古詩山中奉答孫太初望古復望古駕舟行逺空浮雲日夕盡天光上下同濳鱗入淵微歸鳥正西東亭亭夫容花凄凄風露中羣情各有適至理將在躬日月去已多憂傷來無窮臨流一濯足顧影見雙蓬歌我水上心答彼巢居翁答太初和韋蘇州道存甘拙守時艱慙幸生在昔繆有寄所至皆名城感彼民物憂違我泉石情一朝印章解歸來讀且耕年登衣食足心閒文字精側身鷗鷺中塵網何由攖動靜語客言動靜機相禪苦不了無私動亦得無欲靜逾妙動靜能幾時去去勿復道携琴􅀈古疏疏子賤子千載一單父斯民不忍欺厥治登太古問渠何所修得賢以自輔談笑黃虞間豈復問齊魯孔鐸本夙聞舜絃時一鼓赤子爾何知所欲在慈母吾施既春陽物化若時雨至今梧桐枝金徽照寰宇秋社次苕溪吳大參韻舉世重豪華何人愛幽獨達哉晉處士逺心寄松菊物理本尋常道勝乃芬郁前哲流其風吾生踵其躅貰酒箬水頭援琴峴山曲青錢掛髙笻紫團出深竹籊籊渭之濵猗猗淇之澳徐徐栁外嬉欵欵花邊肅道義常交警聲利久不辱燁燁長生桃輝輝內光燭觴詠集浮洲形骸歸寓屋逍遙本今夕分㩦在明旭社韻天壤冇勝事其逢或千春顒昂復藻雅天興何彬彬鋪觀同生志天實亨厥屯文明鬱然起大半充詞臣即有未遇者清修常苦辛頗厭東吳富不道西越貧龎然自宜俗安問桃花津社中諸長老玉立髙嶙峋引翼並眉夀几杖集今晨鳴絲雜揮毫晤語協真醇一㑹義已正再㑹心彌親相觀各有得退食如見賔翩翩穴鳳翥光華動星辰樂善不吾棄垂死善吾身天目無茂草太湖有揚塵精英一以聚千里成荆榛斯言茍不輕請問啇巖人一朝食君食為霖如有神嗟嗟委巷樂逺逰不獲伸安得如椽筆大刻垂蒼珉燕鴈年年社銘名日日新我德如廣川毋為物所湮讀書臺暮色常如斯孤真保終吉愛此嘉樹林倚杖數晨夕有時髙鳥下馴擾不吾避好音醒逺心文羽耀真憩昏鴉結侣歸燒燈猶未食耽幽有餘興减食非所惜逾八又五年吾生過其歷無事此堧中古期或可必舉觴祝吾樹願樹五千尺何必莊家椿得氣各有適和文內史陸春官清時兩文伯表裏吳門居三生契晤後八袠衰頽初揮毫引星漢飛珮入雲墟佳境本已寂芳塵未全疏衮褒信未度鼎勒良有餘酒醒對蕉緑葉盡還一書寄文衡山戲馬非芳春征鴻逆新暑去住本無心隱顯不成侣令德自有鄰豫美胡獨處東野昔為隂渭城今欲雨假寐始難任沉憂終不去夜發吳門書晨集清溪路中多鶴髮人待子聨膝語一誦虎林偈何人不延竚書逸老詩冊嵗晚田園歸遂逺䕫龍輩辨嶺若天紳亭亭日相對紫翠中有精靜應得其槩朝舒五色霞餐之益五內感彼造物者遺我平生愛氣序日已遷兒女日已大尚齒登君堂耉老自成㑹宿約引壺觴晨興理冠帶椽筆灑雲根樓船蕩湖靄客操如意鈎擊我珊瑚碎青蓮白蘋洲銀刀紫花瀨何如安期生鶴背不可載神樓天生樓上翁百年渾是病遭時或振步顛沛干吾正中嵗幸投簪有物如造命擇栖苦不早乞湖何必鏡吳興逸老成春秋迭觴詠從此作行窩東南稱獨盛契哉文內史繪樓孤且敻謂我居其中懷葛失其靜從此不復下得酒歌明聖問余何所得樓中有真性次陳魯南韻民社關身地淹留廊廟心能將製錦意和曲比鳴琴鸞鳳有文翮低回枳棘林食我中園竹貽我希世音覽德起翺翔來歸阿閣深春光照城郭桃李成繁隂雨餘清樹枝團團明月岑懷君妙生殖古道重相尋柬吳甘泉處士聞園臨廣壑蔓草帶蒹葭歸來理荒穢繞屋皆桑麻䁱起惜芳時抱瓮清澗涯露下百卉長羣蔬亦惟嘉陶翁南山豆邵子東門瓜一身在力食外物何由加贈沈竹里我愛竹里子身世一秋蟬吟風興自足吸露心充然下有榖食者生荷主人憐亦有草食者依依戀平阡豈不競肥腯何由更髙騫嗟余感君誼撫已思齊賢平生志寡欲老為衆物牽卓哉無欲地咫尺不可攀聞君重文㑹切磋如有傳為余辨斯惑拜領春風前神樓漫詠二首青嶂隱澄潭鍾靈自太古結樓翠微間雲中啓朱户風簾半在鈎月射人髙步安期不可期霑濡惜多露其二七十已無友百嵗誰知心獨往日欲暮悲歌天地隂卜居謝人境結樓深復深殘軀幸有託安得揮黃金寄甘泉為圃何汲汲所樂在煙霞露下剪青紫或取黃金芽朝朝厭芳脆時時易魚蝦舉觴清澗曲一醉當山花今晨共誰酌明夕去君家及爾各强健言笑歡無涯幽求茍如此曰以忘紛華桂竹歌桂香何冉冉不以春吹噓竹枝何青青不以寒卷舒所以學道者愛惜如璠璵軒忩當其下琴書與之俱感彼賦命偏忘此生計疏修途既坎壈短景又𤣥虛老色朝無賴秋聲夜有餘荆南王子燦於世竟何如招石川入社結知自臺省僻境亦窮追君年睿而富我骨衰以遲拙劣世遺矣昏塞君忘之暌離本多岐會晤幸有時佳名超九棘古誼冠諸耆三吳得白石握手登黃羲米舟書與畫良足解我頥請與此心誓金蘭歡不移與李半溪翀翀五湖水水滸多遺老官罷各來歸優遊遵故道驚塵方蔽空無一掛懷抱永謝車馬喧但知衣食好社飲已再三嘆想苦不早其二古今重八袠何幸懷君年余也湖心水君如水上船大風揚其波千尺不敢先俯仰社及社唱酬篇復篇鳳聲雲日表蟬號風露前耕桑本一曲杖履得相牽多聞已諧約直諒不違天飲酒或取適放懷空萬緣此誼幸不孤瑚璉同一川烈烈青州守吐氣成雲烟前年入我室百斛甘我泉自云招南村慷慨沽十千今晨踐斯約逸興揮蠻箋月斜褁足去天地俱茫然臨别敢一博一安還一遷吕望及衛武何如𣆀與籛東施與西施異代知誰賢七言古詩挽王封君一心齊古髙雲多瀟灑衣冠在耆耋許身孝義日月懸傳家節操圭璋潔三槐䕃鬱敷廣堂裁培雨露瓜初瓞槐生直幹當清霄槐有深根下盤結如旦如曽自本源生封死諡推前烈秋風瑟瑟吹白楊秋草芊芊帶孤碣鶴馭飄颻去不還杜鵑啼盡寒江雪覆陳魯南我居深山真木石一年易過如一日人生難得白髮時且許於今髮已白髮白有方可再黑感君惠我不死術百年總與一日同世間豈有夀多百青山白雲天外天一日一醉與君别竹鹿歌與張石川每過城市常噓嘻此竹此堂歡不疑仁和酒肆貂可解蘇晉禪床龜可支年年兩醉若天造一日一社無人知朵頥解醲夙所鄙雕蟲綺麗晚不宜老人至樂在無事良朋適興相追隨彼此生兒頗不惡兩家門户粗支持幾人負米可糊口幾人弄筆粗解頥名山秀水取便得抹月披風飽即嬉仰學蝸涎力已倦俯逐蠅利心不羈與君擇勝論中曲切切偲偲艾復耆儦儦俟俟媒和侣瑟瑟亭亭連理枝同生交警聚其畔朝燕夕楚將焉為富貴豪華等蜂蟻營營擾擾真堪悲握手桑榆日西下放舟大壑山之陲窪尊輪囷亦何有勸酬莫計黃金巵有時酒渴得甘露蟬吸湑湑清入脾酌露夀君君莫訝金莖仙掌青天低頌君直擬淇園物青青如簀常猗猗懷葛之民渺何許有斐君子真吾師盟神默祝九十五清歌抑戒酬吾師七袠詠我生忽忽逢稀年回看故路如飛湍㸃檢同生多變遷髙塜壘壘成古阡入山結屋招𣆀籛丹訣久昧無真傳缺伸偶作邯鄲眠鶴背飄搖牛女邊八洞髙張無一仙問之皆稱元節賢邀趨玉帝鴛班聨覺來蒿榻生寒烟暮捲西風梁月懸南國諸公修白蓮貴逰清福能兼全有書切勿言歸田上天下天皆杳然和李半溪社韻寄言同社諸人賢莫訝嵇康習性偏眼前樂事取便得身後浮名何足傳千峰好拾金光草片石今生玉井蓮有酒不醉本凡士著書取勝非髙𤣥張騫曠逰最竒絶中夜揮毫白日眠與彭西巖話舊清溪道士何所之有客擔簦溪水湄吾亦東堂坦吾腹仰淑諌議酬吾私此時門牆二三子循循雅飭仍偲偲大夫持鐸梁州去踰河蹈海紛多岐彭君索居寡儔侣穿楊屢蹶心凄其天王赫怒事征討助邊小試勳名竒成均卒業歷年所一官逺授鄱之涯銅章墨綬贊名郡蓮幕風清行采詩髙堂日暮泣相送但道兒歸不可遲春去秋來衣未改一笑登堂鄉井疑太守欲留留不住百姓攀車車已馳俸錢可數恰五日宦囊惟有商山芝我亦鄱産賀未得相見惟言祿可辭東堂舊逰星欲曙秋髙見菊聊追隨嗟吁彭君不可羈天留一脉尊其師山靈一首恢恢大造垂深仁九死老翁今七旬俯仰三才慙有身人心為主道為賔敗國亡家三孽臣曰貪曰癡一曰嗔更迭為祟興災迍浸淫六氣來往頻分張六賊常相因邇來理攝偶不臻危機一墮與鬼鄰忽返靈根一線新再見區宇一芳春出凡擺俗守爾真結廬京野披荒榛探幽秉道收元神鍊精鍊氣初浹辰蕩滌諸魔如掃塵清靜無為游至淳夢中如見三茅君手把丹書申復申覺來知失桃花津山靈不厭羲皇人六旬夀誕飄飄天路躋元始眇能視兮跛能履中歲騫騰華屋居老去盤桓石兜死石兜安穩亭內光八窗洞達唯圖史陳睡陶酣庾亮樓人境不喧心逺耳一笑青雲足下生苦盡逢甘良獨喜過去流光不用追向來短景今方是天授蓬壺三十三曲中揚袖從風起閲盡乾坤勝事歸長生寶籙成仙紀亭中端坐嚼蟠桃金門方朔今如此山居靜飬古來明哲守厥身天下國家難比倫有欲無欲恆守真仙珠道玉保抱頻淡泊無為康我神蟠龍翥鳳孰可馴華山枕畔華胥人才聞避紂復避秦天然一曲桃花津擷蔬和甘泉韻我家㫖蓄須遇霜連根拾取無青黃黃者初熟本時食青入海沙成宿藏道人齒决事可做大官手拔不逾香肥甘與此同一飽底用形役令心忙憐我初年負鼎俎每持此味升巖廊美芹自知堪獻主鹽梅己見能興商一從棄置等葑菲蝦萊滿船成獨狂百年饘粥無多瓮頓消心火生清凉與吳甘泉六月凄其萬木雕斧斤斬伐皆柔條蚩尤怒觸天柱搖十日並出天無霄援弓力射九已消一陽獨運亨以昭擊壤老子興歌謡才思湧發如江潮吾聞古帝稱唐堯治功巍巍德澤饒許由在下貧無瓢甘心寂寞難為招䕫龍稷契茍已足訏謨豈必須芻蕘與李半溪寧親夏凊正炎暑抱孫上冢集儔侣簮徽世世與物同以禮為坊君不處孤琴伴鶴如賤貧氷蘖自甘君不去三年問道一日傳坐忘遺照多竒語紫壇玉笈天上天絳河珠斗遙瞻佇五言律詩湖南結社夏木成隂後春蠶作繭時暮碑新賜誥橋柱舊題詩鄉酒淹情素官燈照鬢絲報君歸去業結侣飲雲巵赴社次韋南苕韻二首馳光迎素節過雨眺蒼凉眷德羣賢集揚休百代芳簪組味何薄湖山氣正昌飛塵能變海不到聚星堂其二投間身轉貴飬拙道彌尊百戰開文圃𤣥窺向法門取適人難老相觀道自存雙鳬隨燕至同醉衆春園野蔬亭幽居得自怡插槿看成籬日夕荷鋤倦天晴抱瓮遲此中多道氣真味少人知市逺盤餐足齊心剪露葵寄庾梅山讀書胡不仕取樂在郊坰茶烹玉川屋酒熟司空亭逾七頭初白加旬眼倍青尋真寒不廢騁望醉還醒柬貞菴郊壇轉墟曲翻愛客藏深傍水憐春候歸城怯晚隂短髮年年别清齊夜夜心曹園花發後誰此共幽尋答王履約短髮半成絲歸田幸不遲色相花三徑風神竹幾枝息機愁市近取適怕天知盡日窮幽勝躋攀似少時答王履吉病目恨烏絲臨書較已遲涸池常積垢俗頴慣生枝白下髯仙老清溪子晉知年來王履吉獨契愛鵝師聼溧陽織客久全諳俗人勤不但耕造端猶舊學恤緯象吾生華戶熒熒火空村軋軋聲卧聼鄰姥織無限斷機情懷吳耆舊已渡橫塘水歸舟茶磨峰别墅新移竹清江正落楓古衲三生石疏燈半夜鐘忽聞耆舊去飛夢帝橋東凝香寢室小已成趣豪吟客未來祥光窺户牖芳響出蒿萊參辰駒過隙三五兔生隈守墨凝香枕焉知葛與懷社中愛此文字飲衣冠千里同好德競為主忘年恥作翁頌禱言皆應賡歌句轉工終筵惟敬慎監史愧無功哭施邦直二首未閣太初淚再哭菁陽君甲科遭泰運旅襯逐歸雲詩律晚逾細道情常出羣不堪同眺處相望起髙墳其二别日青山約開堂屬病身竹間來作主天外候歸人勝事驚壇社煩寃詫鬼神如何玊樓記橫奪在交親雞鳴寺習靜二首寺僻塵緣斷冬暄病骨强扶笻臨仄徑揮麈得禪床近侍乘槎急賢人問字忙我行無一事吹笛向滄浪其二詩篇收寺古石勢帶湖寒白雪終難和丹霞信可餐落葉深埋磴煙苕曲隱欄經過人未識豫著鹿皮冠蚓蟠一丘無四鄰鹿豕轉相親讀書臺半圮埋筆冢初新種蕉渾得意刻竹恐傷神生事茍如此何年更問津憶慧逃禪老衲歸真久前山春草青古鉢仍留飰疏燈不照經暝色寺門月晨光佛殿星舊時香火伴滄海見孤萍成隱莊死去真無事生來又苦忙短髮淹湖郡傷心問溧陽萍水夢初覺匏瓜意不忘社空梁月在愁思滿滄浪閒居撤屏從山色開門待雀羅已與妻孥逺無煩賔從過積雨雞聲近流塵鼠跡多龍珠辨亦苦光影發雲窩酌故人有感鄉井多才俊暌違奈老何著論人羣少修文地下多得意不能薦感時聊自歌酒杯有深味百嵗幾經過南坦讀書堂盡洗侵輿竹來聼轉壑泉萬花初映谷五栁欲飛綿弱子將迎婦鄰翁許借錢讀書臺下雨種玉比藍田憶故人恨别秦淮水思君夢過橋文章空白下道義立清髙貧病勞相恤衰頽幸見招今年花甲遍鄉信轉迢遙贈吳宗魯貢士北行積雨報新晴蘭舟結侣行十年淹泮壁一旦謁承明夢中愁說夢名外始知名魯城沂水緑春服喜初成咏年花甲從頭數逢人却問年愛身輕世味得道重林泉減祿真成福聊生况有田同年誰獨健長憶看雲眠飽嬉官罷年年稔深居物物情花前見乳燕栁下聼啼鶯閒門得鳳字濁酒薦魚羮常日飽嬉處石牀雲氣生渡江宦逰三十載不到此江頭蜃氣增吳潤雲容帶楚愁浪立星河近鯨搖身世浮狂飈碧樹隕春老不如秋山居鐘定添香坐雞前宿火眠競辰聊散帙入已即逃禪永日圖南榻輕風范蠡船若無風雨病不負古稀年東聞一山二首耕稼苦不飽皇天意若何渥恩忠士少清福善人多取適尊三戒息機消百疴泰道本無事鹽梅空自和其二雞犬下柴扉桑榆轉夕暉力食知今是酣觴過古稀杪秋辭藥物中夜攬裳衣道情無著處風竹正依依詠竹屏老圃無穿鑿多君自作屛初萌兒女象解籜弟兄情風戛鳴璫近煙棲翠幄橫老人逢細字為爾早篝燈與吳甘泉三首抱病多沉思開懷喜奉君黃花雨外夕白髮社中人酒泛諸峯緑詩傳五字新􅀈􅀈忽不語幽賞向誰論其二重陽不風雨芳宴更逢君采菊年年節登髙處處人病與山形瘦愁隨鶴髮新鳴絲間清吹向晚為誰論其三自家五湖上弄水輒忘歸落日看蓬鬢臨風浣故衣食貧隨自省傳病見官稀舍比林和靜寒梅對掩扉贈耿郡伯晚嵗河梁别驚塵失雁行宦逰多慨感君至有輝光物潤班班雨天晴夜夜霜漢廷還汲黯猶自重淮陽與李半溪二首文字百年飲衣冠千里同好事競為主忘年恥作翁欲禱言皆應賡歌句轉工終筵能淑慎監史愧無功其二我欲占春飲紆衡心事同懸知傳舍客未卜主人翁酒熟先扳醉詩成莫問工交深敢自慰名教有微功飛玉臺成眠雲初構寢歌鳳築層臺披豁三光入虛涵萬象開看花能獨坐秉燭喜重來真人騰日問飛玉到山隈凝香寢成二首天上元無寢書邊舊有臺爽氣朝朝入翔雲面面開一叟披裘坐羣公駕鶴來異香乘紫氣浮動碧雲隈其二臺小已成趣豪吟客未來首山當戶牖散帙出蒿萊迎駒過白隙送兔下蒼隈脉脉凝香卧焉知葛與懷霽宇旴望本無期烟雲斂盡時輕風燕雀語麗色鳳凰枝鄴架書攤遍謝屐去何遲古初一披露真宰不能知清惠集卷一
