body:
  text: 清惠集卷九明劉麟撰書簡與李空同二首去嵗過汴城屢屈文車甚懷髙誼仰見尊體豐厚益美好逺勝於昔何止安健凡人間居則索然有悴色公則不然有道在焉耳又有清和端嚴之氣使人親愛生敬不敢墜落真有往時三君八顧之義惜吾土遼逺不得以時瞻奉取規益也將别時曾談及今冬入京事執事有教僕記憶甚明敢不敬承今年春二月忽臥病兩月一足痛甚再一月病愈足終不愈遂上疏言去六月再上必得去是天玉成我也即今足尚不能移動貴陽有兵變以此俟命秋晚氣清足健當拂衣東下矣即今杜門謝客公私有名之餽一切卻去人亦不以相及屏居一室如與空同君參對者但懶惰不讀書藥物之餘習噓吸之節掃地焚香而已此後幸以林下之宜裁示願與同之賢郎秋闈必大得收録見名第更當修賀此髙明不以為有無者蓋勳業既有所屬則此身用否亦甚輕矣故瑣瑣致意而我各與風波漸逺所望於門下者惟有强食靜存以謹末路耳身逺心邇幸因言亮察二居官若辦省已實荒力微才澀困而已矣至於嗜欲之私頗少志不勝氣其大凡也愛想空同君子可以比於好色好貨據此可親可達之衢而問聞常闊以困而廢者多矣靈夀老生一去不復相見以後日馳通路僕僕於今大局一更士醜不出僕以不能固執舊隱為恨今頗羝藩之狀欲裂韁絶靷而去又逡巡未忍若飲於廣筵想望欣欣成度百拜乃退是曰有終然未卜事理畢竟何如母弟妻子竝不入官蓋以彼自為己質志與事俱真也君子亮察畿內二年以來諸郡豐凶相半民亦小安前此為盜非民本意今諸道人皆夜行僥幸一時曾立有社長正副以教其人從者頗多小盜遂息且能時時舉治不率之民有司皆藉以行事又知北土之民直質易導古意猶有存者知執事留意區區敬布一二春來遘一疾幾至不起雖去疏亦不能執筆身世付之悠悠今獲更生將自為之所此言公當與滇行過汴之語同看不能行者不敢告也真切真切比來起居何如海內交逰雕零略盡善養如公者無多誠可愛惜空同子既有此名世不朽之文更無他事惟留意善養餘皆瑣屑不足輕重也炯然翛然聰明耄耋君不可奪仇不得侵吾固取之天固與之勿少讓也節餐減好百福由此而進千萬千萬果遂所圖更當馳書奉報茲不一與朱射陂壬子仲冬十二日拜教驚喜無數第一得承健勝甚慰莊誦為書傳文蠢蠢凡夫坐奉名筆何幸日學延生今得不死不既多乎仰觀句法簡嚴光協章程假落森森總成鴻構某誦已業如見古人噫嘻凡夫得此如服金丹換骨種鬚遂自忘面目非已有也將何修以奉君教人曰後是可蓋前愆某實圖之冀不以凡庸纍君華衮凡得文者例惟刻石吾能刻骨氣力雖衰中勇尚存敢以奉復驚喜至三伏祈亮之近有拙謀杜撰一圖自課大都放浪形骸脫離煩憒所謂長跪授老易者坐君清調曲下不忘企及即有未然血氣偶乘旋亦自復謹以其圖進呈伏冀裁正輒具一牌藏犀角盂中倘幸一采先生報主功成或可同歸夀域不然塗抹裂牌指示道門萬惟不棄與顧華玉仰惟北上道氣橫天而文明入漢大人利見時也善文者不能盡言惟有舉手加額而已士大夫只有兩大事公皆成吾皆不成覩茲盛美曷勝雀躍由吾身而下者可略上焉者人所深願而不可必得在大人君子得之若伊周之總百官衆志悅服大君子立言立德立功克明克順克勤克長克仁克智能成就兩大事天生之天成之是以真榮實貴皆與道合故不成者心服而愧反也未間先布喜感之私尚容另書悉陳不盡與凌時東奉手書一日聞邦直訃音不勝悲君之在逺本可念以此相形似不知君之難也邦直如此太初賢徵光甫又不足言矣不知執事聞此何以為懷大都人年長不能勝哀而可哀恆至奈何奈何所寄佳作細讀數過使人動中不已但諷詠之餘清潤之氣多於悲慨知君有憂有遣不適而康亦不以懸懸而病君之灑灑者不獨嘉君之襟抱不凡而樂天安土義亦宜爾若夫想望之私斡旋之力宜屬之鐵橋中丞者僕已備於書中敢不盡力彼必有以處此然在執事則宜安焉如終任黔陽者千萬千萬師儒無調官例蓋教無煩簡道無小大國家事有章程人臣豈能以已意行之熟計惟有收書一差為近可一歸展墓再計家眷之行亦一濟耳倘黃公能出常破例更是機㑹僕所言者人事之常耳思君切於肝胃然會期渺茫惟幸强食珍養以踐前言黃書一緘幸轉致之有便希示復與喬白巖十四首公渡河而西某竚立瞻望至旌旗縹眇遙盡天末乃返吟灑之亭愴然不能執筆乃知離傷之苦君子所不免也近得王南原書曰朱顔日夜不如故青史功名在何處至感歎欷噓東岡書曰飲中相顧色醉後獨歸心又婉惻戀戀集合二詞亦庶幾滹沱大堤之别計公則慷慨大義而已安有是耶醉倦本不成書因公有命不敢不書亭下無精簡細穎遂拾髠毫殘楮略致數語况當郵傳中步兵酒符則庶幾可原宥也二自大堤之别鄙懷無日不西豈漫然常談敢為門下道耶定州吏歸奉手書日月最近知還山之樂榮於入相而親交之接勞於下官蓋此則真率易親而彼則森嚴可畏是以君子寧舍彼而就此也回看變態若公可謂沈幾先物者矣數日來感念門下不以為恨而真以為慶也蒼巖之約已訂九日奈何諸貴戚莊田部中近移文云遣司禮公同來查踏旦夕將出其事正在河間與蒼巖迥隔事畢不知當是何日我馬𤣥黃馳驟駸駸亦不知置我於羈靮之間者誰也滁陽醉翁乞之不力今雖悔無及蒼巖計當再書請期又念過此則有山陰雪夜煩公緋袍出駕傳與徵仲圖之更竒絶耳日來郊關之禁方嚴以爾西溪之約未决俟少定也小詩二三絶本不欲呈上吏歸奉嚴命督促遂用博公一笑大醜大笑吾計為大得狂諜罪罪外起履願如所談太華山人不勝幸幸所謂圖南豈真有蟬蛻羽升蜉蝣天地者耶一日不病一日鼾睡圖南只在蒼巖之下亮納三山谷老人詠憂旱詩云柱擊乖龍有裂文乃知龍以行雨為勞蟠處九淵是其神處此義果然否非龍何以知龍敢敬扣於博物君子幸有以示我也天氣乍寒一絲溪上未便垂竿恐有神物在中不宜驚擾無任珍重之至蒼巖之約後期罪非得已姑容寬限必有以償也廩數升蟹數螯將獻四某自至日以後問程計晷以造門下將由贊皇縣徑借華陰之蹇製謝公之屐一雪便行已束裝欒水之上方行而卻惘惘何可云喻雞㙡南菌各一小褁廩米一斗手製薰爐炭餅五十枚石刻數幅並上馳候然日走一吏不如親見顔色若究亮鄙心則先吏而至後吏則返也嚴寒道體幸珍愛有一二近作欲上羞愧未能但念歸之意多於進取徒有嘆息五國家易置大輕雖云人事實由天命誠不謂䇿免至於門下此固非逺臣所敢與知獨念夫卑人一守恆陽而耆舊諸公斷送略盡毋乃不祥自我召耶報自北樓宗伯即日寢食俱廢方具第三疏以希曲全之仁而事又如此不知此身何以為計於邑之餘專人奉迎謹俟命于燕南趙北有便示以信邁之期為慰六孟大行之去攀之不及又數曠晨夕用是感戀彌切茲者風霜之氣日髙幸起居留意以前啓日月不同再此申復所謂臨發又開封也七某近奉手教法度森嚴使人神情震懾自量菲薄安敢辱恩至此抑情就役感懼兼深伏候尊懷少開乃徐圖所欲為也頃以鄙私屢有于冒罪當誅絶謹專人禳謝幸垂仁曲宥八恭聞節鉞下臨定興謹遣官屬各治所事候於境上若武衛已移文分守總兵料理進之之才志足以供此幸安意食履餘皆勿置念僕又恐定州節目稀闊親戒一旅奉續前騶自此直盡贊皇諸境僕皆在侍惟幸毋疾其驅庶足以少承朝夕盰跂之餘心神俱敝有懷不敢一一九稿一幅以匆匆不及再書甘泉墓表一通並希入覽蒺藜子西漢一來喜劇若狂回詩云明春所有西溪到踏遍蒼巖處處苔已差人管局亦皆辦理而大同又報殺總兵之家各關戒嚴是以不果少欲再回計寒暑執事又不出耳貴宅離撫境才一程甚是不曾放下此約人還亦須示復十某到真定旬日計入境則已月餘拙劣之才供奉常格無足仰告惟有一事可稱謝門下久旱之餘甘雨適至今又沾足秋苗向瘁而翼翼與與雲興滿目吾民將垂涎於黍染指於稚食瓜剝棗日有生事云云奉違門下忽忽經秋義範仁存曷勝瞻戀敬裁小狀奉候起居伏惟亮察十一某孱弱細人薦歷清階又遭善地顧何修何為可以仰報知遇之恩奈何奉役以來病日加而事日隳心有餘而力不逮茍延不去非惟上纍知己之明抑且下干止足之戒小人之私知人之明相公之業某亦何為忍此病瘁而重貽門下之憂耶得從南原諸人之後榮則逾量事實順心欣然泰然一息寸膚皆仰荷相公之賜欲徑以己意疏請輾轉思惟嫌於負教再此瀆告必得進止方敢陳述且一舉則勢難中止今之士論深嚴失實或以要相釣飾為疑則愧悔何由可白雖日走門下厭煩被罪亦所不能計也至切至切恆山篆刻以寒沍僅得十幅先納此後當有五十幅與歸疏同上電矚幸幸十二某本孱弱不勝官守投閒乞去蓋自始授僕寺之官而已然矣既而明公當軸誤經題品捫心感遇死不能忘故黽勉從事殆將三年奈何命薄器微分已踰矣病誠作矣事誠廢矣雖懷榮之意漸生而負垂之譏將至茍中人言豈惟傷公之明抑且喪已之志前書懇懇實以不専不欺仰盡事公之禮猥陋之私頗為詳盡今則困憊不支撫政益壞是以違公之愛而冒昧上陳也尚惟大示優容曲盡末學早䝉完璧足慰平生夫以凡下細人如此而歸將與西溪南原東橋藥物團孌丘園順適死則同情生無愧也雖一飯一息皆公之賜茍不僵仆歌頌不已由中之切自喻未能伏希少霽尊嚴察納幸幸十三某駑拙賤夫不意過辱提耳之命唯當銘心刻骨守訓效死以報知遇更復何言然迫切由衷雖所戒議皆不敢避仰惟執事位望嚴寒猥瑣之私誰敢盡言但當啄而飛向榮而摧其中必有大不得已者夫人情曲已亂乃䝉羈縶必有非常狼狽之狀去亦晚矣好名擇便罪不當而又輕固將安意承之矣執事於某可謂生死而肉骨又豈有分毫矯飾以負盛心敢輒以本情穢陳别狀伏希宥死垂憐曲成幸幸十四熟復明訓豈惟不忍去亦誠不敢去也奈何即墨功髙難禁烈火邯鄲夢覺轉嘆流蓬日送歸人時悲往事是以頓忘鈇鉞之嚴而干冒繼之矣罪加深重更望少霽霜威扁舟南下告我石淙邃翁錫山泉翁皆能為某禳解幸不痛加誅絶某又昧死敢告使門下諸士通塞各存其品示天下以海涵地負之義此百世名德相君何以過惜言及於此氣雜樵漁陋劣多矣矜亮幸幸與李東岡自仲冬人來得西征議草深奉教懷已嘗具復然不盡萬一念惟機務至煩日來西征並作事勢稽遲君子之憂勞可知萬萬留神保嗇為慰近奉舉將明文卑劣以鋭應舉鋭亦部中舊物某淬而新之耳第大匠掄材每出樟橦楠梓之外是非賤工之所敢知旅久畏寒懷歸益劇不識終此惠否嵗殘謹此修問日攘之罪並候來年照察幸幸與張中丞奉違逾嵗再辱教章感仰不已伏承起居佳勝無任欣慰茲奉驛傳明文藻筆深研仁聲逺被地方大幸不然羣聚合黨旁溪曲徑至於破綱維而汙郡縣亦理所必至是議禮外又添一事或非今日所宜也不如因而撫之以俟中外之定收拾渙散惟在執事轉移之力僕於此不敢分毫謬妄言如無物有如皎日伏惟采納與汪閒齊二首某惟婁氏家法有唾面之戒第未有如今日唾者之橫也假令師德尚存不知何以處此一笑一笑雖然雙溪之間杳然回復雪月風花久無收拾溪山之靈擇賢主典而竟得其大者賢之大者神之竒也一之已甚又復增其一且得於塤箎連理之間彼固若滿其意矣獨不念人有家國也哉公及長公於是歸也無事之日當爛醉溪山深嘲極詆譽江海而歌恆岱彼將惘然自失曰彼天下之士也朝觸而天柱摧夕煉而天漏補片石硜硜涓流湜湜誤人家國將舍公而不敢戀戀矣若以為入山方深入林方密怡然而安翕然而譽使如玉君子竟為外物所得則吾道將奚賴焉長公寡謔勿以俚言告之得其譏譽溪山之作間以示豫何如某不日解綬東歸登臺握手追虎丘之逰醉真液之酒大呌其間或見桑田於東海之東乎寒暄雖多壯懷激烈不復致詳惟千萬珍愛二僕以執事垂察於生獨詳故當銓未幾輒以已私塵告執事必曰君子未嘗不欲去未聞如此其急也殊不知波蕩之餘物情非舊鴟張狐假緩則及身雖䝉垂察亦無及矣其出撫叨仗公議百凡無所假借門刺生毛大璫斂手今欲變之豈勝抑鬱熟思惟有一去正德間一為編氓再投病廢不為君子所棄良由於此今且病日益甚官常久曠公秉國鈞豈宜茍容不為之所耶罪在全身事非干進例得原宥與董壽甫日來大方伯未有能黔其首者以公之才若內執政在行省耳珍重珍重某惟秋臺落日魏闕疏星交游之在四方可逆追而數不謂癯然兩鶴毛羽尚輝輝也何日入京聮駕再奉清塵了却公家商量故業必更有久要之義夢寐此懷他無可告慎食加攝以終此約且南郡雍雍公家履聲在耳偶尋髙躅未可即謂投間苐以公之俊逸不常頗有阿閣羽儀之像輒因短翮相呼相喚於丘隅岑鬱之間計亦疏矣逺中不知竟以何者為是先希見報與李䖍甫恭聞正位中臺天下想望况宿聞輿情已非一日卑人辱在年末為喜為重如何可言自得新命以來再三走使馳問以河氷不得大斾所指之處日有懸懸茲道路傳喧由臨清而北謹専人馳候道左仍以地分清嚴不敢具賀輒有茶米將意亮不以菲陋為罪僕將躬候於金臺瀛海之間冀領所不逮者伏惟照察與崔光祿伏自白巖太宰過恆辱示手書懸懸未報某日來奔走坐臥不寧職分則然所幸有圖皆就地方粗定亦蓋茍祿之羞惟是病瘁未歸卑情默默不敢向人言耳仰企尊候清華轉逼動履益康因鼎俎而陳仁義蓋五就而一德也使聖明由此知正味而重鹽梅則中興大業染指一時垂涎天下冏寺舊僚與有光也春和拂衣暌違益逺矯首無任拳拳與鄭山齊辱手書誠惻深感至楊總兵之疏又䝉優納俱奉至情感甚伏承視篆以來機務一新天下想望若明公可謂體用完具而左右逢原者矣企仰如何可言願益珍愛某復有一言自大同有事以來敝境戒守彼中逃亡如水東注人頗驚疑或致聚而為亂今悉捕獲關守頗肅惟逃軍解部發落欲照常發三關瞭哨恐致彼中缺人直解彼中則解人必不能去有軍解俱逃之理尤為可慮希留意一處又惟機務煩勞未有甚於今日以大才應之必有餘地但前輩於此食飲起居必令另項區處念此身以為國家安危所繫不可不愛聞黑牛乳最良視章勞劇必致口苦飲此一二杯饑渴皆宜可小試也與楊邃庵恭承明詔敦用元輔治表彰彰想望之懷何可云喻但以心膂之重而股肱於外未免少違衆志豈以西事艱危皇情迫切誠有所不能顧者雖然免胄一見使敵知令公之安則天下受賜多矣台正鼎居深嚴密勿亦惟旦夕願相公純忠雅度一以人窮為念計安拳拳仗義徂征勿復疑也竊惟期頤上夀方此逺行必萬萬加意保攝祚關人國豈復尋常千萬千萬言及於此恨無羽翼西向以奉周旋謹遣人馳候與陸玉崖二月間僕遘危疾有不起之勢悲嘆殊甚其初至也手足一刻麻痺重若數十斛者至第三日方知痛癢其痛如遭捶撲呻吟達於晝夜至七日水火始利而周身變為焦灼瘁黃之色兩目兩耳尤甚醫者皆恐懼不敢用藥僕亦自以為貪求太過天當降此但以不得生見骨肉為懼不意一旬以後仍得減輕今十去其五尚時時飲藥未有速解之法深恐其復作也請巡按衙門舉奏庶幾得允然為人所去留又將四方疑之恐無以自白鄙懷如此伏見來書切切以未見為恨然則公在神境界不知蓋靜極而動自然為運僕亦何敢深言但數窮理極是以十年乃字幸再少從容大名兵備久得禍恐不能終公之事今又并此衙門裁革不設此官更無何行也大名府曾回報浙江無再行公文到府而王守亦中風未出此事大都嵗久失真官吏又以巡按駁行皆畏憚此官因而縮手行行且止自昔為然緣此官事權隆重吏民積習喪膽一時難變易也且各官皆緣事患病不得盡力亦迍邅之運使然奈何章疏事極見論議之精然聖教誠惻聞臣下論此者輒痛悼不食雖親臣必疏若疏者將不止於疏然疏可為也加於疏不可為也明哲保身君子或有取焉言至於此猥陋難聞但執事於僕有骨肉之誼不敢談笑道之南京祕獄城西勝樓曾相嘆息亦以生還為幸願公為少記憶僕自抱痾以來志衰氣餒惟知求去伏承偉論駭嘆震恐又赧然深以為愧當噤無一語可也顧譊譊沮之豈不厚顔雖然區區之情謂忠於朝廷則未謂忠於門下則有之矣公志於逺而僕守其近固未為無見又惟僕以菲才謬膺撫職缺失萬千所謂如其禮樂以俟君子耳一笑一月前作一書未遣得病留在恆陽今出巡於趙前書不得途次作此不詳不慎又以病腕令吏人代書皆非故步即此亦可以少亮與王履約履吉某以菲才謬有撫事在躬憂愧成痼近數上疏求去值時事以拘繫焉意窘不得遂非有如前輩受知之盛日有惶恨昔人所謂失腳下漁磯然却顧追思事誠如此奈何今北有禮禍南有疫禍邊方有疾視其長之禍並以茍延得免但陰據於此勢若偷生若伸嚴大義不可一日留也事勢少定必思所以自謀家委之浮沈亦已數年則卑人本無進取之意或可鑑亮年餘奔走七十二城邑中間有連旬寢食皆廢殊不逮坦居多矣况此外有危辱之機耶以爾日夜念歸自素翁去後二公起居皆不聞想擇勝據深精進逺覽少與世接方之碌碌者當復何如多故以來才賢雕落上下無人料理此天下之大懼者二公天之所厚望留神經濟以奉家國之急未可以鄙見例為戲談不加視聽愛精力仍在立言之上與王南原五月間得石亭書知嶽母夫人暨尊閣夫人俱已仙逝此等烈禍一時竝至悲痛如何可言人謂鄉邦疫氣流行無賢不肖皆罹此禍以執事純心懿行天應别作區處乃漫無損益福善之言自今不足信也已而聞之行道之人又云執事及令器亦在病鄉令人驚懼膽落繼有過者又曰已平如常僕心氣稍定是時流行之毒一鄉千百家或無一免而一家千百指或無一存可謂烈矣賢父子幸能無恙可謂魯之靈光福善之言要亦未可盡非某辱在門下奔趨哭奠既不得行而問慰助相又不及期真骨肉間大罪人也區區在公欵局與巡按相同自塞內顧之門家事已付之浮沈然不虞至親有此念之悚懾是月中官以迎獻帝神輿南下其氣焰若雷轟電掣不知措手及其既還若天旋地轉無可逃避日行三百里朝夕奠又復如儀蓋全無寢食之時矣因與巡按者相向而嘆曰百七十餘年始有奉迎一事而吾人當之所謂何幸躬逢其盛也言幾回成慘禍至八月乃畢南行甫三日而大同大禍繼之遂扶持病身西登紫荆倒馬諸關整兵設備窘迫憂惶尤甚蓋亂在我軍勢窮而潰直至三關之下六府皆為戰場宗社密邇其關係豈可勝言以是寢食並廢乃忘其所謂病者今九月將終尚未全安由是不與鱗鴻相值忍心失禮以至於今萬罪萬罪嗟乎節哀順變親友常談公之哀甚而公之變極矣不加節順必有不勝其變而不能盡哀者矣某又豈敢具言惟千萬垂察與杭東卿自道旌西臨河洛尚缺問聞曷勝悵惘中州名藩非簡帝廷者皆不輕遇以爾知入贊大猷亮亦不逺拱聽拱聽切念尊體康勝方伯位尊責重中年以後精力尤宜愛養勿以苦吟耗之且向來勳業更多有限家資無名浪費不可不早為之所治有空同能無技癢又聞此道既得鬚斷鬢皤皆不自愛竟不知果有是否李元任於惠卿老先生為同年其視門下亦有鄉曲在諸幕中不知能奉殊教否頃王中丞惟忠論薦屬僚元任與名端介之操當亦自有知者伏希門下留意與秦鳯山二首僕庸愚豈敢厚望於君子之門頃以地方迫切不揣分量冒昧祈求方恐恐自謂必罹重譴不意仰荷玉成雖至恩所施有在而餘波橫被實多又惟沈謀盡下執事體國安民休休之風豈近世之所皆有今而後執鞭請役凡在門下何所不勤惟盛德始終垂庇不倦二某淺陋多病叨竊重地幸免罪戾皆賴明公扶持之力感當何如是月二十四日解纜而南北望光華豈勝戀戀已嘗専人陳謝時尚在境內今則長往更此少伸拳拳糴糧一事亮能重念但前啓以匆匆未及致詳仰惟執事在生民父母天地之義若將此項銀兩少不留意或諸司花費或抵作别項支解此民士以及官吏咸怨入骨髓某雖病死亦不暝目惟得隔别委官糴穀誠合敕㫖并本部原行之意至懇至懇六府己收鞘者八萬有零俱去冬已前之積今幸又將五月各府未收之數與各府縣當不止二萬一千五百蓋走馬未定之數查過即有不同易州六千亦是末收之外瑣瑣勿厭勿罪薄劣不稱任使此其一也伏冀矜察與石熊峯二首某病士得歸若魚投大壑雖當圉圉之初實有洋洋之想奉荷回天之力實同再造之仁鐫刻深衷無日可忘人還側聞道體康和其於吾道真大厦巖巖之一木也是言豈惟區區一人之言哉幸若時益加珍愛比擾擾以來門徑迥殊在某迂腐下材揣摩不熟不謂逾年而物情至此北望名德終始至教惟有門下小士人飭躬矯志垂三十年豈忍流浪自廢以爾維持拯掖不能無望於仁人也病困之餘固陋可笑但念違教益逺悵惘多懷書何能悉二某於四月二十四日入舟旦夕解纜而南自茲去門下日益逺矣前此已嘗告辭然病軀不堪驅馳尚未出境今賴庇漸減乃長往也辱愛深重再此申黷無任拳拳别楮所陳乃儲積未了事件在鳳山司徒有行得如所請隔别委官糴買深為地方之幸倘或司徒稍不加意因而别項支費大失官民之望又復頭會箕斂以為預略其病困斯民何可勝言此一方命脈所係惟公仁念鄉國司徒來見之時鼎言及之則區區病夫受賜多於圻內之民矣逝梁發笱雖棄婦所戒然茍利於民不愛髮膚願執事垂納計三四日可至安山崇武勢與恆陽岐絶雖欲馳候亦無從也伏惟鑒察與馮司馬杜太僕來傳致華札感荷無似但此書今年三月方到以爾謝覆稽遲其罪不在僕也伏希照察逺惟動定康勝福祉日新但國務方殷兵戎尤劇拯溺救焚必為蒼生一出可也孟子有曰當今之世舍我其誰公勿以區區之言為謬鮑老當筵每見郎當舞袖今日事本自難為公必鼓掌大笑某不及奉見耳朽病自知誤事及今引去庶幾寡過一丘一壑吾意易足病孱細人茍延至此過分即日南行奉楮陳别不盡區區與妹母生三女惟汝賢兄為妹擇婚惟汝得喬木又名宦之家後來事變兄豈能知使克思愚朴必無今日所謂反被聰明誤也我嘗勸之克思以為不合嗚呼命也吾妹遇之亦吾妹之命日章曉事今又長成比舊益進能勤身守業亦不為貧若懷父之寃念祖之志感今之廢為恨豈有窮盡古今成敗多由於天使日章輩生賢孫克振前烈安知不轉衰為盛門户寥寥無乃君實親家英豪太過以有今日妹能守困待亨百凡寬厚人雖不順天必助祥兄之所見如斯而已今日兄休官閒居身體比在泉之日頗健此即盈虛之道但吾妹不我信耳小大皆承惠扇一一皆到皆平安無煩掛慮一二年間回饒祭墓相見有期珍重珍重正日同我回家同回亦可會時商量保重保重妹見此寬意綿粉伴書輕黷罪罪與甘泉二首佳作謹為書入冊規約漫書奉令兄先生苐手寒筆澀略寬數日和金山稽山諸作殊有竒思真星下泉湧不可及也新正始㑹已於來翰注知字乃約中家法他處幸轉致太初處約還未盡去而召柬且至渠不能會其中義必以僕為簡也懶病怕客乃爾可嘆太初生子豈專氣致柔為之邪此人倫之大真可賀也打喜何如二伏承來製仰見忠愛之情來者未至而卑人之應聲已出可見尊君親上出於人心之同然也一笑與孫太初二首左席久虛而鶴軒不下令人勞情不可言也嚮惠羅巾什裱珍藏茲有佳客出以展玩因思美人之賜殊加賞嘆謹具巾材并刀尺之費煩一指㸃蓋弟子原分衣鉢之意耳如何如何秋入湖山清淨益甚人回幸有以度脫塵凡也二新秋吳德徵為豫築室南坦在萬榛之中門曰衡門堂曰居貞吾志公可因是而求之矣柴髯一來便成仙界劇談長嘯臨水面山盤谷不可為昔人有也居貞之名吳興郡伯所題蓋諒豫之志而因以示戒勉者頃奉教云新秋當至今秋老木殘而苕溪上笛音竟杳然不聞意者繁華移人耳此間山水唯有曇寒泉與一二酸澀野夫共成岑寂加以秋容百物黃落與西湖真不倫也熟油苦菜當自有愛之者德徵逺詩修此少候興居所在不盡區區清惠集卷九
