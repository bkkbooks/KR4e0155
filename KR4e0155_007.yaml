body:
  text: 清惠集卷七明劉麟撰序湖州府志序作志者其知道乎在昔建侯國有外史置守以來其法始廢今天下名郡古大國也萬古此區宇萬古此時事有事則有書道固然也掌記之法豈以建侯則有置守則無若今文獻猶夫古也孔子言禮嘗嘆其不足重可知也矧天道文於上地道理於下人道經緯乎中無非事者書可廢歟由是觀之史亡而志興天也夫郡不可以無志猶王不可以無史其道甚明肆今天下雄州壯邑師表烈烈而志則殘缺良以史學無傳知之而不作者有之力不足也力不足者不敢作也不知而不作者亦有之道不足也道不足者可無作也辭尚體要政有典則議論之家辨以肆辨非志也序述之家宏以侈宏非志也他文體紛如志法於史最近然不得謂志為史猶史之不可以為經若春秋可曰非史衆言稽於聖故史可曰經其志道一也作者得其義不奸其名愼其法不忘其體典則森嚴志之辨歟是故有弗録録惟其實有弗書書惟其直天下信之民可徴焉百世傳之聖可俟焉斯志之極軌也志有文於是為足徵之文志有獻於是為足徵之獻凡所書紀巨細皆然有聖人作必起而徵之道藉以明作者將樹功於天地操觚所及造化其運鬼神效其禎祥考核有據教飬有方徵輸有藝上下有章昭百禮化百物以康百姓故政有經而民知尚志之所由作也非知道者何以與於斯故天生俊乂以時牧之千百年墜典至是大明數則然歟湖州府志西林張先生晉産本經術巍科以文行翹拔進為翰林吉士時與六館史氏師友淵源覽中祕贊編摩有良史才已而出入兵民驗其學者既廣來知府事剸繁剔穢曾不逾年百廢俱舉嘗求故實湖長老曰府未有志先生惕然烏程縣教諭蘇人浦子適來先生數考問知其才命之曰豫作府志汝其承之某退而次第搜輯其事以告于先生先生以草示麟得遍觀作而嘆曰善哉斯志不遐遺不穿鑿徴文於古考獻於今傳之天下而民不疑貽之後世而聖可俟不蔓不支有典有則一志興而百度舉昔某作禹貢而厥功叙周公作職方而厥民阜孔子作春秋而亂臣賊子懼斯道綱維又極逺矣聖人之道昭于天垂于地經緯于人繼經史而作志志者道所繫也先生曰吾治吾郡始求於萬而不得今㑹於一而有餘盡職效忠恆以不足為懼作者之志夫子得之其著於首簡以詔來書芝山山人集序芝山山人紹興之新昌呂翁中遂也溧有學士孟河馬子謂豫曰吾得芝山翁文若干首願先生序而傳之曰翁之述作奚其富耶學士曰某有聞焉翁不事舉子業嘗語人曰吾不能㥪㥪爾翁惟不試故得以專攻於是豫執筆而歎曰翁乎斯以竒矣豈惟今乎豫嘗出守於此邦此邦之人知之舊矣昔漢劉寵非有大過人者只以五六老叟持錢出送寵治行遂聞於天下史氏稱之於今為烈然諸叟不以名聞他守去來不知其幾叟亦不聞何在此邦人甚竒之自漢則然比豫在郡亦有若人者出五六之數不盡然追送同其持錢又同其所稱述則豫忘之時亦心竊怪焉此屬恆伏草莽中若商山黃綺之徒秦不能誅漢不能致當其意則偶爾一來其迹甚鮮而執天下公議甚大歷世雖久其道不絶非豫所謂竒矣今芝山翁讀書與縉紳之家同能賦詩屬文與詞章之家又同以其雄姿藻興何所不可獨不為舉子業自塞其進取之竇噫嘻遊龍矯鶴常出乎宇宙之外其竒可駭也吾嘗沿流而得其源矣翁子信卿擢危科視壯邑更一制告豫曰吾芝山大人其說云云興一利告豫曰吾芝山大人其說云云蓋素定於家庭故出而加之民斷然行之無疑假令翁以其教於家者身親為之其於信卿之業也何有夫人有其術不售其身聊以畀諸其子孫是豈衆人可蠡測者哉翁乎翁乎漢寵復生信卿未遇將匿跡五六老叟之間拔足世氛擇地而蹈觀時事之變而從旁握其議當時五六老叟不其然乎信豫之所謂竒也今信卿為政匝期矣溧賦井然溧民盎然尹之身臞然若瘁也尹之居蕭然若秋也雨露濡濡氷玉輝輝民望而嘆之更相謂曰吾父母之仁吾大翁之志也豫聞其竒而揚之於邑亦當時五六老叟之遺意也此道民鮮久矣翁曰不能㥪㥪豈無所用其心哉竒氣勝焉爾翁所存所履若是其文與詩皆有物矣可以觀乎可以興乎古之尚友天下者誦其詩讀其書溧之學士請刻諸溧固以慰溧之人亦以慰天下尚友之士云送大中丞鄒黃山巡撫貴州詩序正德丙子嵗貴州苖民逆命天子召公卿議羣臣有材望者撫其地且以軍務屬焉議者以貴州方伯陳公雍雲南方伯鄒公文盛疏名以上時鄒公御實殿於陳天子御筆乃獨先焉矧人望皆屬於黃山公命下之日咸曰天子明見萬里之外也璽書臨滇公拜命朱衣載豸特斧以行大夫與公為僚友者皆作為歌詩以導之有作者曰吾將擬諸皇華駟牡之聲乎黃山公天子之使也南坦子曰煌煌中丞有嚴秉鉞提兵振旅擊斷郡國子是之歌使之常也又有擬其作於嵩髙之詩者若曰黃山丰采顒顒昂昂惟嶽降神式是南邦南坦子曰中丞近臣出入禁闥補過拾遺言及乘輿天子改容事關廊廟宰相待罪惟甫及申藩宣於外疏逺之謂也我儀圖之穆穆清風蒸民之詩明明山甫賦政于兹式遄其歸亦有召虎江漢之章經營四方告成於王僉曰南坦之言似矣乃屬豫序述其事南坦子作而嘆曰維我明興奄有八極土宇版章上世莫及皇帝繼統閹瑾肆逆變于大章如焚如溺我是以有安化之役瑾又厭殘黷貨重困民力劉六鄢藍之徒並起我是以有齊梁屬漢之役數年以來兵戈汹汹蕩搖於中蠢蠢小夷既惠且懵望其狂狡相扇以風無惑乎其不起而薨薨也然不知九重神武謀臣淵深曾不逾時蕩掃妖氛獻捷受俘嵗無虛月往時出謀宣力之臣今皆公孤是寄台衡是陟躋躋蹌蹌股肱王室行將制禮作樂象功考德以張大我有明中興之業今天下之勢譬之人身瑾之在密苖之在疏若由心膂迄於手足瑾誅矣安化之黨誅矣鄢藍劉六之徒又誅矣於是中土永清肺肝脾腎一切用寧蕞爾苖民特疥癬手足之疴充其不仁無名指之不伸耳有善醫者或以不治之法治之古先哲王統御蠻夷列之荒服之外其制嵗貢終王脫有不至讓告而已昔皇漢承平之日南粵吕嘉悖於其地漢遣路博德等將十萬之師討之是時戈船蔽瀨與馳義侯三將軍皆未至惟伏波一軍斬吕嘉平百粵若發䝉振落厥功偉矣淮南王安言於朝曰臣恐將吏以十萬之師為一使之任也其亦力詆當時之君臣乎今我朝土宇甲兵十倍於漢若博德之舉則亦何憚而不為者第以披髮左袵非我族類得其地不足居得其民不足牧何以重煩中國故柔逺之道修文為尚干羽之舞是也羈縻次之趙充國留屯之類是也勤兵於逺損內重外博德之類是也干羽之化純乎其純遐哉邈矣留屯之計兵不血刃如其仁矣博德之功則王霸所棄孟子所謂服上刑者也黃山公雄負逺識式干古訓侍今天子言必堯舜獻納以道兹行也將崇干羽之化以修文為必可為乎抑將不得已而委心充國之留屯也不然將駸駸然博德之為其置吾君於秦皇漢武之間乎從事博德一戰而捷吾恐不免見譏於淮南之言黃山公其擇而處之也乃若用人理財之致於道體國經野之周於法皆公所深喻而力行者也蔽芾甘棠吾方敬而式之夫復何言諸大夫詩歌大都類此是曰同心之言也遂書之以辨羣玉之首云送别駕張南溪擢陜西僉憲序陜西古雍州曰三秦疆域之勝天下莫之與儷國家官人於斯特加之意嘉靖庚寅闑司分道衆難其人天官卿以南溪張先生疏名上聞天子曰可先生載豸執憲將奉職以按其土其舊寅長友石梁萬子進南坦子問曰吾人壯逰兩至於秦秦士人與子交愛秦也何如南坦子曰問都邑者舍其同弗於其細山川壯於秦有泰華終南以為山崆峒太白者雖髙弗選焉秦有洪河涇渭以為川汧灞龍首者雖多弗選焉形槩如斯非襟度雄深者何以臨之甲兵威于秦有鄜延北地又西極于甘凉跨雲中五堡以為鄰撫赤金汗東以為屬近而岢嵐河套以駐以牧逺而土魯畨哈密乍梗乍順若犬羊豺狼麋鹿􅟡􅟡俟俟在我郊園匪招則逐連延百貊秦兵增增茍非其人何以馭之饑饉瘁於秦也纍嵗恆陽關溪險塞驚沙晝晦嚴霜夏隕數千里之民喁喁涸鮒東運不至西烽卒來窮邊告急內境繹騷室如懸罄野無青草士饑而怒馬鬛俱盡里不可斂鄰不可糴鴻鴈哀哀六月出師秦民蹙蹙茍非其人何以生之石梁子曰我知之矣我知之矣南溪天子選擇而使之乎某也敢私有以慶南溪在地官春官武皇南巡沮者不測今上議禮犯者孔嚴先生上書論之並烈兩遭震霆神佑弗殆視死生得喪猶隂陽寒暑屹無所動先生忠勇可徵矣及令海鹽端已惠物政敏教宣表樹風聲民從俗易凡五閲月功業炳炳已若多歷年所去之日士民攀附得先生束帶留而藏之介胄緇黃罔不歌頌先生仁明可徵矣其在夏官也以某事振某人之難至是且三下詔獄先生無愠色及有潮陽之行至則從容講學日肆於文潮士人與逰翕然為變自是薦書交騰中外咸惜海之令潮之佐陜之憲曾幾何時縉紳間駸駸望其大受先生無喜色是非徒節行可觀亦其風度廣逺足以噓吸而承藉之也以先生蒞秦秦將何如南坦子曰非秦之難宜之者難耳秦兵誠重且劇先生忠勇如斯兵何憂乎秦民誠困且敝先生仁明如斯民何憂乎若先生之風之度又將與秦山川俱髙而並深得賢如此秦何有焉石梁子曰豫知秦矣知南溪之與秦宜矣然不及按節之宜何也南坦子曰澄清以修體繩糾以盡度除苛𨗳民國有大章豫與南溪在世講之好即其淵源知其作用何以聒為又曰子不及秦士人何也南坦子曰難言乎難言乎秦之士人有無在南溪兹行豈有六海三都河山兵甲雄蓋南方而謂無人乎南溪子虛懷折節明目褰帷必有所得以秦之才濟秦之業忠勇仁明不可勝用拾其大者入獻天子保王躬補王闕恢恢乎有餘地矣何一分道之足云乎石梁子曰南溪之車旦夕駕矣吾惟子言可以贈矣遂書之以為大受之張本云送郡伯王旴山擢遼陽兵憲序比嵗京師戒嚴吾黨里居者恆以宵衣為憂一日州峯丘子過我卧林語曰國家懲創往事訓兵飬民夙夜未忘今徵我郡伯旴山王公飭兵遼陽公也霸産危科翰院烈烈諫垣本玉皇香吏也纍官郡中經營四方又多歷年所被命之日上下咸喜曰賢人進逺人安社稷之福願子一言麟衰甚不足以宣揚盛業第王猷翼翼吾人樂頌弗獲自已敢告僕夫昔我文皇遷都定業綱紀之初洞見百世京師本金元故地當經營建立之初寓鞏固維持之法巖巖天居猶人之有元首拱衛其間猶人之有手足又如大車以載兩服兩驂其能少乎都城本扆山帶海霸則在邦域之中實天造以貽國家何以言之此州之士何士思皇多士生此王國也列聖知之因其厚重質直之體飬其强毅果敢之風是以魁梧特達嘗冠絶天下豫守恆陽身親論與追求國紀仰而歎曰雄州在斯職重勢尊隱然老羆當道自昔多賢敵至之日當局者頗以無才為歎其為世用者又曰無兵嗟乎身有是病必有是藥主憂臣辱盛世事乎漢唐承平率多蹈此皆坐不加之意夫有國不患無臣用之有術魁梧特達者皆是也兵以臣足得臣不患無兵州峯曰我王公亷公有威其英風藻績照耀吳興吳興人方嚴憚切磋今翻翻棄去民欲借留借之何如麟曰不可王事多艱瘡痍未瘳轉徙未復旴山是行羣心屬望安危以之駿足方馳若火之始然未可留也及其成功以保王躬補王闕豈非若人詩不云乎維嶽降神生甫及申維周之翰若曰借之公家失左右手必不可得也惟吾子圖其大者謹序送浦海濵擢國子助教序君子之仕也奚為難難乎為師能為師然後能為長能為長然後能舉而措諸天下無難也我國家憲古圖治首隆學校京師建太學郡縣建鄉學各有師凡以造士也論士之秀者自鄉升於太學論師之造士有顯功者亦自鄉升於太學制也勾吳海濵浦子來為湖之師暇日偕張生朝雄謁豫於東山之垣徐觀其貌慤而法聼其言辨而衷觀其度周密而靜與之上下古今曲而中心雅重之私語張生曰師模不當如是耶莫能淹也於時郡守張西林鐸素豪俠負氣無能得其歡以浦子為材獨傾心焉出郡志屬之曰此非子不可毋辭浦子退而綜理其事不逾年而成屬辭比事宛若司馬遷氏經制有等善惡有倫事核而文詳而有體余讀之不能釋手歎曰吾始見子之面乃今得子之心以故契誼益深數與往來見其井井然有條理也厭厭然其能始終也斤斤然其明哲也欣欣然其樂人之臧也戚戚然其憂人之不修也遇士大夫以禮處諸士子以恩噫嘻獨文也乎哉由是聲華籍籍旁溢他郡督學文谷孔公以文稱雄海內拔浦子於儔人之中庭論移日各詫相見之晚以禮聘校書吳山書院而簡擢適至張生來坦上言故且徵文焉余曰曩固謂其莫能掩也遽若是其速乎今之掌銓衡者率以資凡良有司三載稍稍遷用其次九載考績若浦子蒞湖學不三載而遷兹秩抑有由也明天子在上選部得人鼓舞豪傑能不襲常今日浦子為湖之師湖駸駸然易志而嚮方自兹而進於大學則為天下師矣舉而措之天下濡其教者不若湖之士耶善人國紀攸賴異日調燮元氣股肱王室未必非斯人之教余不文敢以為天下慶邑侯丘州峯奬勞序丘永嘉尹長興四越月按浙御史勞焉褒奬之語首言器器曰厚重次言才才曰敏練又次言履履曰頗著賢聲省郡嘆賞昭示邑中邑之僚屬欣欣相告謂豫曰我尹受知當路盛節也不可無述麟曰有尹如此何可弗勸有勸如斯何可弗言第麟不能言辭之弗獲乃揚言曰往者莆有見素林公與麟直廬比鄰以爾得朝夕公之言曰仕有二端名實耳矣循名者必於上責實者必於下猶版築之有基宫牆數仞百官宗廟非基何賴下實藉上子其圖之麟退而求諸下明日繼見公曰吾鄉有陳時周黃伯固者名實吾無間然言孝者必於陳言忠者必於黃實勝也子其徵之麟退而求諸上逮今老且死未忘也永嘉未至射陂朱子走翰告曰丘永嘉某夙昔厚逰頗得其風槩所往復有詠在兹三詩詠月者可徵也曰永嘉之賢有如此月是時永嘉已在吾肺肝及其下車首問窮獨次燭幽隱次及兵戎庫藏又隨事立法謹名教慎幾微威近習惠疏逺本經術遵王度行其幼學耳矣是時柱史檄未下永嘉之本末已著不勸而賢則斯勸可不言而著復何言哉因是而諏度其間永嘉若規矩凖繩厥器何器為瑚為璉厚重或不足以盡器永嘉之範圍曲成其才何才以經以濟敏練或不足以盡才厥履何履中正和平顒顒昂昂遹駿有聲臺中云云或不足以盡履豫於是又知風紀之臣愼厥許可言揚有法蓋鼓舞英俊憂何如也永嘉異日屹為名臣將不在兹乎若渠門下士所談說則異是是嘗得其進者始曰夫子於文無所不考學關德性常渾然寂然及問難所至則啓發無餘又宏深而博大驗之行事亦無不然麟曰是神盛者歟繼而曰夫子於物淡然一無所好事關取與斬然毅然至道洽義投則傾倒無餘實春溫而玉潤也驗之臨下亦無不然麟曰厥得所飬也又曰夫子應酬之際不逆不億而吉凶悔吝常早見而預待麟曰是能損兌以收其靈歟嗟乎學優而仕行道之際舉而措之道以器凝器以才運師古以濟今何履不信譬諸宫牆雖非九仞而讋固完密基則已具矣素翁所謂下焉者已不可及上焉者固弸中之應也由是而以勸以言感應之機人各自致焉耳雖然盛於神者龍以為德養其志者龜以為靈損兌法噬厥道上可追軼於聖門之士所望者可幾及而日孳孳耳彼一忠一孝又永嘉素所藴籍焉者奚俟豫言之贅也謹述其義以覆僚屬之謬役豫者是為序記重修安吉州廟學記湖州府僅一州州曰安吉嵗嘉靖癸丑冬江侯一麟以誠謹榜進士來守是州下車即宣布憲典博詢民瘼凡所設施開誠盡下無何仁明播昭逺邇垂白之老匿跡巖穴者皆出而更相走報曰父母至止百凡教令一不可後德聲籍籍流布四境非其農歎於其野非其旅歎於其塗曰我等何以不䝉斯澤明年當路檄侯平役長城麟年已踰耋居常寢疾侯至風聲所震扶杖往觀遭於卞山之麓歡若平生匆匆呼酒僅以再酌侯行而問曰此有山曰天目公知之乎髙三萬六千丈有竒周回八百餘里上下龍潭一十有二泉源百派支出多不可知曰東吳曰吳興曰中吳四顧皆山莫之與京夫物有峻極如此其受氣必多多則容物必大一麟所守之土在焉山經茫昧不知何以處之麟曰嘗聞其名不得其詳敢問其山之德侯曰微哉微哉一麟視篆尚淺也獨愆陽霪雨光怪百出是吾憂也麟謝曰吾方朽於丘垤之下何以示復及此卒酌而别明年仲冬觀察與槐謝公少南過訪至自京洛麟以江侯之問質之公曰江子以道守官非徒問也昨問道於豫欲觀子臣弟友之學以豫三督學政又嘗共圖建學又曰廟成尊崇孔氏之徒遡而上之將無師乎虞夏商周或非一聖聖聖固相師也學成敦奉今王之法仰而求之將無學乎庠序學校古非一學學固相因也至一麟之身則偶墜焉瘝通邃古何以逭之因以士習文體示之殆未盡也明日觀察握手言别諄諄謂豫曰若江子可謂好學也已矣吾二人舊學不忘切磋相成不亦可乎又明年天目山中陳參知棟塘公良謨狀來亟言學事若曰江侯克疸厥心惠我州人永永門人陳敬則輩尋源討流箋記晰晰廟學創始於洪武己酉增飾於𢎞治己酉逮今嘉靖己酉百二十年間本已荒蠧又歷辛壬癸甲傾圮甚矣侯日惟惋惕乃述州人迫切之狀告之當路當路感動時惟桐城阮公鶚太倉王公忬績溪胡公宗憲邢臺趙公孔昭宜山陳公觀衡建業謝公少南江陵姜公廷賾許州徐公洛皆同聲報可財取公羡力取民隙合前府判唐侯堯臣今生員吳惟堯典膳吳明良所助共得金若干損益調度咸若厥則又時以贖刑之金足之是以厥工底績若神首文廟成兩序從焉東序又東啓聖祠焉西序又西神御厨焉次儀門成左祠文昌鄉賢並焉右祠名宦土神列焉總以㦸門皆在泮之上又其次明倫堂成前有精舍東西分教齊焉後有髙亭敬一刻針藏焉公廪官廨附堂左隅皆在廟之西爾乃繚以周垣巍然煥然實生肅穆足慰斯民之心落成之日侯以厥工馳復諸公阮本文宗實專其槩遂請公記事阮曰吾方有事軍旅汝曷告夫南坦阮又嘉侯丕績遂勉承兹役侯曰麗牲有石已與諸生卜吉麟方瞑眩起而濡毫乃曰三才廣運羣聖迭興極軌之來已非一日茍為世用者將𢎞其化思執其機能勿勞乎因侯之跡求侯之心必有弗營而遘弗繪而文者存乎其中盛世不加隆叔世不加損燦然星羅凝然嶽峙農工商賈不戒而喻子臣弟友不招而入舉國所不及知而侯獨知之者豈必親操版築日走宫牆之下乎蓋自侯問山卞麓講道長城吾與謝公固因其語而得其心也嗟乎列星為傅嵩嶽降申固皆受氣之多也天目於我何有哉成人有德小子有造固奉若天時也宫牆於我何有哉𨗳迎有術雨暘時若光怪悉為休祥理則然也君子之道立乎此而參於彼也並而三也此非積久何以能致下學上達夫子行之學之者惡乎不然今日師表人倫者蒸我髦士春秋各一其業以時稽程天下無事則習俎豆而䆒遺經有事則修戈矛而收獻馘文事武備無乎不講伊周方召共惟帝臣當倭奴弗靖之日江侯拳拳於斯可謂深識逺覽不為細人之圖因是而求在昔命州曰安曰吉豈無意乎訓曰在知人在安民詩曰藹藹王多吉士亦此意也德輶如毛侯克舉之吉士由之而出民其安乎百世之下不以豫言為謬然後知斯州之名於是為稱敢以斯州斯學為斯世賀藁初就復於侯侯拜稽首讓於同官曰霍君與球周君時協恭之力若學正何君濬學訓羅君佐顧君有光辛君光佐贊助尤切大參陳公兼吾輩又咸賴之恐皆法所得書悉書之麟惟陳公兼教終慕道在子車之機卷懷以時力追蘧氏之玊都母全懿有編麟諷詠在笥垂三十年公家大其門閭正以化民興行此有副本敢告僕夫寓於尊經之􅍥可備第三已酉文獻之一抑有風教之實重修胡安定先生墓記湖州郡城南何氏之陽宋安定胡先生之墓在焉皇明嘉靖乙未侍御張先生按浙是冬蒞湖州按事畢謁先生之墓俾郡守劉君督其僚屬繕治之十二月厥工告成侍御謂余記其事時郡學教諭鄢君賫來鄢之言曰胡先生崛起景祐慶歷間殁而墓於斯歷元逮今總數百年固掬為茂草乃有侍御惕然振新羣公庶正罔不奉德於是筮日召徒乃芟乃剔乃啓乃闢蕪穢既治神道正直遂崇爾封亦崇爾墉封碑大碣屹然在中豈數之窮而㑹其逢耶吾聞古者或墓而不墳防之始葬猶然今侍御之舉不已厚乎厚乎麟作而歎曰深哉善教之入人也侍御之施於其道不於其人惟墓斯存賢賢有象以妥以安遺靈孔嚴後之士將因其然求其所以然式於斯尚友於斯固有在於松楸壤土之外者昔比干之墓周武封之後世稱比干之烈者歌周武之仁維墓有役豈顧瞻愴惻尺寸之情哉鄢曰侍御之心夫子知之道則云何噫嘻叔世明王不作善治日逺幸有二三子出以其中正淳龎之氣倡為體用誠明之學若規矩凖繩立於此而物不能違及其久也薰蒸融液道業寖廣人欲以退天理以進善教之澤斬而復生吾道將不在兹乎宋興師道如縷先生乃作當時學者曰安定胡先生惟先生有身化以端教本故經義治事之法立而浮華本實以定廷議士論翕然歸之迹其烈始於湖及於太學將盡一世明睿之才崇其術以授以淑循循雅飭之風幾還隆古士奮其間若生乎百世之上當時師之所以授弟子之所以學豈直聖賢之緒餘哉今日吾黨經其所謂經事其所謂事曰非先生之徒不可也功加吾道豈有既哉侍御經術名家真才作用憲節所向其風穆如夷考其度若一錢一粟亦不易出至先生之墓則獨無所愛謂非道化攸關而加之意乎故守兹土者宣其力典兹學者相其成要皆經義治事之餘也鄢曰微子之言幾喪吾往斯墓之役我侍御崇儒重道之盛節激昂雖多此其為大夫子書之鄢又曰獨斯繕治也哉侍御又俾參藩洪君憲僉焦君求先生之裔孫授之田廬復其家為斯墓永永計並可書也用悉書之侍御張名景汝陽人參藩洪名某莆田人憲僉焦名某宛陵人郡守劉名基成安人郡學教授鄢名某豐城人先生裔孫曰聨芳本如臯人今為烏程人贍田烏程縣官田一十六畝有竒廬舍地烏程縣鵝行界官地八分有竒峴山逸老堂記吳興山水清逺聞天下郡城南三里衆澤所㑹曰碧浪湖迤西二小山曰峴山曰浮玊在湖之湄峴山舊有窪尊浮碧二亭顔魯公蘇文忠黃忠文三賢祠焉郡城蹲據辨山三川五寢布護其北天目諸峰㑹萃其南其陂塘沼渚循而下者漸廣諸山旋繞者漸伏道場車蓋二山又南扼諸水𨗳漾其中凡五折而至以故山在湖後者曰前山峴山浮玊據諸要㑹而蹲踞焉呈奇獻秀於桑麻萬井之中濳靈浮玊一拳石之間有吞吐清逺之象造物之所珍祕若待賢而彰也社人逰焉曰弛厥張或攀依巖谷流憩曲房或蕩漾洲渚言采其芳非鵠起而立則鴈序而行矯首雲物傾耳滄浪以時共酌各賦所長雖仁智之樂靡同而雨澤相麗或適其常病可愈憂可忘世可遺老可康一社而去每社不忘匪湖之深匪山之髙以松以喬吾人之遭嘉靖二十六年春三月二十有六日戊申實社人之八㑹也别駕楚東湯公節推箕谷馮公作堂以處吾人大書逸老顔之堂楣是日登飲成事翼日我齊吳翁率衆張筵執爵為對酒數行乃揚言曰二公充念吾黨恢𢎞如此前所未有俾我社人上擬香山洛社甚盛心也恐不可無述偕一庵秋官唐子十有二人揖余使之記事麟謝不敏我齊應聲曰昔者甘泉吳子創為雅社子實相之今二十餘年始在之人惟子獨存子又何言麟乃敬諾楚東爰率其屬暨社人陟降巖壑周視歷覽自堂徂亭靡所不到逸老堂乃在三賢祠上堂隅右折而升得巖突可臺逈出堂背端臨浮玊題曰朋夀登臺俯視浮玊山若砥柱之在洪河巡簷平眺東寢南漾皆踰岡越阜可見光若鑒空浮動於屏障之間所謂清者逺者兹亭皆俯而有吾社人深幸其有遭也斯堂之役始孟春望終仲春晦凡四十有五日告成麟乃退而尋源討流得一庵唐子之疏其略曰以春秋二社為期當事者治具先期而到次日乃已並用燕服衆寡不拘先後繹來出入隨意供具不華止折簡不邀長揖不拜論說不譁陶情不醉盟神不禱再考箬溪中丞顧子詩紀曰第一㑹嵗癸邜秋社始會期而入者某某不期而入者某某是㑹實逸老為㑹之始張石川㑹畢而歸得宋耆英㑹文潞公等十有三人圖像作書遺麟今石庵宫保蔣公等亦十有三人可以不愧前修夷軒于白石見喬梓之嚴焉苕溪於石岐見二難之具焉一庵于潯陽見授受之真焉石川又自謂於諸老在朋友有金蘭之篤焉楚東箕谷延賞褒嘉開堂表俗大書特書記之金石以垂永永儒術治範可以仰繼坡翁梅溪令德顯顯上下輝映皆洛社之所未備也又云文璐公王宣徽並以留守預求入㑹猶今日潯陽白石之例亹亹千餘言為斯社賀麟誦之濳以為憂夫社義惟神社日惟戊其制二十五家王者篤近乃社務民義乃社知幽明之故乃社生民依依其端甚小舉一社而天下皆然是合天下而社然後漸大今社必縉紳㑹必歌詠休聲四達洋洋濯濯鄰境畢至不已泰乎或不若二十五家之約也遡厥大猷惟一庵唐子能約情於人已之間劼力於老壯之際矢事同心起而盟社是類族辨物與道偕行矣石庵諸老後先畢集履信思順得非中正而應乎獨處亨忘戒或非君子之貞是以憂之吾聞道貴有終文忌太著同社之人合損有餘以補不足庶幾夙夜以永終譽昔在甘泉吳子憂之其約曰斯社之興將以淑儀寡過義求其備吕氏藍田有約交欲寡尤范氏座右有戒是以當時之㑹莫敢不恆其德今先生巋然廟食可考也豈不以斯㑹四倫百行攸關先生特加之意吾人因其言廣其義益求古訓更相勸勉又推而上之黜華靡崇雅篤使天下知名教有地此世此人此社則此山此湖多矣乎有遭於我也我齊聞之喜曰審如子言斯社將與國社並永石川之賀子何憂乎吕約范戒猶此堂之有門有基必揭之以告同盟社人名號爵里則書於下仍虛其半以俟來者呈之二公曰黃髮雍雍風教烈烈惟某之作亦某之責悉書於石浮碧亭記湖郡城南二里許有山曰峴浮碧亭在焉正德己巳東南大水湖郡堤防盡决民用阻饑庚午又水郡倅滇南侯君君錫適以其職而來乃周覽跋涉殫思竭慮往勞必於峴而憩止焉明年河疏堤築歲以中稔民乃請建亭館於上以為君遊息之所若曰猶召伯之有甘棠者君弗許曰而未大裕也又明年疏者以達築者以固水至不為害嵗且大稔民復以告君君以告之太守太守曰吾聞魏公之衆春有園蘇公之喜雨有亭從民攸好子其圖之君乃畜財鳩工不逾旬而亭成以間計者三以楹計者十有二登亭以眺碧湖在前浮玊在下道場何辨諸峯森列環布流者如止峙者如至爭秀獻竒諸景畢㑹落成之日太守與客來飲其上顧而歎曰美哉亭乎天蒼蒼其下浮歟峴憑虛而中出也題之曰浮碧郡之文儒盛為詩歌惟是作亭之義君屬豫記之豫惟君子平政用物履中思順而已勞逸有節逰觀以時臺園之作在昔則有蓋言中也古人之於民也功加而後役之故役而不勞勞而不怨子來有頌蓋言順也浮碧之役始以宣勞而協民心終以致稔而煩民力邦人樂之太守名之君子歌詠之其庶幾中順之道哉今君水利之修惠及千里而作亭之制不踰數弓又有得於卑宫室而盡力溝洫之訓者是宜有述俾後之厲民而自逸者有所考也清惠集卷七
