body:
  text: 清惠集巻十二明劉麟撰附録部劄禮部為比例乞恩請給䘏典以光泉壤以勵臣節事今填以字四千二百十三號勘合照會浙江布政司比號施行須至照會者一件比例乞恩請給䘏典以光泉壤以勵臣節事祠祭清吏司奉本部題本司案呈奉本部送禮科抄出致仕原任工部尚書今故劉麟妻淑人王氏奏臣夫麟南京廣洋衛官籍江西饒州府安仁縣人由𢎞治九年進士歴刑部主事員外郎郎中紹興西安知府陜西㕘政雲南按察使因病奏准回籍調理正徳十六年六月内皇上登極行取陞太僕寺卿嘉靖元年奉詔推恩封夫三代欽封臣為三品淑人嘉靖二年陞都察院右副都御史巡撫保定等府地方四年四月内陞工部尚書八年六月内為應詔陳言事䝉欽准致仕臣夫自歸田里銜載天恩至老彌篤不意於四十年四月初二日身故切念臣夫存日筮仕先朝恭遇聖上㧞擢任使歴官中外凡一十二任自入仕以至致政凡四十五年頗効勤勞平生清苦茍延八十七嵗備叨榮寵實踰涯分臣伏覩大明會典并見行事例凡兩京二品文官病故咸得贈諡祭葬查得已故工部尚書韓邦竒劉龍等各病故伊妻伊男具奏俱䝉聖恩賜以贈諡祭葬臣夫事體委與各官相同伏望皇上洪慈擴天地覆載之恩霈雨露霑濡之澤乞勅禮部查照前例一視同仁賜給贈諡祭葬則天恩覃被於存殁而臣之子子孫孫不勝感戴於無窮矣等因奉聖㫖禮部知道欽此欽遵抄出到部送司行准吏部文選清吏司手本回稱本官歴官陞任與奏相同及准考功清吏司手本回稱本官歴官正二品俸方及一年未經考滿至嘉靖八年自行陳乞致仕並無被劾等因囘報到司查得大明㑹典并見行事例兩京二品文官致仕病故者祭二壇工部照依品給差官造墳安葬及查得先為比例乞恩贈諡事節奉孝宗皇帝聖㫖今後有乞恩贈諡的恁部裏還要斟酌可否來説務恊公論不許一槩狥情比例濫請該科記著欽此又查得南京兵部尚書韓邦竒致仕病故伊男韓仲譔奏乞䘏典該本部覆題奏欽依准與祭葬贈諡去後今該前因通查案呈到部看得原任工部尚書劉麟致仕在家病故係在京文職二品官員今伊妻王氏奏乞祭葬贈諡除贈官移咨吏部施行外今照例與祭二壇合候命下行翰林院撰祭文江西布政司轉屬支給官銀買辦祭物香燭紙就遣本布政司堂上官致祭工部照依品給差官造墳安葬所據乞要賜諡一節為照本官守潔行端才竒學贍令譽久馳於仕路清修尤重於鄉評出處無疵始終一節易名賜諡似亦相應但恩典出自朝廷臣等未敢擅擬伏乞聖裁等因嘉靖四十三年十月初五日太子太保本部尚書兼翰林院學士李等具題初七日奉聖㫖是劉麟准與祭葬還與他諡欽此欽遵隨該通政使司連狀送據監生劉牖告稱伊父致仕工部尚書劉麟原係江西饒州府安仁縣籍寓居浙江長興縣病故奏請恤典䝉禮部覆題奉欽依准給咨該工部勘得父寓浙江病故是的題覆造葬差官俱行浙江去後所有贈諡祭文恐悞行原籍往復不便伏乞准送禮部祠祭清吏司併行浙江以便欽遵施行等因到部送司案呈到部擬合准行為此合就連送仰付該司類行浙江布政司轉屬支給官銀買辦祭物香燭紙就遣本布政司堂上官致祭仍將用過官銀開報户部知數毋得因而科擾不便連送到司合付精膳清吏司煩為類填施行諭祭文二道維嘉靖四十四年八月乙丑朔越十三日丁丑皇帝遣浙江等處承宣布政使司分守浙西道石㕘政張柱諭祭致仕工部尚書劉麟爾性資直諒才識瑰竒始擢賢科遂聞讜議刑曹歴試郡牧馳聲秉憲㕘藩廉能益著僕臣再起實簡朕心爰自撫臺薦登卿佐曩因興建遂陟司空薦進羣才底成嘉績方深毗倚遽懇歸休養素丘園躋于大耋典刑攸屬胡遽淪亡追念英賢良深悼惜渙頒恩數加秩易名諭祭遣官併營兆域茲惟異渥爾尚歆承維嘉靖四十四年嵗次乙丑十二月己丑朔越二十七日庚寅皇帝遣浙江等處承宣布政使司右㕘政張柱諭祭致仕工部尚書劉麟爾剛介持身忠勤體國屢膺召用薦致崇階抗志遺榮清勤益勵稽謀在念胡遽隕亡日月不居倐臨窀穸爰思往勩載渙渥恩諭祭爾靈尚其歆服生銘資政大夫兵部尚書兼都察院左都御史儀封王廷相譔南坦劉先生元瑞者性資澄朗才志儁逸羔羊素絲清操㧞俗乃今世之人豪也嘗以書遺予曰執事風範清峻古雅深服麟心故向往惻惻老不能忘四月看花九秋送客繾綣尚如飛絮白髮無情前路逼矣奈何哉没世無聞虚辱浚翁之知大可惜也竊嘆明公於僕誠有欠事㸃檢往年報示之書尚在雖地下亦得執以奉白不但已也生銘亦可大傳亦可目可瞑在茲矣百年嚴憚切磋不與草木俱化不有望乎不然匪人之徒謂麟為愚謂公為謾亦斯世不平事也不知明公何以處我浚川子曰嗟乎人之所至惡者死也生為誌銘近死之道者也先生乃弗避忌命予撰之非道達天人超邁於世懐之表者能之乎禮曰君即位而為椑嵗一漆之藏焉不禁也先生今年七十來日尚多請為生銘亦古制椑云耳乃據狀論叙先生登𢎞治丙辰科進士庚申除刑部河南清吏司主事厯陞本司員外郎山東清吏司郎中陞紹興府知府在部時以事觸忤逆瑾至郡摘拾詿誤廢為編民正徳庚午詔復原官知西安府事嵗餘丁父憂去甲戌陞陜西布政使司右㕘政戊寅陞雲南按察使疾作疏上准回籍調理辛巳起為太僕寺卿嘉靖癸未陞都察院右副都御史巡撫保定等府地方舊疾復作四上疏得允歸丁亥再起改大理寺卿戊子改刑部右侍郎尋陞工部尚書己丑秋七月以議奏停罷蘇松等處織造内臣忤㫖勅致仕辛卯會安陸大雨顯陵殿宇滲漏以興工在視篆時追論落職閒住此先生歴官始末可舉而覩者如此為員外郎時奉勅録囚畿内且夫囚有負枉者拘於成案而不獲伸事有隱僻者偏於先入而不能白倘非憫衆之仁探幽之智孰能别其是非真假以為重輕乎先生乃執法折中游心明察以求至真之擬奏論疑獄免死者一百三十七人減放流徒以下者萬六千有竒在工部時一惟以節財惜費為念凡有徵取及興大役皆考據前典大而議罷次而議減遭際聖明在上多所允行雖弗悦乎任事者之心而軍民賴以休息多矣先是四司銀貨各在所司畜之收放出納各任司屬嵗久出入多寡艱於考稽先生乃疏奏創建節慎庫一區逖在部後總移四司所蓄藏之又請以本部侍郎一員都察院御史一員同監臨之由是銀物公具宿弊剗除此亦大釐革之政也辛夘工部災累世公帑獨全連年南北郊宫寢大工屢興俱不煩徵取天下調度咸舉非先生創茲永圖何克爾耶前後罪廢及謝病凡四退歸皆寓長興之瀆南坦足跡少游城府嘗與太白山人孫太初龍霓吳充陸崑結社於苕溪乃號苕溪五隱云息跡衡門充志箕山世恒以偉遁幽人賛之及退而歸返商原之耕甘谷口之臥放志遺榮不索索以應世真抱道而逸者矣然而自筮仕以逮懸車中間賢人君子累疏薦論何啻數十此亦有所根系非漫然而已蓋以先生秉精執之徳有中幾之慮措諸政事活民益國然爾夫天之欲祚者智巧所不能為人之欲為者鬼神時有所奪彼怵迫貪鄙之徒望富貴以趄趦假時勢而引㧞雖明景於人寰終失步於聖途道義淪迷又安論禍福之舛錯哉先生出處清正之節屢退屢歸絶無非間如此不亦為世衡凖乎按狀先生逺祖子春宋睦州知府七世祖曰良卿者始居江西之安仁遂為安仁人曾祖泰者山西朔州衞某所正千户祖亹南京鷹揚衞後所副千户贈亞中大夫太僕寺卿性慎儉端介授官未逾年而卒祖母孫氏封太宜人贈太淑人年二十有五而鷹揚公逝營營勤苦藁寢糲飯者四十餘年父蒼南京廣洋衞右所副千户封武略將軍贈亞中大夫太僕寺卿襲官後進武學刻勵讀書通小學四書史略將鑑諸籍性行澹素不事荒嬉有文士所不及者母蔣氏贈太淑人繼母曳氏封淑人配王氏封淑人男子二長牖娶處士吳甘泉之孫次序聘都御史王涵峯之女女子一適南京户部尚書周約菴之子仕孫子五某某並皆佳秀孫女四先生晩年間棲道養乃契乎内修之術曾示予曰辱教提挈綱維因求所未示自夫六火六符進退升降並皆返照内觀於竅煉於𤣥闗幸而藥得火行加以日月騐於天機有應當一一奉塵門下同心凋落緬惟夙昔静閲凡今此神已翩然浚儀之曲矣造物者於吾徒或别作處分未可知耳又曰僕一夕體氣異常暢爾如醉醇酒盡日乃已不知此何祥也此後日益徤勝不敢告人浚川子曰嗟乎此非崔公得氣之驗乎四體百骸真元透達經絡浸浸毛孔蘇蘇如酒熏灼由是觀之先生所得將不謂神矣乎漢太史公曰老子夀百六十嵗或言二百餘嵗以其修道而能壽也其然乎予觀先生廉澄好修風流而文雖孤處虚奥而天地萬物變化之委瑣㝠昧靡不灼覩洞辯施而行之無所不極其政由經術澤被齊民人弗思之邪謀猷禆國帑藏充積克襄大工人不嘉之耶軒黻華芬浮埃流雲弗競弗珍非有道者能之耶乃為銘銘曰觀之日赫赫在天臨照九寰孰不戴瞻夜亦光燦光去人逺人自不見先生始終之政術似之觀之月神氣虚通精魄大明逆行而盈所以久生先生延生之道術似之匪日匪月燭龍爝火亦可以恃其能安與論君子之大成乎墓銘資善大夫兩京刑部尚書長興顧應祥譔大司空南坦劉公既卒家無餘貲厥冢嗣牖扶柩權厝於夏駕山祖塋之次三越嵗矣公之配王淑人始聞於朝在朝諸臣咸謂公始終清節宜加殊典請於上贈太子少保特諡清惠諭祭者二命工部遣官治葬事如制先是公存日擬於所居後弁山之麓營壽藏未就至是牖乃從治命卜日改葬而索予銘墓中之石予素受公知又聮姻也義不容辭乃叙而銘之叙曰公諱麟字元瑞一字子振系出宋睦州守子春後十二世祖良卿自南陽徙居安仁遂為江西安仁人國初諱泰者率萬人歸附授山西朔州衞正千户傳子孟庸失職永樂初庸子甫復以軍功授山西平陽衞副千户尋改南京鷹揚衞三傳至亹為公大父亹傳蒼公之考也改廣洋衞俱以公貴贈亞中大夫太僕寺卿母蔣氏贈太淑人繼母曳氏封太淑人公生長金陵年甫十九應𢎞治壬子南畿鄉薦丙辰登進士適臺諫官俱以言貴戚事下獄公與同年進士吾湖玉厓陸君崑抗疏救免聲譽遂起丁蔣淑人憂服除授刑部主事遷員外郎奉勅慮囚畿内畿内事多掣肘公不避不阿平反者咸當其精人益賢之尋轉郎中正徳戊辰陞紹興府知府莅任五十餘日中貴劉瑾修舊怨矯制褫公職公迺益貧是時玉厓陸君為南道御史亦以言事罷職為民遂與同歸於湖吾邑甘泉呉君珫慕公名珫固巨族也招致之締為婚姻公寓長興始此時浙臬僉憲西溪龍霓亦罷官來寓及闗中詩人孫一元相與結社謂之五隱瑾敗起公知西安府聞廣洋公訃奔歸扶柩𦵏吾邑夏駕山公遂定居南坦以南坦自號服闋陞陜西布政司㕘政邊報急或擬加賦公曰靖邉以衞民也民可先困乎議者沮而軍興亦不乏尋陞雲南按察使甫至即以疾告詔許回籍調理外官無養病例蓋殊典也嵗辛巳今上登極召為太僕卿嘉靖癸未陞都察院右副都御史巡撫保定等處復以疾歸公雖淡于仕進而廟堂求公益切丁亥復召為大理卿戊子改刑部左侍郎時四郊之功方興起部難其人乃以公為工部尚書公言於銓曹辟瑰才充司屬百度具舉又奏建節慎庫嵗一查盤工部錢糧從此出入有經公素不悦于中官以議蘇松織造事忤㫖罷歸復以顯陵宫殿滲漏波及勒令閒住後以建儲推恩始得致仕公雖退而名益彰部使者及當道論薦人才者必首公以無中援竟不起主政一菴唐君倡為峴山社會公與湖中林下士夫嵗一再㑹乗一扁舟來往郡大夫物色訪之始得一見見亦不談公事方會時適一權臣經過遂避去平生善反觀内照之術秘不以告人嘗自謂造物者當别有處分人亦以仙骨竒之年八旬餘逺涉江湖往安仁謁墓如少壯然末嵗屢得危疾一日命大書論語曾子浴乎沂一段懸於寢所朝夕相對怡然自得人莫測其所以復得疾竟無一語及家事而辛時嘉靖辛酉四月朔之二日也距生之年成化甲午九月二十八日享年八十有八配胡氏南康大長公主曾孫女封安人贈淑人繼王氏南京禮科給事中辣齋公之女南京大僕寺少卿南原公之妹也封淑人子男二長即牖長興縣學生援例娶呉氏館陶知縣綋之女甘泉君之孫也次序溧陽縣學生娶王氏都御史涵峯公之女皆側室田出女一胡出適髙州知府周仕南京户部尚書襄敏公約菴之廕嗣也孫男十一祼卿娶江西布政司㕘政丘君孫女祠卿娶縣丞施偉女禴卿娶周時康女衮卿娶河南布政司㕘政呉君孫女祜卿娶鳳陽縣丞鍾世臣女俱縣學生襲卿娶呉績女齋卿未聘祚卿聘崇徳縣舉人朱曉女禂卿聘縣丞沈雷孫女禎卿祥卿俱幼未聘孫女十二一適曹州同知顧應元子縣學生思約予之猶子也一適縣學生某一適太學生李鷁一適進士繆希亮孫大敦一適貴州布政司㕘政繡山陳君子縣學生履贇一適福建布政司㕘政石岐吳君子縣學生政均一許聘潘志恭子景懋一許聘太學生沈世卿子一許聘禮部儒士李倫子春先一許聘呈貢縣知縣宋諶子用中餘未字曾孫男二騶虞驩虞尚幼曾孫女六幼未字公平生尚氣節以文學馳名于時律詩步驟盛唐選擬漢魏字法羲獻雖短牘數字亦不茍作時出謔語亦皆雋永有味片紙隻字人得之以為至寳末年一意静養求之者俱不應故不留稿嘗欲建樓居無力文内翰衡山為繪一圖名曰神樓騷人墨士争詠之衣冠必法古制不知者以為異處異母弟鳳極其友愛尤薄俗所難者一時士夫以風節著者閩有見素林公吾邑有公指不多屈也予憶𢎞治末初沗進士觀政刑部羣寮之中有清癯而善談論者詢諸人曰此河南司副郎建業劉君元瑞也初中進士公差便道過南都即與守備内臣相抗因而獲譴蓋公之風節天性如此予心識之不圖晩嵗乃托交於公云銘曰猗與坦翁金陵之傑發身賢科制行修潔筮仕西曹畿甸祥刑不茹不吐鑑空衡平出守海邦忽遭廢斥前劉後劉並美血食㕘藩于陜持憲于滇飄然而歸若將終焉身在山林名在當宁入為僕卿出為巡撫三仕三隱聲名益彰廷尉卿貳垂紳廟堂大工方興公為起部弊絶風清節慎有庫難進易退君子之常不久於位於公何傷壽考令終孫曾濟濟恤典褒嘉光榮故里生薄萬鍾食報於後埋玉名山千古不朽墓表榮禄大夫太子太保工部尚書豐城雷禮譔大司空南坦劉公於嘉靖辛酉四月初二日卒于家享年八十有八其子長興庠生牖赴闕控情䝉上賜祭葬贈太子少保諡清惠罔不羨公禄位名壽始終俱全近代所希有也初公年七十具狀求宫保儀封王公為生銘至年八十又請太宰甌寧李公為傳今牖以予與公同鄉又沗掌冬曹事繼公後持生前銘傳并銀臺崑山張君寰撰公履略求表其墓予念公在工部首創節慎庫革弊源至今賴有所持循忍冺前聞不思所以表之耶公諱麟字元瑞江西安仁人也祖簡三公襲伯祖廣洋衞千户遂家金陵父蒼嗣官俱以公貴贈太僕寺卿祖母孫氏母蔣氏俱贈太淑人繼母曳氏封淑人公性資澄朗弱冠領𢎞治壬子卿薦丙辰登進士第同歸安陸崑觀政虞衡時外戚張氏貴幸頗驕横骩法科道龎泮等交章論劾㫖下詔獄拷治甚急公與陸崑抗章申救大意謂通治道而來諫議古帝王之盛節一旦沮壊後有利害誰復敢言敬皇為之霽威獄寖解尋丁蔣淑人憂扶柩歸葬安仁赤塘祖塋示不忘本也制終除刑部主事進員外郎以才選録畿内囚公執法折中不拘成案所疏雪寃抑無慮數百人事竣轉郎中正徳戊辰擢守紹興漢劉寵故處也抵郡躬理簿書清刑獄裁供億甫五月民皆嚮方逆瑾銜公在部時以事觸忤及出守又不修謁掇郎中瑣事廢為編氓郡人扳呼如失父母集千金為贐公笑曰勤苦諸君吾治不逮前劉敢䝉一錢惠耶既去越人肖公像為小劉祠求太宰海日王公華紀其績于石家居值嵗祲無旦暮儲士大夫相率嘆曰可使劉元瑞至是耶湖州吳子珫施子侃慕公道誼迎公入湖相與論道䝉山之董塢闗中孫太初方僑寓宜春龍霓亦徙居遂結雅社為湖南五隱未幾瑾誅起西安陜民戴之猶越也嵗餘丁廣洋公憂都憲藍公章憂其無以為喪檄諸司治車馬之資公却不受㑹宸濠搆亂弗克歸安仁遂於呉興夏駕山安厝服闋遷陜西㕘政屬闗内饑民數入冦朝遣貴臣督兵議軍餉將加賦秦民諸司莫敢持異公曰不可靖邉本以為民今若此内難亦可慮也貴臣變色曰憂民者獨㕘政耶公不答適陜有赴闕陳訴者命下公共圖其便議遂寢公乃覈侵漁括逋負邊儲竟以不乏踰年擢雲南按察使謝病歸嘉靖更化起為太僕寺卿時值繼母曳淑人疾留妻家侍公獨旅寓毎退食焚香如坐禪室元輔石齋楊公一日過其門見雙藤倚户飄香載道問曰此為誰曰劉卿也石齋歎賞遣人致意而去尋擢都察院右副都御史巡撫北圻公飭勵屬官節財用存贓贖為備荒禦敵計畿甸以寧因疾作四上疏得允歸逾三年丁亥再起大理寺卿尋陞刑部左侍郎㑹工部尚書缺推公進補公遇事不設嫌咨白吏部進退其屬凡銓除者悉訪才廉充任先是四司銀貨各在所司蓄之出納各任司屬自擅弊日滋率難稽核公上疏創建一庫逖在部後刷四司之財貯之特銓主事一人與御史一員同典出納又請侍郎一員専稽其數上加奬賜庫名曰節慎自是財無虚耗司屬亦免於贓敗部每嵗内府二十四監局上供料價并不時題𣲖輒淆典式不受覆覈公考據前章或議罷或議減不輒循又擇其甚者十二事條上得㫖裁之省費十之四五中貴人用是切齒會己丑秋七月上遣近璫督造龍袍于蘇松公謂監局自有常供請停便忤㫖勅致仕辛夘安陸大雨顯陵殿宇滲漏以興工在視篆時追論落職閑住公自退歸寓居長興之瀆南坦一室頽如家無貯積郡守萬君雲鵬往候之重其清貧為築讀書臺邑令楊君上林又為之建堂曰廣心堂有亭曰澣露因阻涉乃駕橋於門曰龍津斂徳嘉遯盡謝生事非慶弔不至城郭都邑之政無鉅細絶口不談公卿臺諫推公行誼頻薦於朝有述以相告者公若罔聞焉滿室惟圖書數巻朝夕省玩有所得輒書屏間久之屏表裏斑如尤恐衰暮有過舉平生盡棄之扁於室曰志率勿使氣勝門無俗轍獨文儒至則展所蓄諸名家翰墨欣賞終日曰吾堂不寳金玉不襲文繡敢以此侑觴晩嵗好樓居寡力自營索其友文翰林徵明繪神樓圖字之曰髙明所廣其義集古詩十六題以自况又題其楣間曰半壁時觀我羣峰日可賔蓋蕭然超脫於風塵之外其于文沖泊雅澹中有竒崛氣皆㝠與神會詩擬盛唐書法宗羲獻以還尺牘片簡人争寳之及山居日久心鏡澄徹妙契𤣥理以故聰明色澤彌老不衰至辛酉嵗忽一日命書曾㸃暮春者至詠而歸一段懸於正寢朝夕相對怡然自得人莫測其故至四月初二日無一語及家事神清氣爽而逝視所懸暮春而歸乃前知也初配胡氏南康太長公主曾孫女封安人贈淑人繼王氏南京禮科給事中徽之女南京太僕寺少卿韋之妹也封淑人子二長即牖娶館陶縣知縣吳綋女次序溧陽縣學嵗貢娶南京右副都御史王守女皆側室田出女一胡出適陜西苑馬寺少卿周仕南京户部尚書襄敏公金之廕嗣也孫男十一孫女十二曾孫男二曾孫女五予嘗閲公素履前後罪廢及謝病凡四如蟬飲露而蛻有終焉之志朝廷屢以恬退徴進至大僚而公亦随事盡職求利國安民於權歘禍患不能攝沮是其進也足以匡時其退也足以表俗不為世衡凖耶王宫保稱公孤處虚奥而天地變化萬物之委瑣㝠昧靡不灼睹洞辨施而行之無所不極李太宰又稱其彬彬文質君子是皆觀公之深者予因表於墓以風後人使知屢進屢退如公者終不失步於聖途矣小傳資善大夫吏部尚書建安李黙譔坦翁年八十餘常披褐扁舟往來太湖間湖中人不識也入城郡輒繋舟峴山隱處郡大吏造請不能得予自浙左轄被召過湖物色遘之則前司空劉公麟也司空晩居故鄣之南坦不知者輒呼為坦上翁云翁字元瑞本安仁人先世以武功起家累調南京廣洋衞副千户世敦徳誼至翁始以經術舉應天登𢎞治丙辰進士是時外戚張氏貴幸頗驕横骩法臺諫擊之逮治甚急翁與同年歸安陸崑抗章申救敬皇為之霽威事尋解稍除刑部主事進員外郎以才選録畿内囚所疏雪寃痛無慮數百人老吏謝弗及轉郎中擢守紹興漢劉寵故處也在郡精核廉敏甫五十日郡聲大和逆瑾銜翁出守不修謁猶掇郎中時瑣細廢為編氓郡人争致贐翁曰勤苦諸君吾治不逮前劉敢䝉一錢惠耶既去越人肖翁像為小劉祠語在太宗伯王公華記中時與湖吳珫施侃龍霓及崑定交因徙居於湖山人孫太初亦以羇旅入社湖中風雅稱中興焉瑾誅起知西安遭内艱去郡其得秦人心與郤賻賵無異越時服闋遷陜西㕘政屬闗内饑虜數入朝遣貴臣督兵將厚賦興軍諸司莫敢持異翁曰靖邊以為民也饑年加賦内難獨不可䘏耶使者色沮會有赴闕陳訴者命與㕘政共圖其便議遂寢翁亦嚴覈侵漁括逋負邊儲竟以不乏踰年擢雲南按察使謝病歸嘉靖更化起為太僕寺卿擢副都御史巡撫北畿復引疾章三四上始得請時論方髙翁才節再起為大理卿尋陞刑部右侍郎陞工部尚書水衡泉貨之府髙潔士頗避之公咨白吏部選才廉充曹任仍請築外帑刷四司之財貯之特銓主事一人與臺臣同典出納上嘉翁意賜庫名曰節慎自是財無氾出吏有廉名實自翁始凡工部上供率闗内府所見徵輒淆典式不受覆覈翁條上最甚者十二事得㫖裁之中貴人用是切齒會上遣近璫督造龍袍于蘇松翁謂尚衣自有常供請停便上以為忤勒令解職久之猶以顯陵工薄遽奪官追前過也翁既斂徳嘉遯益逺世紛里中竟若不知有公其于文能以沖泊雅澹之詞發瑰瑋竒崛之氣窈渺之音穠纎之色皆㝠與神會書法宗羲獻以還尺牘片簡人争寳之至與人談謔往往出㣲辭臻玅趣雖䝉孺俚生咸樂自近云早㕘𤣥理兼達天命嘗請浚川王公廷相預作墓銘今聰明色澤彌老不衰其天全也惟不貪生故能長生信矣心慕樓居無力築作友人文内翰徵明為寫層樓圖遺之常懸置北壁下命之曰神樓賔至則陳法書名墨以為娯叩以時事即不答公卿臺僚騰章交薦翁不知也雅性清約蔬布自喜獨事繼母曳遇異母弟鳳尤篤恩禮先人田盧悉以委之其不以豐約累志如此初翁僦居溧陽予嘗遣門人候之翁引至臥内見四壁惟掛書數束他無長物又二十年觴予于峴山逸老堂了無宿具臨以乳羊博市沽風雨蕭蕭欣然達夜惟其真也黙所觀古今人好名檢者或缺理略富文藻者或寡風節兼之實難若翁者彬彬文質君子也翁二子牖序克世其家所著詩文奏議凡若干巻贊曰坦上翁自為郡守至大卿數棄官以去朝廷慮不時起輒以右職徵之國家獲尊賢之名士大夫慕恬退之節天下莫不歌詠盛美蓋見素林公俊以來所希睹也晩節齟齬膏屯未施豈不惜哉黙以為翁掞文似公幹治財似士安剛介不撓似器之至於廉約省素家無貨積位列三事以功名始終此與東牟劉祖榮何以異哉世稱二劉不其然乎履略奉議大夫通政使司右㕘議崑山張寰譔南坦翁劉公麟字元瑞江右安仁人也晩居吳興之南坦學者尊稱之曰南坦先生先世以武功授山西平陽衛後所副千户嗣世改南京鷹揚衛又嗣選賢調廣洋衛俱副千户自鷹揚公家金陵翁生於金陵弱冠領𢎞治壬子鄉薦丙辰登進士第與同年進士歸安陸崑觀政虞衡時外戚用事蒼頭驕横干紀怨聲載路科道官龎泮等交章論劾上怒悉下詔獄臺諫一空以中書併刑部主事等官視其篆中外駭懼陸乃颺言曰是可諫矣翁時奮激首與聮名具奏大意以為通治道而來諫議古帝王之盛節一旦沮壊後有利害誰復敢言雖坐停格獄亦寢解尋丁内艱歸制終授刑部主事門無私謁以資陞員外郎奉璽書録囚畿内畿内多貴倖獄事重大部議以翁領之至則布徳盡下周歴逺攬邊鄙悉到大辟重囚辯問者若干情可矜罪可疑者若干事無証佐可結正者若干通計死囚全活者共三百九十有竒輕罪囚奉例減等釋放流徒笞杖供明寛免若干共一萬六千四十有竒事竣陞郎中正徳戊辰出守紹興于時逆瑾擅權士大夫遷除者必候謁翁獨不往捧檄遂行履郡以廉勤公恕率其民簿書不厭刑獄不滯共億不濫誠心貫於庶政甫五月而民皆嚮方諸司賢之中官銜之掇拾細故廢為編氓㫖從中下下之日郡士民奔走號呼如失父母集千金為贐笑曰昔寵一錢吾與寵孰多若等謂古今人不相及耶麾之去越人頌徳肖翁之像為小劉祠謂可以嫓美劉寵云大宗伯海日王公華紀其事於石今郡中刻有遺愛録時翁歸值嵗祲斗米百錢家有饑色士大夫相率曰可使劉元瑞至是耶于是崑適以逮繫至南都慰惜尤勤呉子珫施子侃皆慕翁道誼忻然迎之入湖相與論道䝉山之董塢闗中孫太初方僑居于湖談說𤣥理詫相見之晩會龍子霓亦至遂結雅社為湖南五隱吳子得翁契分尤加締為姻好未幾逆瑾誅起翁知西安陜民戴之猶越也遭内艱訃聞即日就道藩臬諸大夫交異之陜之僚屬偕其民集千金為賻卻之如越都憲藍公某憂其無以為喪檄諸司治車馬之資翁又卻之㑹江右藩國之變弗克歸安仁乃葬先大夫于呉興石鼔山南服闋遷陜之㕘政是嵗闗陜饑戎馬内侵朝遣貴臣執峻法臨之議軍餉將厚賦秦民諸司唯唯翁曰不可靖邊本以為民今若此内難亦可慮也使者變色曰憂民者獨㕘政耶翁不答時陜民已有詣闕赴訴者朝議特命翁㕘預餉議使臣為詘加賦之議遂寢乃精覈儲政大抑侵漁正賦不瘉邊餉亦足自是政聲彌著逾嵗擢太僕卿時繼母曳淑人疾家累留侍翁獨旅寓每退食焚香如坐禪室首相石齋楊公廷相一日過翁之門見雙藤倚户飄香載道驚問曰此内為誰曰劉卿也公嘆賞遣人致意而去尋擢巡撫真定翁禦戎設險儲蓄任人畿甸以寧病復引歸又三年改大理卿尋改刑部侍郎會工部尚書缺以翁進補命下之日羅峰閣老曰古者司空作相天下事共理幸毋多讓翁遇事不設嫌又咨白冡宰進退其屬郎吏皆俊髦乃益展布百度用貞部供費極繁浩舊不治藏出入細吏領之坐是國計潛耗翁創議曰古者愛民必先節用財貨國脈民命所係乃疏于上請治藏乃可鳩工度材區畫備具復言於上曰用財宜節取民宜慎上嘉納之賜名節慎日計視籍月計視日嵗計視月皆御史與其屬共理之自是貪鄙者無所容君子謂其理國如家度越前代又造作咸闗大内者二十四監局率縻費不恊典式嵗計浮汎無慮萬萬翁擇其甚者凡一十二事條陳疏上得允大約節省者十五于是中貴人不便皆切齒會上御龍袍段疋不任監局之舊命所親信者出造於蘇松翁以為非舊議罷之上已俞而尋悔卒以為忤勅致仕實嘉靖己丑之嵗云入仕四十年而生理不踰中人栖於坦上一室頽如也郡守萬君某往候之病其隘為築臺始有臺邑令楊君某載酒往共酌病其隘為起堂始有堂巡按御史張君某為樹綽楔未幾火周君某將捐金復之翁力辭周不能强楊紀其事銘諸石楊為亭始有亭居澗谷之間楊數臨訪因病涉乃架橋於門始有橋臺曰讀書堂曰廣心亭曰澣露橋曰龍津林居茍完盡謝生事夙無寵姬外無歌童帑無厚儲庖無珍味韋布猶書生惟灌畦賦詩為樂非慶弔不至城郡郡邑之政無巨細悉屏不聞門無俗轍獨文儒有至則傾倒盡歡翁性孝友事繼母若所生異膳宿肉月朔必冠帶見誕日率諸子弟拜祝堂下獻幣陳殽極歡淑人安其養淑人卒襄事必誠必親繼母弟鳳勿與外事先大夫遺有屋盧悉以付鳳一無所取宦歸以俸餘買田益之二𦙍子牖序咸若于訓臧獲數輩僅給灑掃而已論交海内名士嘗曰吾居山中久孫太初吳甘泉凌練溪諸君子並逝陳棟塘又僻處吾有離索之嘆聞海濵浦伯兼南金醖籍明達有行義呉之彦吾之益友也今為湖郡博殆天畀之乎翁所蓄諸名家翰墨嘉賔至輒具陳欣賞終日曰吾堂不寳金玉不襲文繡此有觴敢以此侑君子謂其為大雅云至於進退之節尤謹諸御史推薦徳望必以首稱翁聞之無喜色有後進陟樞要者又夙有交與謹避之有貴重臣取道于湖翁若勿聞也者而亦不言故讀古書有所得輒書屏間久之屏表裏斑如自咏曰山堂刺繡五紋披實自譽云又曰士人身如處子幸自獲不敢從人若有過舉將盡平生棄之扁於室曰志率弗欲氣勝之也翁晩嵗好樓居寡力自營索其友文翰林徵明繪神樓圖字之曰髙明所廣其義集古詩十六題以自况索予用韻日夕燕息其間若不知在人間世也自題其楣間曰半壁時觀我羣峰日可賔軒之内曰内光亭儲書滿架日課諸孫其中皆青雲器也註釋丹經種種凡若干萬言不輕以示人翁今大耋將臨齒髮無恙步履視少壯與知己者言雖終夕忘寐謂翁善攝生其信然乎寰不敏自筮仕濮守受知于翁翁時以大中丞巡撫真定陟少司冦為翁屬吏待之殊禮陟大司空剡薦首及期以逺到頻年招我入社共持晩節翁之律已如對嚴師蒞官如臨上帝平生大徳無慙細行亦謹孔子所稱君子人與孟子所謂大丈夫云云者可以儗諸其倫使翁久於其位晉握台衡功在社稷豈云小補海内蒼生締望日勤而當道之剡薦無虚嵗君子謂其出處闗係吾道之重輕念翁於寰分雖僚屬義兼師友知翁者無逾於寰敬為述其履略尚徵鉅公名筆為之立傳亦足以垂世訓云大司空南坦劉公神樓頌余任部郎轉知池陽郡南歸時適南坦劉公八􅐆初度蘇内翰文衡山先生同集壽燕繪寫層樓圖為公祝曰翁嘗心慕樓居無力築作今值上壽徵明無以為賀繪公神像於層樓之上命之曰神樓祝公如僊為之歌曰僊人謾説愛樓居咫尺丹青足巻舒坐守黄庭幽闕迥讀殘真誥夜忩虚游心物表疑無地寄跡空中樂有餘一笑欄干不成倚浮雲奄忽意何如南坦公欣然拜而納之曰誠余之素志也因步韻作歌曰塵勞今日始樓居興逐閒雲共巻舒直以躋攀酬揖讓更憐吟眺得𤣥虚蝸蜒已作栖神計蜃氣能傳結搆餘黄鶴不來心獨苦赤霄飛步定何如喜意盈溢又為之歌曰客指紅雲教卜居中天樓觀本安舒常迎紫氣朝看日獨御𤣥風晩步虚六鑿已收還五内一塵不到養三餘東逰欲問乗桴叟由也相從恐未如載賡載歌以嘉以樂一時人文之盛香山洛社無専美矣毘陵大司農約菴周君與翁姻婭執爵進祝且為謔言以語文翁曰神樓之繪南坦公誠無負矣但斯樓上不繋天中不倚人下不負地空空洞洞無階可循無級可升南坦居之不已危乎座客皆皷掌一笑時寳應射陂朱子介宰烏程尹亦執爵而祝曰藩洵知南坦翁之樓之神矣願效晉魏詠言以歌之歌曰神樓一何峻神樓峻而安胡不京洛逰畏彼峽路間峽路誠﨑嶇險于太行山歌以言志神樓峻而安凡六闋三呉縉紳家忻慕風雅之盛步韻而詠者無慮數百餘章鄉民具瞻莫不嘆曰有官鼎鼐無地樓臺南坦公之謂乎翁答曰吾山居搆一茅亭題曰盤之中蓋取李愿盤谷之意也盤中詠時事俚語曰結屋誅茅住白雲道懐元不愛囂氛郭侯武定侯勲夏相桂洲言同朝士最好光華最誤人亦斯樓之實境也時浙有開府劒門趙炳然者知翁精力尚壯與一菴唐主政二老奏聞起用翁聞之曰吾將洗耳於盤水之隈又恐有飲牛上流者尤以為諐也臥我於神樓之下耕而食鑿而飲帝力何有於我惟應和侍翁杖履最久先君矩齋公與翁志同道合聲聞於上朝議有陳恪劉麟氷清玉潔之許一時寮采莫不嘆賞揄揚不幸先君以大廷尉遘疾弗起而南坦作誌銘曰時維思齊以頡以頑公不瓦合吾不毁方公不黷貨吾不厚藏公不茹柔吾不吐剛其契洽有如此應和思展孝徳以叙通家因作神樓頌以志公之碩徳曰惟公正直之氣卓越之才清白之操藻翰之魁揭英標於末俗駕逸軌於先民羔羊素絲其節槩清霜紫電其精神耿介特立古泊清真敭歴中外秉節三朝方筮仕觀政即疏救言官輔臣罔不遜服繼奉命恤刑多疏雪寃痛老吏咸謝弗及出守紹興遺愛有集一錢配饗臥龍有祠抵觸奄奸奪職編氓越民追號如喪考妣大義既白西安再膺交章論薦郡守越級而陞藩㕘三載亢旱莅任是日而霈甘雨天人交格撫按側目時正饑荒邊釁復遘朝遣内臣加賦充餉諸司莫敢持異公力寢朝議而征斂不及於瘡痍多方賑貸而邊餉又得以充給陜民戴之猶越民也隨陞滇南臬憲以外官而奉㫖養病殊典異恩㑹嘉靖龍飛而行取太僕超擢不次撫臺風動乎列弼司空翊贊乎國鈞炳幾先於創庫節慎有徵釋班匠於濫役民隱是恤清解納以塞弊源掊剋屏跡清監局以遏内濫帑藏充盈革織造之内差外無聚斂免莊田之汎及下有規程憂國奉公始終一誠帝咨宰臣僉曰忠清擬諸氷玉朝宁標名忤觸權奸甘約終身正急流而勇退披坦上之荒榛超然物外神樓寓情案有竒書門無雜賔葆靈光以内視探𤣥理於無垠綜九流之奥㫖潄六藝之芳津文章山斗人物權衡主湖南之雅社寄晩節於松筠角巾卉服布韋如初田廬可以息躬即不置棟宇山川可以寓目即不設臺榭子孫可以稱家即不問生理圖史可以娯志即不嗜絲竹世物一無所繫而於交好則澹如也寵辱一無所驚而於進退則裕如也非慶弔不履城市非詩賦不集燕會髙臥林丘蕭蕭一室望道虚懐亹亹不息論議邁乎衆見歌咏迥乎凡格縱怡情於和洽而語以時事則正色發逸思以優游而聞以家政則不懌清苦性成無求自得聞其風者真足以廉頑而立懦飫其徳者若有以茹甘而飲醇至其殁日身無為殮考其生平卓有髙標誠天地之間氣生平之竒傑者也前巡按御史龎上鵬題其墓曰駿業鴻名洋溢朝野清風髙節表正鄉閭大學士李春芳奏其諡曰本官守潔行端才竒學贍令譽久馳於仕路清修尤重於鄉評出處無疵始終一節奉䝉先帝嘉納賜諡清惠蓋與夷齊並美矣公之受知於上下者固如此愚不敏辱公知愛之深敬叙而贊之以為頌尚有俟於史氏之秉觚云賜進士出身嘉議大夫河南布政司左布政使前奉勅提督河南學政眷生陳應和謹頌六不朽陳應和述清惠公任工部時為國朝樹不朽之業凡六事嵗癸丑應和官屯田郎署仰公遺業守而弗失揆厥事原皆公視篆時所剏因著述之以表其忠懇沈實及䝉玉音贈諡清惠曰爾性資直諒才識瑰竒剛介持身忠勤體國良有以夫一首建節慎庫國家經費出入錢糧皆工部所轄舊制四司分庫冒濫無紀司官多以贓斥公奏建總庫一區請名曰節慎逖在部堂之後每季奏請臺臣同典出入嗣是國費有經官無冒濫未幾工部災四司皆燼惟節慎庫獨存累世帑藏得以保全故薦公者皆曰創庫有幾先之見云此最闗乎國計之至大者而公不朽之績與國同休矣二革班匠之濫役以活生靈舊制天下匠籍每户各抽一丁間闗萬里往役京師凡為金銀銅鐵錫木石機皮裁縫泥水等項無慮數百萬人每夫給付花欄大票内開本丁姓名年貌籍貫并輪該上班年月日期失此票者問發邊衞充軍夥聚京師閑散無據朝廷用之有限乃濫役於中貴權幸椒房戚畹三公九卿各衙門扮作輿皂跟随老死他鄉轉於溝壑俾父母兄弟妻子不及一面清惠憫之奏准釐革舊制令天下匠籍各科匠班銀兩每丁若干解京聴憑僱募畿民為之其往時濫役之輩皆撤歸原籍寧家其子孫世免奔走死役之苦皆公一念育民之仁達於聖聽而致之於袵席之安今其制在各郡縣安而行之不知伊誰之力比時惟衛涯霍韜擊節嘆賞曰今日方有工部尚書云千百匠役皆懽忻鼔蹈而歸是公之陰徳與此制同垂不朽矣三清解納以塞弊源事凡工部所屬解京錢糧每嵗無慮數百萬緡各處司府吏胥收解員役乗機冒破者無可稽查多致先科者被侵未解而後徵者累積國費不給而民脂日耗清惠燭之奏請立循環簿二扇凡本部應解銀兩開載於簿各該巡按御史出京即領一扇覆命時到部稽查本院巡任年月解過若干未解若干以騐賢能又令各郡縣官每三載應朝各帶工房書吏一人聴部清查解納以塞弊源自是錢糧有稽而監收冒破之弊塞矣四清查内帑錢貨以遏内濫大内二十四監局自國初到今積貯朽爛侵冒等弊未經查覈向來部曹官員恒為身圖不敢稽及内臣以為國計清惠公剏始具奏凡皮張盔甲銅鐵等項計一十二條奏准應查究者查究應更換者更換應新增者新增搜剔靡遺而内帑之弊袪矣凡此有禆於國是遑計近侍之搆怨由是迹不於朝矣五查革蘇杭差遣織造内臣以恤民隱凡内臣出京必致侵剋官錢糜爛百姓清惠公憫之奏謂凡天下守土之官一應起徵錢糧皆得領解到京守奉批迴無誤何獨織造一事必欲差遣内臣以滋冗濫况尚衣自有常供織造舊有定制合於本地方差委府佐貳官監織督造就令本官領解到京一體守奉批迴可免侵費十之五六此民隱之當恤者疏上中貴人銜之矯㫖勒令致仕今覩兩朝恩詔各有免差織造之條其有見於清惠之忠謀也乎六奏革莊田以甦民困事先是正徳末年中貴權幸椒房戚畹王府勲尉之家莊田無慮數百萬頃近畿之民重困之清惠公奏准定制無得恃勢踰越以致剥民自是權貴斂跡而民困得甦矣蓋公之風裁正直不以身之進退榮辱為念而惟以民之疾苦存恤故不阿於近習有如此孰非其忠勤體國之心哉余故紀其實以志不忘云雲南按察使告病乞休該巡按雲南監察御史宋批詳看得本官稍有不安就行勇退固潔已矣如蒼生何稔知本官素抱誠明之學久昭平反之政前守紹興徳愛已見於生祠近尹京兆撫字更孚於閭里轉茲臬憲正宜大展謨猷用副委任豈可遽以小疴輒欲歸休知賢未舉在我已不勝汗顏有道勿施在伊亦難以辭責仰司即便請擇明醫及時調理候病痊之日視事繳清惠公像贊猗歟異人狀貌若愚静以照物動以需時事不安排意無拘泥平心率物任理無為常欣欣而適不戚戚而悲單褐無求不隕穫於貧賤三命循牆不充屈於富貴兩為郡守而愛民若子弟屢秉鈞衡而疾惡如鴟鴞事之無害於義肯少同乎俗大節所闗大道攸繋確乎山嶽之不移家無儲而置之若棄人有善而進之恐遲祁寒暑雨小民怨咨則憂形於色邊靖民安國家無虞則喜發於詩對妻子而無私囑御衆庶而忘町畦問之鄉人曰若人也初不見其異也問之國人曰若人也久而信其無偽焉問之天下曰清而不耀志而晦㣲而臧其允蹈之君子與所謂在位無赫赫之光而去每見思弱冠登朝同子期之練達年踰八十問學不廢効武公九十而箴規扁曰南坦蓋以著其志坦以南稱不忘其所産之地亦紫陽稱新安之義云孔曰君子坦蕩蕩蕩蕩故坦迺公固有之徳愚推廣其義居天下之廣居仁育萬民包四徳尚當以天民為青史纂焉賜進士中順大夫知湖州府事前廣西道監察御史餘干及泉李頤謹贊巡按江西監察御史朱勘送饒州府安仁縣鄉賢祠祝文萬厯十六年嵗次甲子三月甲申朔越三日丙戌巡按江西監察御史朱鴻謨謹以特羊菓品香帛之儀致祭於崇祀鄉賢清惠南坦劉先生之神曰惟公嵩靈夙粹發正氣於西藩宿象輝纒擅文明於南省巍科早掇主政榮登賦性剛方即一諾而不茍宅衷蹇諤縱百折而不回任越守百日而抗違閹逆之譴㕘陜政初辰而霖格四年之旱愛鍾民瘼生祠儷一錢之英碑勒臥龍甘棠詠萬民之頌清譽赫乎鵷班徳望颺於鳳陛位躋八座忠貫三朝剏節慎大庫而公帑無災革織造内臣而誅求悉寢直道忤時致政南歸怡情山水樂志烟霞辭金當道真松栢凌霜絶足公庭惟葛巾適體一筯虀鹽無異蔬食水飲五賢詩社何殊弄月吟風誠所謂進有所為退有所樂昭代偉臣三朝元老也壽厯頤期考終僊逝仰荷渥恩特隆葬祭之典聿加美諡榮膺清惠之稱孤貞沐此以褒嘉泉壤承茲而炳燿鴻謨等幸獲觀風於斯地禮當瞻拜於下塵深惟表揚之政職所當先慨夫忠節之英世不恒有今者大彰公道博採輿情闡幽光於既久紹祀典於方新卓卓髙標此日香生俎豆輝輝駿烈他年祀永宫黌覩往勩而興思恭陳薄奠風後賢於仰賴敬表㣲忱尚饗知紹興府劉侯去思碑記漢劉寵為會稽太守及被徵去任山陰有五六老叟自若耶山谷間出人賫百錢以送漢史傳其事不過曰簡除煩苛禁察非法又曰犬不夜吠民不見吏而已此外别無赫赫之功足以竦動人之觀聴今去漢千數百年寵猶廟食茲土百姓猶歌思不忘正徳戊辰六月刑部郎中劉侯元瑞擢守吾郡甫五十日輒罷官去百姓徬徨如失父母乃日會聚於神祠佛宇祈禱卜筮謀所以留侯者而不得則相與聮名列狀赴愬於部使者以求復侯之官不可得又相與罷市易捐已貲將不逺數千里走京師以聞於天子以求復侯之官卒不可得則又相與扶持老稚填郭溢衢追送至數十里外侯數停舟麾謝衆猶擁遏不忍舎去道路觀者莫不嘖嘖稱嘆以為數百年來之所未見世嘗言今之人不古若即侯之去任視寵之去會稽豈相逺也或謂侯之在郡纔五十日而止即其五十日之所設施雖有良法美意亦豈能家至而户到雖吾夫子綏來動和之化其相魯亦必誅少正卯禮却萊兵三月而民始歌誦之侯在吾郡未嘗見其按一貪暴旌一善良也直以亷公儉約弗擾于民而已耳固未始有一日勸懲之功而吾民視侯乃有千百年固結之愛使侯久於其任得以究其抱負設施則民之愛戴思慕又不知何所底極也且寵之去任被徵歸朝侯之去任被黜歸田其榮辱懸殊也而百姓之送侯者所至千百成羣不止五六老叟而縉紳士夫又倡為詩歌以送之都邑游居之良山林隠逸之彦又從而屬和之聮為大巻輯成巨帙視人賫百錢以送者義利夐絶謂今人之不古若豈其然耶孔子曰斯民也三代之所以直道而行也侯惟以三代之民視吾民而吾民亦以三代之民自期待而近世厲民自養者往往牴牾吾民以愛憎為毁譽是果何謂耶侯既去郡百姓思之不置則有相與謀肖侯之象立祠於卧龍山麓葢將尸祝而俎豆之祠既成耆宿王行輩過吾家而告之曰知侯之真悉侯之美宜莫如公者願俾一言勒之貞石以永吾民之思予曰古之循良不嚴而化不令而從所居民愛所去民思生有榮號殁見奉祀侯其庶幾矣雖然衣冠儼然使人望而知愛敬者侯之像萬目所快覩也其有無形而可以感孚民心於永永者侯之徳百姓不能忘也然有形乃無形寓則民之肖像立祠樹碑雖非侯之心實衆之願也予何敢辭遂為之記侯名麟南京人由𢎞治丙辰進士起家至今官百姓稱為新劉云系之以詩曰嘅惟越郡僻處海隅厥田下下載於夏書厥民愿朴迺農迺儒迺賈於市迺旅於途服勤終嵗僅足食衣吏政張急民命靡依漢吏劉寵治稱循良民用弗擾遺愛甘棠歴千百䙫清風日渝以暴濟虐邦本畢逋天子踐祚嵗維戊辰劉侯繼牧字我越人盡蠲衆瘼易虐以仁前創後述是祖是孫始時和買害甚天災侯平物估商價悦來始時徭役嵗無月虚侯䘏其力閭閻晏如越人徤訟䑕雀相猶侯潔其源乃清其流越人畏吏如虺如蛇侯室其穴雞狗不譁疇昔公讌越舞呉謳侯躬儉約屏去伶優疇昔賦稅誅求羡餘侯謹權量民樂貢輸侯在泮宫講禮説詩濟濟多士是式是儀侯莅轅門恤軍練士赳赳武夫戴如父母越人有言我侯至誠狡猾譎詐罔敢不情越人有言我侯執法頑嚚暴悍咸若厥則民方懽慶而遽罷歸如兒方乳奪我母慈凉凉行李蕭蕭去騶扳轅臥轍願侯少留侯不可留其歸甚亟悠悠我思曷有止極蜀留詠儀魏祠梁公峴首悲祜異世同功清江之滸龍山之陽兩祠對峙屹乎相望侯徳在民侯像在廟清風邈然後來孰紹正徳戊辰秋九月吉旦賜進士及第資善大夫南京吏部尚書致仕前詹事府少詹事兼翰林院學士經筵日講官同修國史會典餘姚王華撰清惠集巻十二
