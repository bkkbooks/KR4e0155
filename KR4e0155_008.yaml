body:
  text: 清惠集卷八明劉麟撰碑邑侯萬西原去思碑西原萬侯治長興政成而去民思之不置於戲此兩漢以上事也今復見之孔子曰斯民也三代之所以直道而行也好惡拂人之性亦出於偶然古義不終絶也良以大夫治行久而愈光雖州里之近凖之天德王道罔不合一蓋政無大小得其本則萬化從之則然也雖異時亮天熙載有二乎哉南坦麟病垂死兒輩禱於神祠逢諸思者如泣如訴禱竟不去兒問曰老有瘁色何也朝不食歟夕不食歟不然則無衣無褐也渠曰不然客嵗無禾中稔蠶績亦成第丙辰以來賦繁役重二月之絲五月之穀皆已乞諸鄰里正不知何以卒嵗或曰時事使然悲無益也老曰吾不徒悲思萬侯而悲無依耳賦匪常賦役匪常役何代無之萬侯平其政吾無憂也昔者徭有偏重毒如天災侯實憫之乃括查丁産叩為十段以此輪編百役惟均彼秦越其民聽其流亡者其侯之罪人也踵侯之武吾黨自食其力瘁不至此侯乎侯乎治常如此實生我也如之何其弗思乎又曰我侯孔武沈謀潛運足以定國安民方倭奴深入聞變惕然乃遍歷湖山度其形勝守要於山設險於水可戰者以戰為守可守者以守為戰藏以九地動以九天使民如神姦宄恃以無恐爾乃選精拔鋭朝夕訓練戰守之法親長之義無不申嚴恩信皎如日月望其氣知其兵皆可與之死可與之生而不畏危者此無他分數定而刑名精也方張之冦聞之逺遁一邑生靈賴以安全彼權謀家快心一戰流毒四境死轉輸者十一死鋒鏑者十九父母之責誰其任之其或膏粱紈綺不教而戰又其最下皆侯之罪人也踵侯之武吾民將萬年保其家室侯乎侯乎應變若此如之何其弗思也又曰我侯靈明有相若古鑑無埃也懸金於門死囚歸獄減耗於倉輦任畢來民以為神我侯奉職如此思之若廟見神明何時而已侯善政孔多吾輩衰老不能盡述幸逢儒秀為一拾其遺兒曰曩者盛夏天時久旱侯乃率屬䖍禱徒步蔬素或陟在獻或降在原三日得雨侯勤苦不已又三日得雨雱𩃱嵗用大稔萬姓賴以生活老知之乎老曰吾黨本從侯上下潭洞拜舞之人野廟匆匆庶其今雨某有罪焉兒輩又曰昔者鄰邑縱虎出匣捕收小兒侯極力救護幸不盡捕官失其綱五霸蜂起搆成大釁翁知之乎翁曰吾小兒在捕仁恩淪膚浹髓今適遺亡失今不言侯善泯泯微子之言獲罪於天廟貌森嚴神必殛我兒歸具述欹枕聽之心戚戚不已嗟乎麟亦仁覆中之一也百口之思與老人何異無何諸耆舊叩門一老前致詞曰祠中之遇吾黨不能已之至情也幸夫子筆之於石久之將物於物而造化之變與之俱往豈不惜哉囂如聚訟訓師張君􅀈山亦來問疾因聞諸老云云張怒形於色叱之使退師且曰汝等知其然莫知其所以然也一貫奉侯最久自下車以至就徴常祿之外一毫不取於民凉凉行李送者悲嘆故事公者遺侯一無所受富商巨室聚金二千有竒追之雷淀荒墟暮夜民或言之侯嘆曰此物奚宜至哉麾之使去兩舟判然嗟乎夫君子之所不可及者其惟人之所不見乎雷淀之却與楊關西四知何異大節如此肆今諸政風行草偃皆本之此良由至大至剛之氣侯能以直養而無害其所以然也老人之請幸夫子許之乃揚言曰吾所聞者則異於是麟以安仁之故得與太翁前霸州公共守鄉例嵗時入飲魚魚相歡侯以家範忘其所謂尹者翁亦愆愆申說家常酒數行翁曰吾育此子恩斯勤斯又誠憫斯生今學古物之則也吾生瞻慕者宋司馬君實也兒五六嵗則以馬公五六嵗事訓之兒十五嵗則以馬公十五嵗事訓之豈不知古大賢不可企及祗恐杜季良豪俠之風先入膠不得脫吾志荒矣不然婁師德可耳麟得之嘆曰橋梓之志如此豈可量哉今侯宰邑退若處女及其臨事勇如一國交神明却强敵德盛政修所居民安既去民懷求之兩漢循吏何以加諸夷考君實當時君子稱之曰能受盡言又曰如麟如鳳不鷙不摶霸州之大情可得矣嵗癸丑霸州歸南昌亦時時書來詞指一致今侯之所施設無非是物霸州可謂善教侯可謂善學根之深者其光華是則其所以然也獨求侯以跡非知侯者管窺何足以盡豈宜書石老人嘆曰吾黨死期漸迫惟石是賴麟曰此峴山羊叔子事也今百世之下知有羊公墮淚而忘其石是羊能傳石石輕而羊重也宜圖其永老曰不然吾黨所重在石南坦子年亦八十有四即嫚罵曰吾過矣諸老之言是也一笑起而走筆侯江西南昌人嘉靖庚戌進士諱虞龍别號西原先生諸老又曰同有是思者庶老若干人方中人已礲諸碑願采之書之碑陰墓志孫太初墓志銘太初不知何許人自稱曰關中人人亦曰關中人湖南雅社西溪龍致仁題其名曰太初關中人正德戊寅秋八月僦居湖南之後林村是嵗娶妻己卯舉一女庚辰二月二十日卒無子未卒之三月甘泉吳汝秀玉崖陸如崑作湖南雅社得五人太初在焉甫㑹於甘泉之太古居太初獨不至社中欲規之太初且疾革衆將視疾太初忽以後事來告告玉崖曰葬吾骨得名山焉告邦直之家曰收吾書恤吾家告麟曰題吾墓且銘諸幽持手稿若干卷告衆人曰晉安鄭子繼之知吾言是在繼之比麟往問太初方苦渴撫膺太息曰茍不作速化斯已矣麟曰結纓易簀何人也乃黯然伏枕安于疾察其肌理美好如平居疑其有生也叩名醫之門再拜為之圖至則無所庸其術又數日竟不起既斂之三日玉崖卜葬得道場山麓曰崑也無宿諾將以近某日行事以是銘不及其葬太初之卜隱湖南也實主施子邦直問婚得張氏遂與邦直聮婭其在交逰為最厚屬纊之日邦直方會試禮部不相及歸而哭諸墓反于室有餘哀顧內子語曰太初以大義屬我安忍愧其言而語而妹曰矢厥志之死靡它吾固恤其家乃數遣姆氏往諭意還報皆曰諾無何繼之來弔收太初遺稿將以梓於世邦直得之述於狀來徴銘曰吾恐太初墓且宿草矣先生其終之又相向垂涕洟而言故退而序其事為之銘太初諱一元太初其字也生七年而警敏不常十三讀老氏書至專氣致柔之說委心其學有遺世獨立之氣辭家去入太白山守中致虛以為常因以太白山人為别號既數年東入華南入衡又東登岱又南入吳㑹比至愛其山川學士遁迹其間殆且十年遇竒書一覽得其雋腴為詩先氣格有刮劘胃腎之功與名流相倡和馳其聲於四方其初至吳興與吳甘泉逰時年二十有九尚未有室既逺鄉井又寡兄弟形影相弔怡然終日望之者見其睂表炯炯魁岸逈立爭相駭慕嘖嘖皆以為仙麟與凌時東嚴季祥施邦直則以語孟緒餘時時向太初談說始若疑中若詘終則釋然安以悅卒能使太初棄其學以吾黨之學為學者邦直之力為多然而尊賢取友太初亦自得其本也吾人望於太初者何如今則乃爾於戲天乎殆不欲吾雅社增重於世乎何畀我良友之晚而奪之早也其或厭我凡近遵彼舊學羽翰而去乎何幻景遺光一耀而不留也孰謂風槩若斯人者俯仰一無所遇而宛然以死也今而後知人之工詩不獨能窮若太初者吾不能不致怨於其詩銘曰猗此踔犖離羣絶伍揚晳虬髯雲蒸月吐攬嶽浮江窮竒弔古玩世豪吟興衰黜嫵駕材于白用格于甫蹊徑若存一變至魯遁迹吳興鸞棲鵠峙擇配于光取仁于士力踐精求曰今覺是駿足方馳蹶則弗起嗟嗟太初未見其止朝也有聞夕也可死載銘爾幽慰爾以此大理寺卿陳矩齊配朱氏墓志銘矩齊昔在御史端已率物不激不隨其氣穆如百僚敬憚麟得之獨詳何以故御史臺曰道總十有三刑曹曰司亦十有三相去僅一圍棘曹吏出入道焉政事亦時有關白麟初為曹吏矩齊在臺長居數年矩齊出按畿輔澄清之望尤烈時麟進秩員外郎奉璽書恤刑至其按屬乃取矩齊之斷案而平反之每詳一獄輒興一感悉得其禁姦除暴之法仰而嘆曰天生矩齊真御史才也正德丙寅矩齊升江西按察司副使無何逆瑾以私忿矯誣廢為編氓麟聞之為之推案廢食戊辰麟出守紹興廢如矩齊辛未瑾誅吾黨各以其職召用初聞公貴陽兵憲若麟有遭仰而嘆曰治表輝輝不圖今日見之自是矩齊歷按察使左右布政使右副都御史以至今官譽望日隆其卒於官也執齊劉少卿玉狀其行紫巖劉學士龍銘其墓訃聞中外悲悼不能已皆曰執齊紫巖之文可謂實録士林同聲嘖嘖曰公字克謹行亦相符今已蓋棺天地完人然厥配太淑人之賢莫之知蓋矩齊嚴凝之至也今嘉靖丙午十二月八日太淑人卒戊申八月望公子應期應奎應和奉狀泣血來請銘豫不文且朽力辭三子者請益力先是乙巳應和為其子履贇聘吾兒牖第五女麟實在婚姻間居嘗論廷尉公知與之舊如前所云故辭不獲力疾次第而銘之按狀太淑人姓朱氏諱玉字溫如朱吳中舊族世居歸安縣竹墩里大父廷瑀號愛蘭性倜儻有藻鑑才父旭號西隱性沖淡有太古風妣丘氏性溫順生太淑人夙有女德祖父並愛之擇婚得陳矩齊名恪字克謹矩齊其别號也裔出漢太丘長實之後至宋諱縝者由長興徙居東林洪武初曰公祚者以稅户甲天下公祚生琦號耕讀琦生斆號尋樂斆生五子矩齊其季也矩齊弱冠怙恃俱失太淑人始歸於陳耕讀翁髙年治家嚴甚子姪輩有越禮者譴責弗少貸獨太淑人執婦道能順其心故矩齊得肆力於學以詩中成化癸卯鄉試丁未登進士第矩齊由知宿松縣纍官都御史入正廷尉揚歷中外所在有聲國爾忘家無內顧憂以淑人為之配也國恩京官三品以上任滿者廕子沒有祭葬矩齊以風望夙著副都御史任不及滿改大理大理亦然曹司以文法拘太淑人具述勞勩乞於朝廷特允其請錫典明備蓋殊遇也初矩齊貴太淑人紡績織紝如故或止之曰我自樂也事矩齊三十年如一日為置側室沈恩常逮之撫諸姪無異已出遇鄰姥野婦莫不有禮僕從有犯欲撻之先流涕性慈仁類如此男子三人並淑人出矩齊卒時冢子應期甫弱冠次子應奎次應和尚垂髫太淑人率之歸葬既葬謂諸子曰汝父勤勞清白終始一致産業自祖遺外無分毫增益汝曹所親見者宜各努力務學以無替先志平居寬仁懇至獨勸學未嘗不正色厲言命之從師逺逰應期以廕授南京光祿寺署丞歷署正升廣東市舶司提舉應奎以選貢待選吏部應和以國子生中順天鄉試第二名太淑人初以矩齊貴封孺人敕命有云揚芬令族儷美儒門職能供饋祀之勤居不廢詩書之訓繼以應期光祿例得推封所生加封太淑人誥詞有云順以相夫慈能成子宜頒渥典增耀前封鄉閭聞之以為褒中其實生成化丙戌四月二十一日距今卒享年八十有一應期娶張氏封孺人應奎娶沈氏應和娶潘氏女子五長適光祿署丞吳鳳次適太學生潘應元次適錢塤次適桂林府照磨吳鳳喈次適舉人閔宜劭孫男八履賢娶閔氏履貴娶黃氏俱府庠生履謙娶吳氏履貞聘吳氏履吉聘俞氏履贇聘劉氏履順履實尚幼孫女十一費守經孫承烈俱庠生沈棐舉人陸稌王杏閔一元嚴㶅皆其壻也幼者許聘沈伯陽沈紹元吳應守吳士讓曾孫男四夢龍夢麟夢鯤夢驥女二應期等將以戊申十二月十三日葬於祖塋之傍與矩齊合雙橋朱子作狀至於三子彬彬父風曰清白吏所遺曰廷尉之門宜然曰太淑人善教之力嗟乎世濟昌期夫子立德於外閨壼助美於內健順攸宜福澤無已褒典再承遐齡八袠天實祚之俾其興陳於戲休哉銘曰素風猗長愛蘭猗芳未窺其蒂而襲其香女士婉婉壼儀彰彰聿相夫子刑于家邦帝褒曰淑允若天章於惟廷尉敬儉有常柏臺獨立乃紀乃綱峩峩豸冠表儀巖廊時維思齊以頡以頏公不瓦合吾不毁方公不黷貨吾無厚藏公不茹柔吾不吐剛平反考業秋肅春陽正色猶存落月在梁嗟公盡瘁幸母夀康孟機辰告于門日昌生死承藉如衣載裳代終有終三鴛一凰四德孔懋四國靡雙豈惟不寃克衍厥慶時我焚筆感而銘章列于若堂用詔不忘山東按察司副使邵康山墓志銘大夫諱某字某姓邵氏康山其别號也大夫幼稚不華弱冠補烏程學弟子員督學者至每試褎然首冠正德丙子舉於鄉明年試春官下第慨然築室月廉山中研窮性道獨觀靜養若將終焉比再試不與計偕棟塘陳子以君臣大義反覆論責大夫屈服乃再精程式之文比卒業南雍主于陳子官舍昕夕相切磋者踰年時涇陽吕公東郭鄒公出陽明王公甘泉湛公之門方迪德講學上遡濂洛大夫則崇孚尚志私淑羣賢上下論議揚榷參訂根極閫奧時已充然有得羣公契與日深事竣乃交相贈處珠玉爛然時大夫過我臥林與語竟夕麟愧不及也語竟又督責曰陳子之母某氏清貞峻淑玉瑩金精是得乾坤正氣以生子無一言何也麟恐懼謝過明年其門人許子某適來因劇談王湛吕鄒以及大夫之學許亦循循雅飭宛宛康山風度麟因嘆曰大夫之學豈惟善其身哉許子之父西溪翁亦曰吾遣兒立康山之門不為進取計也麟益嘆服大夫還山憤悱有加左圖右史檢飭蠲靜屏几盤盂悉有針銘操觚染翰遇天地君親師字必斂容端楷雖造次亦然所著詩文鬯發天真得情性之正東湖費子語人曰康山子庶幾恭而安者聞之者以為然嘉靖乙未始舉於禮部登進士第授行人丙申奉使秦藩大夫儼而恪廉而文正體臨物聲稱籍藉纍遷司副司正工部都水郎中咸舉其職郎中出總漕河水政修復又檄入監督鑄錢乃利興弊革尚書甘公曰公廉才練吾屬無如邵君明年皇上建九廟檄大夫治其工是役也財力繁浩又聖情隱切庶僚罔不業業大夫夙夜靡寧左計右畫抑濫縮浮宿蠧咸正用是功成神速公私節省忠勤協於上心白金文綺寵錫非一比工迄而大夫勞瘁甚矣公議當得異擢銓司所議亦然時有以崛强惡大夫者公議一阻出為今官雖建節州治然璽書所控甚大某州某縣某地曠衍且逼近京邑貂璫貴戚之族充滿其門民性暴悍每憑藉貴寵輕生肆橫昔稱盜區久號難治大夫至則申令正俗首詰戎兵國威既布爾乃興學論道務專導化能不鄙夷其人無何彬彬向風稱善地矣丁未秋屬當武舉武士咸集於保定府大夫往臨柱史四明馮君按部亦至方與共事大夫忽搆竒疾暴卒馮君驚悼率屬治喪躬視含斂復經紀行李語人曰斯人云亡民之無祿悲慟無已聞者感激舁輿南歸非其部治者亦莫不設奠致哀以德薰也於戲天乎大夫藴藉如斯其所設施如斯誠有未盡獨蓋棺之後鄉評士論曰康山子理學儒臣人無間言王臣蹇蹇鞠躬盡瘁大夫其庶幾也某日大夫之甥前翰林院編修潘某奉狀來請銘辭不獲序而銘之按狀諱元者在宋事英宗官至翰林學士世主以國器稱之越五世某髙宗時扈從南渡因占籍湖州之烏程遂為烏程人四世諱某號中齊以資髙能振人人咸德之中齊生茂翁生約齊生士謙生升升治易洪武己卯舉於鄉成祖改元授行人奉璽書使河南北暨山海迤西俱稱上意兩被燕賜使琉球郤其國王刀劒沙金諸物事聞於上燕勞有加尋升湖廣按察司僉事以詿誤謫逮濟寧者十年宣宗皇帝即位用薦者起為福建邵武府推官僉事公生瑛官某府寧縣縣丞志行清苦學者稱之曰泊庵先生䕫是為大夫之祖䕫生某號郭西居士配殳氏生二子長棠次大夫以大夫貴贈某郎行人司司正殳贈安人大夫配張氏封安人無子棠一子繼禰餘無昭穆相當者諸長老陳棟塘輩議以內兄張君沖第幾子子之曰元似娶施氏女二長適翰林編修潘某次適長興縣學生員臧某卜以年月日葬某原銘曰有覺康山夙抱遺編撫憤閒居妙契深研尚友一世以淑以傳遭時陟華聲實昭宣秉節圻封戮力事天訓兵養民惟日乾乾天胡不弔毒我才賢長衢軔發中道崩騫惟後弗孤惟良弗年羣情並憾嗟誰之愆柱史始終琴鶴南還委身殉公臣道聿全銘詞孔悲揚於重泉重泉泛泛婺血漣漣上下神祗恫罔不然上林苑監左監丞松峯包公墓志銘嘉靖乙酉冬十一月三日松峯包君君用卒卒之明年冬十月既望其子無為州判官延齡率弟延慶衰跣造子臥林拜且泣曰吾大人見背兄弟卜以十二月二十四日葬于金蓋山之原願先生銘諸墓悲哉子識松峯舊矣銘不可辭也昔在𢎞治間子官為司冦屬壬戌春三月大司冦閔莊懿公疾同官往問疾豫馬駑在同官後將及門松峯先入既而同官諸君入且出豫乃入邂逅松峯于莊懿公之第君出莊懿公目之曰是上林録事吾鄉樂裕人也酣觴取適可以不入帝王之門今僕僕一官以其父南山翁在也録事官有常入渠一切不取此其志豈可量哉豫聞而竒之訟于心曰乘田委吏可謂無人乎為親宦逰毛氏之檄也自是往往接君于候朝之處望其背若負視其襟若抱豐頤揚晳融然可好及相即也端慎寡言氣孚其貌善觀人者不聞莊懿公之言亦可以得其為人矣越十年正德戊辰君升光祿寺掌醢署署丞丞例得貤封父母於是敕封南山翁為徴仕郎如君官母葉為孺人君乃製烏紗帽珠翠冠若文繡佩玉公私服物凡九十其襲馳以為獻至日南山翁坐堂上開緘走堂下盥洗結束北向拜舞仰天嘆曰渥哉天恩兒今致之吾老不能報惟天子萬夀兒守而職尚慎旃哉既罷乃出見鄉鄰頭角顒然周身爛然觀者嘖嘖翁遂伐石購材作寶訓之閣髙七尋有竒繪五文其上納龍章鳳篆于中由是包氏之門屹然髙大映城郭矣郡士人具壺觴烹羊膾鯉又求四方難致之物無逺邇皆至至則修容飭履登堂為夀翁乃酬賓燕族揮金無算笑語歡醉夕以繼旦如此者數月乃已名柱史耿公擢吳興太守聞翁賢下車未幾即登堂再拜由是南山翁之名動傍郡良以松峯為之子也君每欲棄官歸養翁安其榮固拒弗許未幾銓曹察君能秩未滿輒遷今官地分視前回絶拜命之日公論不以為異蓋録事之勞有以基之也嵗辛未南山翁以夀終君歸終制當謁選州司數以為促君固辭不行人以是知君前守光祿上林凡以慰南山翁耳莊懿公之言至此益信鄉評由是多其孝嘗改創居宅或謂昆季且長居可異矣君曰此薄俗也不願效之惟同堂以共賔祭異室以處羣小則吾之志季心感悟竟如其言南山翁頗有厚積君顧謂昆季曰惟若自取我則收其餘耳骨肉間百爾處分大率皆然鄉評由是多其義里居之日士大夫咸樂與逰或鳴絲傑閣或艤棹清流暇無不觴觴無不盡客與勸酬或四座競起巨觥交至君取次巽應雖百罰不亂一日太守松石劉公在座特取大爵置君前浮以大白終飲不易君不吳不敖成禮乃退松石語人曰是非徒器量過人實敬慎有以將之也與人接每見愛重如此生平少疾嘉靖乙酉夏偶疾疾小愈愈且復作再愈再作竟不起比卒之日聞者莫不感歎交相謂曰國家太平景象松峯係之矣郭有良田居有廣宅背山臨流數時歎節生紈綺仕京國老觴歌首丘穴賔客雲興子姓山立身無後艱世有遺擇非熙皥相仍家豈易得今蓋棺之後口無擇言身無怍行善飭其身令終以正噓吸光華者六十餘年非天地凝定和平之氣胡以釀之是豈人人可身得哉於是挽歌傳誄同聲並作哀其死如頌其生噫嘻終始若君可以觀治也夫按狀君姓包氏諱文璽字君用松峯其别號也生景泰丙子享年七十君世為烏程人先有萬六公者元季葬三碑鄉墓今有合抱木歷榮齊仲賢宗禮凡四世至璿璿實君考即南山翁也翁配匡生伯子文璧繼葉生君及季子文㣆君配張早卒繼李亦卒繼吳張實都憲張介庵女姪其卒也介庵銘其墓與李俱獲封為孺人男子子二長即延齡張出配臨安太守王秋伯先生女卒繼吳又卒次延慶郡庠弟子員側室沈出配范女子子二長適孝豐許承恩次適歸安沈經孫男五曰守純聘歸安張朝重女曰守一聘烏程王克𢎞女曰守紀早殤曰守約守緽尚幼孫女一適歸安嚴介銘曰鴛行夙逅驊騮在廏天墀天囿弗馳以夀國施允厚國帷之覆名駒孔裒駸駸載驟銘詞洵懋聿昭爾後墓表尋甸太守馬碧溪墓表嘉靖某年某月安銓之亂尋甸太守碧溪馬先生繫獄於滇寃疏上御史臺以為難碧溪之子一龍訴於闕下其略曰父性魯由進士為給舍忠鯁獨持為邑佐及令廉循愛民猶子龍蚤嵗即承家訓以忠孝大義為本父在滇之日孤身萬里志存報稱知父忠憤必不顧私今不幸有事握兵執憲之臣皆若無與而臣父乃遭文致獨深天髙滇逺父志無以自明臣竊痛心念惟父子一氣臣父必不負主臣龍不忍負親乞械繫下滇雪父之辜不幸獄吏殘苛龍請代父之刑必不可代則願與父俱沒激烈之請不可覃述疏上公卿感嘆行道泣下天子憐之命所司核其實時南坦子守冬官實聞其事惜當事者頗以文法相拘竟不能出古人祥刑之變例一為之所孤子龍父子之志悲哉然亦以是坐疑再論釋碧溪而羈縻於故舍然獄事未盡白也龍乃悲傷骨立將再疏其詞尤烈碧溪書來戒之曰兒毋毁代天王聖明吾事且直但老在網羅亢宗一念則以屬子今天下大比取一第以成前志吾願足矣代罪之疏勿復上龍奉書且泣且試試終主司第其文為順天第一人録經義論策進之睿覽程式天下北方之學者未能或之先也録至碧溪子曰微吾言兒乃獄下從行親屬耳今若此復何冀哉時碧溪寢疾方暝昡於藥即日遂不藥不食從僕問遺言碧溪曰我死由瘴癘戒吾兒龍慎勿入滇語訖端坐而逝訃至龍哀毁幾絶即日焚所懷疏草而奔麟追之不及見而返明年夏某月碧溪柩至自滇南卜以明年春月日葬於望思原龍徒跣泣血請表諸墓貴州左參政陸先生實為之狀曰馬大夫生七月遭毒蛇以舌䑛其睂顙振而毒弗傷成童穎異出於羣兒甫弱冠日誦數千言古經史至星厯醫卜之書罔不究竟為文立就稿不冉易己酉大魁南都七試春官復魁天下三十未有子或勸其納婢大夫弗聽己未始舉一子即龍初官給事中正色論議多俾益為平陽丞簡煩除苛政化大行有民風感應諸篇傳於人開化礦徒之禍御史檄治之數言而解列柵塞穀引水浸沙開化賴以至今遷順昌令平陽人立石思之大夫至順昌猶其在平陽更俗導民禁巫風開正學民用大和曲靖之行子龍沮之大夫曰有不可化之民乎吾方以盤錯自試汝第向學明日單車就道鄉人壯之守尋甸之日撫亂銓得羈縻法銓頗效順治績垂成而生事者督銓大急以至於斯今已矣鄉人莫不傷之未幾約庵都憲周君至因論及同官時事喟然嘆曰賢哉碧溪端直毅方常怒目而視金張許史之徒其志將大有為正德間奸權擅命碧溪鬱鬱抱孤憤故不安其位也謫官之日言笑于于以去為得已冢宰覘其然服其賢自訟其失某實聞之以故有平陽不數年而進二千石亦謫例所未有也追思生平氣義尋甸之寃猶其去平陽也世歷嘉靖同時知己散在四方遂無以自明四坐聞之色動咸曰陸先生狀古良史也本所本哉嗚呼制行如碧溪先生者可觀也已尋甸奚宜至哉豫嘗仕滇知南夷之故銓之禍伏久矣碧溪適與之逢求一人以應之以兵曰鎮可也以守曰藩亦可也以綱維曰部使者亦可也以近民則碧溪焉耳得其實致銓者誰歟覆盆之下有尋甸焉日月之光不逮也况京師去尋甸直萬里哉獄狀可盡信乎無已則稽諸天碧溪負沈寃子龍取髙第又當明主右文之日其所遭所協豈偶然哉碩果之食固碧溪之餘慶也謂非天乎君子讀緹縈之書聞王褒之淚質以許􅀈之言先生曠百代而猶存也碧溪在縣治東三十里先生讀書其上因以為號其世系暨子姓之詳在涇野吕太史志及諸傳記豫特表其大者于墓詔來世云贊大司冦顧箬溪像贊有嚴中丞有淑其儀言念其人在水之湄垂紳正笏䕫龍於墀載斾秉越方虎於陲胡施不可而賦我江籬紉蘭結􅉅飄颻長裾委蛇中野羔羊之皮乃栖真于卉木匪托止于丘隅顒昂圭璋我之直諒多聞凡今之具瞻也歟祭文處士吳甘泉墓表成告文與公死别已四周星紀痛傷可勝言哉某戀仕日久惴惴小心如臨于穀檢身淡薄取豫不茍雖曰在廷不殊在野以先生之教不敢廢也獨不知先生逝以來英魂安在憂也樂耶纂幽史耶記玉樓耶杳杳塵凡吾不得而知也吾兒已成禮門下幸有兒息則將分傳先生之廕敢不敬存其故某不日亦將掛冠而來椒漿之奠心已有期今得太史陳公墓表文成未緣登石先書一通遣人陳告若有未慊夢寐可傳吾將往告于陳而敬易也抆淚摛詞用伸下忱伏希昭鑒吳甘泉入鄉賢祠文嗚呼清修之節君子或能勉之惟始終不二者為難及其既殁輿論升聞後之君子秉道𢎞化以公以任爰求既往用勸來今人心不死潛德載新蓋天不能無意於斯人也猗惟甘泉先生朴雅天植孝悌夙敦居約行偉氣和言溫淡泊明諸葛之志髙明尊仲舒之聞擬其跡若孤山之操終老韋布探其中有沂水之樂自脫風塵結社湖南嚴歸約以蓄德讀書董塢積嵗月而杜門內重外輕不邇不殖旁搜逺述有識有文觀著述者當與其窮理而不必多其推演聽吟詠者宜髙其養性而不必求諸寓言示訓彛於黨里來顧問於縉紳古所謂儒者髙蹈聖世逸民求之叔世或庶乎斯人夫辛巳蓋棺迄今二紀落莫士林弗彰盛美不朽者行難湮者理數值幾宜論符逺邇秉義者振其幽芬當道者定其公是式陳厥位肇祀於鄉序列先正之儔伍密邇夫子之門牆衣冠奔走俎豆馨香斯文之慶吾道之光惟俗之勸惟人之倡風教之助國家之祥丕顯丕承彌逺彌芳先生之風被於無疆猗與休哉清惠集卷八
