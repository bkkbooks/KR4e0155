body:
  text: 清惠集卷五明劉麟撰奏疏陳言以獻愚忠疏以下俱工部尚書時上都水清吏司案呈奉本部送與兵科抄出太子太保兵部尚書兼都御史李承勳奏內開豐沛治河之工二年之內三易大臣用人以下計者三十餘萬用銀以兩計者二十餘萬而未有成效始也講之不熟而遽行繼而主之不立而中止一行一止糜費孔多今河南山東地方蝗旱荐臻十分狼狽運河通塞國計攸關勢不容已臣愚以為宜令羣臣知水勢者各輸所見下工部集議若所見皆同再行新差侍郎潘希曾親自相度蓋百聞不如一見之真詢謀僉同方可動役寧過慮於未事之前毋悔過於已事之後然智力所及能料其綱而不能料其細能料其常而不能料其變宜令工部奏選於部官知水利者二人俟興工之後親詣工所體察人情咨詢利害彼往此還各言所見則彼中委曲廟堂悉之千里之逺同於咫尺浮議不能動搖乞下各該衙門作速從長議處施行等因奉聖旨覽奏事關朕的知道了其餘該部看了來説欽此抄出該部送司查得沛縣河於先該總理河道都御史章奏稱黃河上流水發淤塞運船乞要另行議處挑濬等因隨該科道交章乞要推舉諳曉河務大臣一員前去總理前項河患或添差郎中員外郎一二員前去分投整理等因本部備咨吏部會同推舉南京刑部尚書李等官四員上請簡用一員總提督河道事務等因題奉聖旨是盛應期升都察院右副都御史著總提督河道事務寫敕與他見今正在緊關經畫之時著上緊前去地方任事欽此已經請敕齎付本官欽遵總理隨該吏部添選署郎中柯維熊員外郎王大化前去分投整理外於嘉靖七年正月內該總提督河道大臣盛應期等議將該挑河自昭陽湖東自北進汪家口南出留城口約長一百四十餘里堪改運河計用銀三十三萬一千四百五十兩議處停當具奏前來又經覆奉欽依開挑去後本年四月內為修省事該吏部等衙門會題運河一事祖宗計處行之已久屢遭決塞不過仍舊修築未聞遽至誤事今聞所濬之地舊日積沙以為泉水衝去而黃河之流減殺運道已大通矣合無行見在差管河道都御史盛應期且將舊壞河堤加築堅實等因會題奉聖旨運河關係至重開挑新河應止著戶工二部行總提督河道官會同漕運都御史總兵等官作急會議奏來定奪務要不誤將來嵗運欽此已經通行各官欽遵去後隨該漕運都御史唐龍總兵官楊鋭等各將停止開挑新河緣由具題奉聖旨這修河工程即便停止夫役都著放回各官取回改用總督大臣應設應該作何整理户部便會工部上緊議處了來説欽此該戶部會同本部從長計處覆奉聖旨卿等説的是河道關係漕運總理無人盛應期柯維熊等還照前旨取回别用便會推才識老成實心幹事的堂上官兩三員簡用著總理河道事務杳照各官議奏事理相度事勢從宜疏濬務使糧運通行不誤將來國計欽此該吏部會同本部推舉得戶部左侍郎梁兵部左侍郎王工部左侍郎潘希曾俱各堪任等因奉聖旨潘希曾著兼都察院左僉都御史總理河道事務寫敕與他著上緊去欽此隨於工科抄出該本官奏稱臣奉命總理河道事務才薄而任重曷勝兢戰然不敢不竭其愚圖濟大事竊惟近年沛漕沙淤旋挑旋塞蓋由秋水泛漲黃河奔衝所致嘗考河流故道非一其大而要者若孫家渡經長淮衛地方趨淮入海其一也若趙皮寨經符籬橋出宿遷小河入海其二也若沛縣飛雲橋經徐州超淮入海亦其一也孫家渡趙皮寨乃上流之支河飛雲橋乃下流之支河𢎞治以前支河分流會於淮而入於淮故徐沛不受其害漕渠不為所淤邇來上流三支俱就湮塞全河東下併歸於飛雲橋一支下東徐吕二洪上遏閘河流水溢為遊波茫無畔岸於是決堤壅沙大為漕患今日之計挑濬舊漕以通糧運加築堤岸以防衝決然非疏上流之支河將來秋水復發沙雖挑而難保其不復淤堤雖築而難保其不復決探本之論固有在矣近因趙皮寨開濬未通該巡撫河南都御史潘塤等題稱仍將孫家渡責成河南管河副使該戶工二部議題孫家渡責成潘塤督行管河副使加意疏濬以殺河勢不許推避誤事節奉聖旨卿等説的是欽此臣經國至計而該部會議相同蒙皇上斷然行之真明見萬里也臣私憂過計尤恐巡撫事繁副使力寡萬一疏濬遲誤未免貽患漕渠伏望皇上軫念國計下工部計議合無請敕一道丁寧都御史潘塤即便原督管河副使調集黃河夫役選委相應官員上緊將孫家渡疏濬一應合用錢糧聼其命下之日許令羣臣知水事者各陳所見聼本部集官再議其陳奏未到之先備咨本部侍郎潘希曾及管河郎中丁洪李重備查原行照新奉敕旨應會同者即便會同應督率者即便督率亦行集議仍親詣見治河渠一一相看或地勢之髙卑水勢之增減與凡淤淺衝決之病修築挑濬之宜詢之故老考之載籍務得至當期在可久必惜費於未舉之前乃興工於好謀之後履歷必親衆志無異然後會行各該衙門各以所議具奏畫圖貼説以請聖裁審固如斯則謬妄可免而前車之轍諒無復蹈者矣其稱要將工部知水利者二人詣工體察祗因先失遂有此言但念今差治河總督官潘希曾為人明達忠懇會官推任過舉未聞計程蒞事曾無數月即復二之以拂國家信任之誠阻大臣展布之氣事如過迫合無即用李承勛建言之意將應察人情利害就令潘希曾並所會各巡撫等官每一兩月一次自行奏報因言考事待以不欺是國家於明目達聰之中寓寬洪盡下之道為希曾等能不感激思奮將益殫乃心以供乃事矣萬一諸臣之奏報不如本部所擬假以一年之期集合其章聼本部會官議差科道官一員請敕前去從公查勘即其工程驗其情偽若利興患息財力有經於纍次奏報皆合成效彰彰則具奏升賞以嘉其忠萬一不然聼差去官員指實參奏從宜黜罰俱為未晚是即今奏差官體察之意應否事務待羣臣有陳本部集議然後施行均乞聖明裁處根究節年拖欠工料補還借過官銀疏營繕等清吏司案呈查得浙江等處布政司并南北直𨽻各府州縣節年拖欠各項工料銀兩八年九年十年以上者有之五年六年七年者有之二年三年四年者有之率以為常除正德十年以前者聼本部查明另行外其正德十年以後嘉靖四年以前各年所欠大約共該折色銀一百四十四萬六百兩有零本色物料三千五百九十萬四千件有零若非司府等官欺公廢職則坐官解人等埋沒侵分前此寬延以成今患失今不究則益固前姦深為未便呈乞究查等因到部臣等隨即吊卷揭查得嘉靖元年十一月內本部派行順天府辦解白榜等紙料共銀六百四十二兩該衙門與本部同處一城今過六年不到又如松江府上海華亭二縣本部節年派麂皮共六百七十張自正德十年違限至於十年有餘人文俱不到部以此推之天下之病不可勝言臣等看得前項工料價銀物件下供上用國有程法但官庸長偽吏巧成姦上下隔離起徵無法致有今弊其利不在小民除嘉靖五年以後正係納解在途之際若川廣雲貴等處未見過遲另行置簿查處外其嘉靖四年以前拖欠之數委屬姦人玩法國用告虛經手承行官吏解人俱已違犯雖輕重不同而蠧公殘私為患則一以致本部庫銀那借未補數窮理極相應根究合候命下之日本部逐一開立前件造成方尺小簿各該巡撫御史各抄謄行屬選亷能並著實心幹事司府官員照依判欵備查某項物料於何年月日坐派何州何縣徵解若干或本色若干何人經收何人押解起解程限已滿并有某衙門堪信批單到卷者該管官司緣何不行造報恣其侵盜又有買揑批單似印非印朦朧查銷者將經該官解吏戶收頭通行查提先究原解本折色官物官銀下落添差殷實大戶管押原解親丁送部查納若非本部開作拖欠司府卷內却又查有批單即係詐偽就便密切擒拏一體追究應問應追人犯牢固扭鎖差人遞解赴部查對追納其解人招出侵欺抵換重情應提問者就便提問查照律例從重議擬其應發遣者仍候銀料追完之日解遣徒流以下贓完方許發落俱照抄招同委過司府官職名回報以憑查考又有一等司府等官將已徵聼解各項工料不分在庫在手銀兩私自那移借貸别用查究得出雖遷官去任律應紀録勿論者仍要拘提到官依律究查務要明白候銀解部起程之日方許放回若或肥已問罪黜罷亦取供招回報其巡按衙門仍將本部發來部內各起前項自文書到日限三箇月日以裏一一查明填寫完備先行差人追繳本部查理若過期不報本部查其輕重分别等第先將見委查勘官參奏問治其布政司掌印以上官員行移吏部明立文案遇缺暫免推升以警其惰事完方許照舊其各府掌印以下并所屬掌印佐二等官但與徵解有干者聼各司掌印官嚴立法程問究前項查推根究之法本部每年一次舉奏各該巡按御史事完回京復命之日將查緣由具奏則侵盜一清庫藏可補而工職少修矣臣等又敢冒罪上言凡此皆本部積久之弊中外臣工言之諄諄聼之藐藐已若不可為者若非仰祈天語嚴加戒飭吏民不知警畏御史不即奉行文具雖繁無益於事臣等此請雖若過嚴蓋責逋負於姦盜之手固將以恤窮民於憔悴之餘也若行巡按衙門報有次第又聼臣等括查嵗用會官詳議上乞天恩將嘉靖嵗派通行蠲免明降詔旨頒布天下使知大聖人恭儉愛民之心出於尋常萬萬誠足以培植邦本而光昭帝德偶有興作必不得已前項清查解到之物盡可通融應用况每嵗該派行文移展轉數月始到若將嘉靖九年應用之物先期派行無徵不及半年應值時和嵗稔却有良規人不玩法依期約納一一皆到是國不加征而用無不足天下臣民偶奉一年寬免即漢文賜民田之意則聖德明如日月而聖德廣如天地民生允洽邦土裕如矣臣等實不勝懇切之至清解納以塞弊源疏該本部營繕等清吏司案呈伏覩大明律內一欵凡監臨主守自盜倉庫錢糧不分首從并計贓論並於右小臂膊上刺盜官錢糧三字四十貫斬又一欵凡常人盜倉庫錢糧等物但得財者不分首從併贓論罪並於小臂膊上刺盜官錢糧三字八十貫絞又一欵凡各處徵收錢帛買辦軍需成造軍器等物所在州縣交收差有職役人員陸續類解本府若本府不即交納差人轉解勒令人户就解布政司者當該提調正官首領官吏典各杖八十若布政司不即交收勒令各府就解部者首領官吏典罪亦如之其起運官物長解官及解物人安置不如法致有損失者計所損之物坐贓論著落均賠還官若有侵欺者計贓以監守自盜論若起運官物不運本色而輒積財貨於所納去處收買納官者亦計贓以監守自盜論一欵凡送本戶應納稅課物及應入官之物而隱匿費用不納或作損失欺罔官司者並計所虧欠物數準竊盜論其部運官吏知情與同罪又一欵若私物當供官用已送在官而未入倉庫但有等人守掌在官若有侵欺借貸者並計贓以監守自盜論又一欵各衙門收支錢糧等物若監臨主守不正收正支那移出納還充官用者並計贓準監守自盜論又一欵監臨主守將係官錢糧等物私自借用或轉借與人者雖有文字並計贓準監守自盜論其非監守之人借者以常人盜倉庫錢糧者論若將自已物件抵換官物者罪亦如之又一欵監臨主守若將侵欺那移借貸之數乘其水火盜賊虛揑文案及扣換交單籍册申報瞞官者並計贓準監守自盜論同僚知而不舉者與同罪欽此又查得問刑條例內一欵各處徵收在官軍需物料應該起解銀兩者即係腹裡去處若有監守盜銀四十兩者錢帛等物值銀四十兩以上常人盜銀八十兩錢帛等物值銀八十兩以上亦照前擬問發邊衛永逺充軍為照前項律例備載斬絞充軍徒流之罪不為不重但稽考無法蔽痼已成上下同風不行舉正若不及時立法查處則將來之廢不止於今照得本部每年嵗派題派額辦一應工料價銀並本色物件俱經通行浙江等處布政司并南北直𨽻各府州縣明文已到而過期不完或已徵解差用非人致被侵盜又有假揑批單公然附卷而恣意侵分者或已差人而安置不如法致有損失因而逃避人文兩不到部或領運官物而原解私自變賣銀兩來京又自收買物件以圖獲利因而遂將銀兩花費亦久不完或被徵收委官及戶長收頭攬包已收在手不行交官交庫隱匿費用故意延捱希圖赦免或經該人員不即起解私自借貸那移如此姦弊千緒萬端不可枚舉雖本部不次查催而各該司府等官視為故常全不舉報以致年復一年愈深愈痼遇有各項急緊工程只得借湊庫藏别項官銀接濟事至於此則出納不正徵補不明其弊不可勝言祖宗任官置簿興事勸工其意似不如此若不呈乞稽查責令完報則曠鰥之罪何由可贖臣看得工部本折色銀料取之天下其行有二嵗派題派而已常例常入一年一派相襲而行則為嵗派因事興工不時又派特請而行則為題派是乃小民供上之常非私濫無名之取若官司徵解及時則小民輸辦不缺奈何各該司府官員體國幹事者少欺公茍祿者多又有釣名飾詐罔上營私者一身之廪皂輿馬靡不豐備而公家之宗廟乘輿城池兵甲則為不急之務有論皆云損上益下臨政率多干譽玩公則是偏之為害而王政之所不行也又有貪汚之徒身自剝取常例却將正數料價厚其所私因令起解不念民膏民脂悉舉而委之飢鷹餓虎逆知侵盜明與作成此又該司令呈之未發及究所由皆本部稽查無法故也本部常年派下司府惟知已解已到者收受而已然不知不解不到者何因司府常年起解之後惟知有批單者銷繳而已然不知無批單者何故蓋中外遼絶兩不究心所以姦頑乘隙恣行侵盜仍有不才之甚者與此輩通同為弊展轉彌縫茍有若人則弊端膠於有位又安望其振作舉行所以本部清查無復開報嵗復一嵗積弊相仍誠為可恨為今之計莫若申明律例早定綱維以致謹將來除嘉靖四年以前拖欠者備行巡按衙門拏問區處外斷自嘉靖五年以後見解未到新工待用之數本部置立工料本折色起解文簿每司二扇府各二扇循字一扇環字一扇總於各布政司收發無布政司者各府徑收輪流倒換各該衙門遇到仔細收閲但有起解本部本折色銀料開寫原行硃語仍立前件一行二行空白一行明開某年月日並官解姓名其布政司有應該動支本司官庫銀兩辦解者照式開填本司簿內倒換兩廣雲貴四川福建程途窵逺銀料不多年終一次差人賫換不許遲至正月其餘司府州縣俱限半年一次差人賫換上半年六月以裏下半年十二月以裏北直𨽻大明等府俱限三箇月一次季終賫換順天府間月一次月終賫換以四六八十一二為定循去環來或與戶部文簿并令差人賫換永為定規本部如遇循字簿到即於本部選委勤謹監生督同該吏查理明白逐一填注某項工料已到某項未到仍於環字簿內一樣填寫各司官調卷查無隱漏注寫某官照刷相同呈堂驗實果無差漏發付原差人役賫去司府州各該掌印分管等官收執查出延捱過期者除水程之外又加限一二箇月人批不到即係侵欺就便拘拏官解的親家屬監併完納候批單至日辨驗明白方才疏放仍於簿內填注下落若官解侵費亦就拏究罪如前項律例監併完納施行其賫送文簿過限先將差來人役送問各該司府官吏參行撫按官提問治罪其嘉靖五年六年七年坐派明文已到者行令查出即便如式填寫不許分毫遺漏前項一應侵盜縱容姦弊許諸人訐告所在官司即行聼理此等法程創立之初若非仰奉天語嚴加戒飭吏民解官解戶不知警畏而撫按諸臣不即奉行文具雖繁無益於事伏候命下之日本部造成前項簿籍刪削略節告示底示行下各該衙門曉示愚民責令官吏如法過期倒換本部一靣移咨都察院轉行各該巡撫都御史并巡按監察御史查照奏行本意嚴督司府州縣等官但遇本部派到各項工料價銀并本色物件已徵者作急起解未徵者嚴限追徵過限一二箇月不完者府州縣徵收委官住俸半年不完者府州縣掌縣官住俸一年不完者布政司掌印分守官住俸俱候物料解部之日呈請撫按衙門方許開支住過俸糧不得冒呈幫補俱備咨部其府州縣徵收誤事委官亦聼司府官從重究問監候家屬杖限立完若容令包攬委託非人司府自行作弊欺公玩法撫按衙門參奏拏問巡撫巡按務要著實舉行毋事姑息一年一次回奏巡按候事完回京之日奏報况循環到部事有遲誤而奏無罰治自有聖明垂照雖本部亦難辭責候每年將終本部通將各衙門各官欠數杳出舉其尤甚者移咨吏部黜降再照前項廢墜之弊雖稱府州縣大小官員不職至於大綱不舉不正實由布正司掌印佐二及各府掌印正官茍且因循所致本部查出各官廢弛數多抗違有迹者若倒換文簿故不依期而填寫又不依式者是有心廢法之人亦就移咨吏部將各官嚴加考核年淺而素履謹願者改調邊方無事衙門以稱其簡僻之才年深者遇缺暫免推升以責其理辦之效候其完辦到部之日行文吏部序用如常前項查理之法本部亦要每年一次舉奏俱以次年二月為期如此則中外流通萬里如見而工職庶少修矣清惠集卷五
