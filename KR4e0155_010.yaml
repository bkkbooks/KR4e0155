body:
  text: 清惠集巻十明劉麟撰書簡與陳繡山仰惟承家節操為政風流古之人與良由忠信為主而精進不已望其氣大廷尉復生也孝徳隆重今古罕聞某也在友而婣厚幸真切良慰良慰昨者儀物周悉不鄙寒素人皆為區區榮之僕豈敢忽金紫之光無容加喙但腰笏攬有九華獨在中邦之中古馮翊扶風也以斯徳臣典斯仁土足以成君之政豈惟崇階寵服之照耀一時哉思往彼一觀藉君以為東道主真千載竒逢惜乎時過身朽心有餘而力不足也與辜廿三二首疎懶多病之人不宜在官解去之意甚久不謂今日始遂秋凉明春即圖相見欲展墓也末閒先此問訊掌珠之慶何如豈工力日費而取採皆不堪用耶凡人五十以還皆老境也可以行樂者並須留意會時幸以告我僕僕世俗逺之為得不知執事以為何如脫冕之日即思左右恨不能飛至一㑹無任保愛二端居寂寂忽奉手書逺慰寒灰之下盎然春生文魴逺惠並皆珍感卑人罷歸實坐鄙拙不能低昂時變方為知者嗤咲髙明翻多許與豈人各有見固不可以皆同耶抑亦愛我而忘其失也臥龍山碑愚民誤相戲謔何至知親如執事者亦復藉口可愧可愧客嵗垂槖入廬方賴世勲之禄以給饔飱且恃以無恐今又以例裁去兒女輩時有菜色俯仰不知計之所出先祖母尚客食僧房情事之切何以過此空之之切至不能跬步而西也奈何倘肯於燕閒之中以區區十年心跡反覆究竟吾之隱㣲將不能逃於深識之下矣匆匆裁答不盡有懐尚容另布與張太守饒吾父母邦也虚冒美名其實為貧為瘠間有裕者勤儉失中有葛屨履霜之象故民思豫恒以不得賢太守為隱今遇閣下臨治吾知庶之富之又教之矣其於新政未霑一日之澤何以言之吾所知者江陰之政羣姓仰若慈父至今惻惻今以邦伯之尊臨之取已然之業輕車廣路不問可知其善願以不死之年歸來展掃扶杖一觀清化老逢知已林泉大快其樂何如必先為鞠躬再拜以致公賀然後稽首頓首為丘隴族黨以謝其私又然後登芝山望鄱湖弔古論今以伸復頻年之闊嗟乎太平野老百年一遇豈細幸哉久欲布此惜無人便又恐郵者匪人或藉以利其私顧反獲罪用是遲遲然未嘗一日忘吾水木之本源也真切真切但此郡民夥政繁訟獄亦劇未免勞尊幸為道為民加飡加攝為慰與張南五首得來書不能答凡慰下第有程語曰天老其才其理本是然惡其熟又惡其妄悅人不欲以告只可曰丈夫用世自有時也野老私心誠憂吾子騰踏舎我今若此倘能西來就一師席吟眺往來一如昔者若一夕僵仆斂予手斂予足遂執予紼又示吾二孺以躃踊之節期至則為吾題曰此有呉延陵季子之墓又招號社中人合辦兩石勒君所為傳一置寒泉之下一置瀆南坦上仍煩為祝之曰在泉者陵在巔者谷石乃合瑞傳以永糓令呉興人知有張君也他日君陟華秉要將盡友天下英賢或與之語南坦子生若此吾傳之若此其終若此事有定評又與傳合然後捐俸資握椒漿招予於司空之門曰歸來乎歸來乎呉興南洲張氏子茲一申久要義乎有友如此某將凄然颯然登君之筵歆君之奠食其芬芳將貽君以福有如此石傳曰使死者有知生者不愧其言可謂信矣不然以君之多聞猶未得禄養以奉夀堂何以取必於天天不可必徴之人事諒亦終不相負惟君子自信自慰二區區呉行修納婦之闕典謝得孫之流慶耳非成禮而退無可以為君告者獨㑹文衡山得渠走筆為書兩橋記於石且書且酌且教且謔文雅風流沛然可槩全呉將竹堂蕭寺化作石渠天禄此亦可當樂事竒聞之訪苐樂過災生梁上君子一顧四壁蕭蕭所聞更竒并附愽一笑三讀來翰知念我懇懇思致如泉筆力足以駕之九夏炎蒸彼此之貺略盡即可作除煩滌暑之方矣此處知君學術凡人遇炎暑則發狂大呌以已私肆怨於天大可笑也除却之法古昔有之相君坐政事堂偶大政填委煩躁毒烈幾不可解適農人自赤日中來相公勞之曰今日暑熾爾等何戡農者曰無因問却之之法農曰吾外無纒組内無憂思耘耔告劇則憇大樹之下日光在東吾憇其西日轉而西吾憇其東妻饁未至吾枕流潄石籍草為茵小睡南薰之下而妻餉且至既飽而歌誠不知相公之所謂暑者勞者愕然曰吾亦不知炎暑之所在矣蓋炎自内出者甚自外至者輕要在不使炎入吾心此却除之法耳一笑一笑區區能除九夏之炎而不能却隆冬之火豈吾近得良方自病後小悟也耶孟子有曰人恒過然後能改是知除煩却熱之方者矣人非聖賢誰能比此南洲夫子駕鶴選勝調氷雪藕蒸於外而動於中衆人之所謂暑也是奚足哉偷安度日恨無一作可酬來玉亦是為暑所動也一笑四季冬朔日與弟鳳飲小飲得吾子書有憤惋之氣有超逸之思用古人竒合妙應之跡繼以鉛刀弱弓之喻所感深矣嗟乎古之豪傑逆者多竒順者不然豈人品相懸逆能致竒盛夏濃陰風雷大至激之使然耳讀吾子書悵想龍蟠震澤之陽雷聲若隱隱在吾耳矣幸自愛不以順逆芥蔕於中藏器愈精所取愈大逆愈久竒愈甚老朽無成不足言也後㑹期以秉燭敢不如約麟雖衰病寸心猶壯君實亮之五竹窻臥語起我沉痾倉扁弗如也且有山藥珍味並感並感昨童子報瓮頭春釀初成聊致一樽風雨之夕落葉空山相知者多於此處拳拳更有生鴈一隻伴入古人有兔斯首恐亦不須多也面晤在即不悉與黄小峰小峰令尹本易事者今則難事在逆境也奈何垂問拳拳一切鄙懐未佈客嵗問書於時望亦偲偲足慰小峰之愛比命駕入山豈惟時望禮事之不足雖麟不免俱無廣舟使大賔匍匐小舫吾黨安乎其翁走階下趨堂隅擎拳曲跪者累日夜吾黨安乎如此者不可枚舉難乎易乎大都言此非難行之為難是以君子慎其易者也有竹訟未解閣下貴􅂒方寢支持之法不知所出不得不加之意大賔尊重恐不宜忽所云枉顧村墟咫尺儘可從容毋煩過念聞夙有廣牀近有竒石佳哉適哉游歌之興生哉漁哉樵哉仙哉小峰得之不知獄吏之尊李亭又其下也與吳行可八首昨日成舍舟中羣譁衆諤以取吾帶病息奄奄非此則殘喘不保一笑一笑方為吾帶稱幸今得圍於文章之腹不謂其遽返只勞我充吾僕僕耳有罪髙麗紙竟何如閣下為程山作葬保已不理於口今又為吾徒作書保其亦大不理耶今欲引玉作瓦投之計豈不知學士之不可幸有保者忠信不減季路吾無憂矣輒具稿求教敢問午塘信邁當是何日拱聴嗣音當並妙翰而下繡山先生亦不知何日可正講席有懐懸懸昨龍子過余言跨塘李子之愛感感皆本充吾會中叱名是慰二日者樂甚明日夢夢醉中忘其所謂樂者世常曰景星慶雲豈不髙朗獨許身或有不然觀莊懿之於貞潔其授受之真托明雲星其義深矣讀吾子之書深有感焉今不盡也只以前醉中意一言之凡親誼文雅風致常不能兼是以大烹華筵皆無真味難與俗人言也若夫一召散齊老少一鄉一國天下無不可盡惟午塘能然蓋玉堂居養不凡渠又品格本髙故八面皆可觀且今子之才之氣實似之異日躋膴仕到通顯西掖梧桐之下當自見之今所造朽者畏之矣幸益自愛殘喘無故姑與子飲酒而已三秋仲八日麟偶得生魚銀刀錦紋長三尺有竒聞髙旌薄暮方到兒所奉教難矣明日視魚雖在淺水猶能跳躍新酒頗佳予既烹而食之苐過此聞教不知當是何時耿耿奉今書言近事甚悉藏􅍐一節語涉嘲誚不欲聞者只以大杖撲兒便了其叙述陳氏兄弟大强人意撫州必過家計先得一㑹甚幸甚幸繡山處正欲致書辱示感感一二日賫上獨長技十事敢一較否久不得面如此青春何端望留神若能白戰夜分東林之腹爛其盈門大可樂也近作内光小亭頗有次第不敢不告四辱垂顧感感今晨困不能起即刻初平謹具狀三陳踵門謝過無疑也獨重幣藏之不謹或有他故村童無可使者敢借重為言平生幸毋往返益重吾過不敢重役坐無聞無藝非有它也從容當更有復若三先生已行望充吾轉達則命小僕持回然不受之情不謾初見繡山又見東山又見鳬川何廷尉髙門之多賢耶麟心甚驚麟無以自喻喻之吾子吾是以益知漢人曰髙大其門閭亦不虞同生而親見也豈惟婚姻之私好哉坐以繡山屈小充吾罪罪五吾不能為此役也久矣今諸君欲之奈何其中差訛理謬想孝子仁人必有不堪然託匪其人咎將安歸草草具稿塞白可愧可愧昨拜蟹魚諸惠正謀一聚而客之過我絡繹鄭校人曰魚既烹而食之即如不烹亦不可以獻惟有㫖酒一罌香橙無恙長嘆耳矣誌草煩達之繡山先生古名士如錐處囊中豈不穎出痛改一番尤示孝徳麟書名固自若也千萬千萬六命揭永思思夢中人命兒作書書夢中語愚父子皆不足以成雅志竊觀吾子之操修則日孳孳也所命者或溺於愛而不加察耳只痔疾稱痼豈真痼耶毋乃懲子陽之失而明其似耶昔者平江侯患此至不能朝謁上賜輿而洞其坐處上見其朝曰爛窟臀老陳來耶亦享髙夀其終也以他疾幸毋過憂苐二件可愛之物被他阻當必兩刀肆段可也意者為充吾法家拂士因謝塵勞日增問學不為無助夢覺陳編不在雞口而在牛後且日相追随而不離者畏寒末能親造堂隅亮恕亮恕七敢問痔毒近何如大凡魔障之來已非一日其去也亦非一日及其既去計其復來亦非一日吾不為子憂今日之去而憂異日之來若然當移今日之心以處去後之日則痔不足慮矣前書云云毋乃憂之過乎不然何以擬其倫程山痔漏至二十孔以上不聞設戒所謂國大而忘戰也今子之痔所腫痛凸出此痔之常因是不堪而警戒猛省為福豈有量哉即日增減之狀希示及為慰外龍尚伊留小冊在坦令作字已胡塗數字不能傳至烏鎮二君厚甚問聞不少敢煩致之八昨會孔樂不在麟在風日客因暢懐自成懽耳當是見花見月凡春秋日誠一圖之何必索取宫諭之帶然後快耶髙麗紙亦欲化去難保也才子如虹之氣麟衰颯久矣與有竹强誇鮑老當筵耳昨又以過飲致搆寒虐蓋罔念作狂更將奚尤病榻閱邸報荷觀英主名將命徳討罪一段新竒號令宛然截瘧良方也望日麟似可郤枕幸一過我披輯邸報次第講論以開鄙懐感甚感甚子明事正自難復何以復之所貽書燈其光有限制類匡衡之璧専照一書類孫康之雪若減十年當夜夜坐其下也感仰此器興味不淺與張石川十九首奉到教帖因締思之閣下本文獻邦中巍然文獻家蔚然文獻身計自中嵗在國涵濡文獻已光吳中知閣下四體百骸九竅無一不文麟想宿世有縁之骨乃辱久存是以純文被洽生死得所大幸大幸今觀所奉諸文雖醖釀多端其宣布則自川老結知以來漸露漸愽至於融液浚翁開其端川老揚其波衡翁諸翁横其瀾老頭皮不孔不墨一箇古恠狂人强名曰善遭逢諸善類得之也百世之下將謂真有若人豈不可憂以川老任此公議必盡力扶持終惠可耳不然天下病之若教而不變先生法語巽語具在又知不率則皇天降罰於時繹思將或不能自棄亦不敢自絶於天日乾夕惕庶幾省訓堂下友也恐懼之狀何可云喻古沖文得龍池書周旦桓圭衮裳也雖魯公家廟碑何以加諸想一代盛時均有此名世之業獨厠名其中若天下慕之是以不得公權之書當世少之麟見龍池書而不見此書幾成子都之眇歸當造請曰川老金針撥轉瞳人矣學顔者無慮數百家何嘗到此幸甚幸甚已借得脚力不復可留只道得文獻大凡三星良金見今得力一碑巍然所助不小萬感萬感二仰惟先生素愛已深入麟之膚裏發諸藻雅若草木受氣於根而以秀以實於今至鶴夀之來鹿門諸項處分極矣不能名狀惟時祝千嵗願先生為夀域中第一人也忽忽嵗暮仰計華誕不逺跛人抱膝未獲堂拜㑹周甥以其母之故至此玉潤不減襄敏可以代僕託其造請麟已拜渠渠必能拜公千嵗千嵗千千嵗麟已遙祝薄儀馳獻伏冀鑒存外平山真筆一軸隨上世茍無仙則已有則風神固應如此望其昂藏飄髯徤步彷彿石川但不冠忠靖且亦書有小詩非慶夀家法不文而真朴有如此圖幸以知已别作一項區處庶木訥之士有措足之地也三先生髙才仙蹤汗漫豈以户庭小水為念今厄之瑤池弱水豈必真在海東漢人告其君曰乗轎謂非忠愛不可也麟識不逮古先生盛逰敢一出息今聞變諜諜祗令社中責公取友之無法且仍前不敢出息第玉體内驚外躓有可憂耳公昔却癭方之脫屣傾檣斷檝則楸枰之有鴻鵠豈真能動公之心益公之智列子之風周王之駿不宜馭以為常念之念之伏計震驚已久麟省候不至不逮門下結草諸臣多矣可慙可罪况也無戎麟復何言今過呉門正當趨謁請荆又不獲盡蓋安仁丘隴亦疾風震雷之驚此行亦抵自救久當盡得鄙情今不克告麟有一言此後事在得已望有出從橋無任拳拳麟更有一戲談蘭亭不以贈友或為蛟龍所得麟之於彼孰親不能不辨即有副本脫或見詒亦不敢拜前車之戒麟敢蹈耶一笑一笑辱示和古諸作竒氣駿發犯濤之力屠龍之手觸之愈壯不可以駑骨視騏驥也客有自閩中來造古沖太宰第道彼有事文不可得公之雅文已到感激感激銘於赤肉團中墓道禮成一併叩首四承教種種騶虞細孫所荷尤多徳澤汪濊流於世世人羣罕有跛子何以圖報昔書已言實未一踐不幾于漫乎大都厚施沛然河注一來澗滿再分池溢量狹氣短者圖之不得今致箬溪雄詞語甚覈軸甚侈與石川之作又益以趙岳諸家照耀小堂五星聚明也山丘一圖詞翰古雅風度清真文光觸天半面中存不記圖像出誰氏之筆其黄生乎何當何當川君聞人録及庸愚常百方區畫傳示浚川之文已得即欲轉之古沖風動鹿門有作又曰併寄若草木因風以聲其聲相振動不可窮矣洋洋乎渢渢乎豈一處耶浮沈離合極於生死可謂備矣天生君子人倫藥物麟獨瞑眩其中何當何當誼分須直造省訓堂下千百叩首惜右足未平左足又作奄奄之息僅可待浚川之銘上石親齎即往衆泉百千癡瘴懸於知己之手不卜何時得與判伯楚東所刻公典喬篆併合亦呉興盛事錢虜所未覩也只騶虞之徒能敬承否承否有命川公之施又何如流會委于海有徳如海報益難矣苐貧子說金分文不曾到手適友人寄牡丹詩云自信紅粧好其如白髮何川君念之五鶴來奉示何詳生人老病耳此示盡之有出於四事之外者履述一篇衮褒肉骨夐出常情方仕途匆匆所識若半天下今不食之果幾何元氣攸在懿行不羣夫子行之珍重珍重初槀已付本公遂有寛限之請意者秋以為期若然想應未殂吾事濟矣夫子為圖不朽若投嘉種於地后稷配天不在克商之豐務本者感當何如况峴山之㑹自君作之何如又惟衣被朽夫皆呉淞絶品不特山蠶縐紗如此功徳如此施予膏同湛露廣若滄溟弱草纎鱗麟也夭焉游焉耳矣以善養人今世無聞石川有焉極感極感求之人事在四方之外也麟也兩足蹌踉兩社未出石川之徳未報浚川之誌已到曰病曰死曰苦在麟一身玉峰懸弧之吉乃援衡山之例而我上下八袠生且老乎諺云油煠青魚破了膽自家有苦只自煎也一笑一笑麟苦報君之難耳足疾次之古沖太宰作文事有南平吏詣湖州府二守伍魯齋處來問履述而無書必待於似樓而得於私淑伍則以為真傳腆儀並下索履述甚亟想執事大篇已往而乃復有此意者伍伯垂念之過遂紛紛耳嗟乎稿苗不厭多雨苐湖人憂澇有望月之喘也知之知之伍吏去五日而鶴至想古沖不忘面授之真夏中未可得文當太白于三三六六之間吾事其有秋乎附上浚川先生誌銘伏惟垂覽六麟平望别來仰而思之公心何厚麟報何疎能詳癸丑一嵗即可盡百年公案麟沐浴甘雨舉世莫知知麟苦寒則示之以深隱之豹至於喜雪則遺以可嚙之氊區區懐之有生之年喫著不盡也一扇清風使人魂返故鄉豈真饑寒之中骨哉匪麟有是心拙妻亦有是言垂鑒庖丁出先大夫之臣似樓舟中更享其所和之味竒甚竒甚苐大賔在前咀嚼不暇味有不盡黿鼎僅一染指歸有餘憾麟有乳羊而不獲烹不逮峴山多矣藥物一申足慰愛才之志君子豈真以飲食為輕重哉來示云云甚得道理公能于馳驟之際雅中和鸞之節王良未必能如深服深服畫冊精絶不凡使予塗抹可惜若兩徵車又奉宣無法俱損雅志似樓公得之必曰張銀臺老矣何以災此竒物麟直愚而已矣因命作書頗不愜追思衡翁嘗以祝枝山數字見投似亦勸麟進步今思之已若夢中煩盛使為訪求他日有命當一二似老馬思奮直一笑耳春江畫册遣行煩鼎言謝曰明良在上無凍餒之老矣况食天曹之玉屑攜似樓之佛手雖王母蟠桃漢皇仙掌未足喻也八十本非竒夀此後或加日月端由君子同有是味者想同有是謝幸勿見遺七嗟乎區宇本大禍生則小人道本强不修則弱北敵之患東南何與今日倭冦與北敵何異人老計策可笑由是財賦之鄉化為戎馬不知何地化為財賦今倭有轉箭之驚將無徵兵之理况沴氣相召穿窬作於比隣縱横生於俎豆是則患在几席之下皆北敵南倭之餘毒也敢問公等罷兵息民當是何時石川入贊廟謨揮戈挽日固未可必辟地辟色古亦有東海之濵北海之濵聖人居之踰河蹈海或為廡下之舂或就歩兵之酒逺而桃源近而醉鄉皆商山之類也此則人人可學坐而待亡所謂遊人莫逐呉宫燕呉宫火發焚爾窠善類為朋更相勸此其時也危邦不入亂邦不居豈亦權謀術數之鄙却走馬以糞天下未有日也出位之言不名八仰惟君心何厚初東夷犯順無州不到君州鄰近若憂家之徒進謀總統退飭墉宇日無暇時世家如此郡邑亦寧乃灑然若無方以區區上塚為念問遺既周面示尤切至損詩酒之資以壯行李計别後當坐對空樽日嚼杞菊豈不自苦奈何天復苦之毁傷屋廬爰及琴書毋乃闊略之甚納言不霑君禄久矣今又若此已若無家豈無厚禄故人或知之當一處也苐孝先之腹便便萬巻固自苦耳天乎天乎大任未降空乏先至比來播遷筋骨心志煩頓可知方聞變之初謂崑有巖城正恃先生知我我可以宗而主之髙松在前女蘿施之豈料桃蟲拚飛百城振動麟歸至金衢驚勢湍飛士人行者皆舎舟策馬有家累者皆舎館待定麟以㷀㷀琴劒車輕路熟不吟不眺身在暑前災危得免只到家惡緒紛紛此耳鳴腹痛只可自知不足以黷此中治送終之事坐以待盡入秋體力差可又復謀生乃専人馳候因黄子得見風雅之刻厚心忘已何以為喻黄曰石川老先生處困而亨吳中衣冠企慕風神超逸社中諸賢皆不逮也麟乃曰丈夫不淫不屈不移此公可謂兼有之矣麟陽山風濤之變有以知之惟其定耳近來啟處何如行窩何安仙眷郎君非僦居可廣及門之客幾人想揮毫吟灑不讓杜陵歌叟庖丁能無改乎想勝事固多不如意者亦有汝明曰滿城追崇如雲如水老先生如神如佛不知飯顆山頭亦能消滅蒼耳藂中豈無勾惹㣲服不如佩玉理也麟心懸懸麟於此當東而西亦運數使然今名臣開府百司生氣大綱大明沴毒全消獻功奏凱以舒主憂君等秉筆書勳以酬大業劬勞安宅只旦夕耳麟以老骨出逺自危自恐生意無多常夢夢也此中友楝塘於石川甚勤以為區區如侍左右麟粗復不詳楝塘不解得真耗可復之天目山人非草草者楝塘文物僅有一樓亦厄於火諸不上樓者猶存淵明遇火今和陶之作墨色尚新傷於虎也何君子之多難耶想文明氣象宜爾近石菴宫保亦遭鄰火公拜之風返百物無恙只此當永光社長靈光巍巍不可頌耶麟何以諜諜憂切思長不覺覼縷又思先生一航常似米家如蘭亭護持者尚多汝明載曰坦中風雅當如煨燼之餘亦可以例推感石川不事家人生理僅有此樂用切拳拳恐悅生之興少損為先生不樂者累日陳禮並同雖然人物之妙實存乎人至於玉體者監識百靈之主可置一嘆於其間耶况八萬蠻箋到笥天趣出諸手中豈若他人託形影於糟粕之餘世澤汗牛敢附一問九鶴夀持種種文教義聲感感正義未詳私懐憤發輒一披露麟辱交盡一世文儒無慮千百蓋上下七十餘年乃得納言一人心有隱憂每每欲言中止者無數僕之上世自南陽奉公家監鎮興安宋開寳八年迄今嘉靖戊午世自千三千九厯常衡權度春夏艶桂振一字一行凡九傳族人在安仁烟以千計一烟奚啻一人吾蔭常五公位下僅生一人傳之吾父不絶如綫比兒牖及序得孫十三嫡孫祼卿曾孫曰騶虞辱奉百字令以侈大之黄仲之繪圖製詞是也麟濫登八座今得年八十有五仰而思之何以得此於天哉厚幸厚幸難言嗟乎逝者已矣乃有夫子自同官以及同社綿綿延延上下垂三十餘年前後引之左石翼之過則抑之善則匡之疾瘥顛躓則扶持之無所不用其恩蓋窮古今而一見也麟何人斯而得此於今麟今血氣漸燼奉君惻惻有知豈直世道衰頽不以麟之不肖而委成大誼若此持公論者或曰君子之過不然者則曰彼姝者子何以畀之是則麟有罪焉已未在即君子察之善哉白沙陳先生之言此身乃一大皮囊色裹一塊骯髒骨肉麟以此較之光明洞達靈犀一㸃貴賤懸殊也夫子之杖夫子曳之曾子之簀曾子易之豈無所重歟古曰不死於婦人之手豈無義歟十麟得延年以石川之仁也只嘗遺我以詩詩曰八十七年住世新春即其時良苦良苦雖然或麟沗竊之過歟抑知已守約之妙歟恃愛一請寛限垂示佳篇小字精妙付之兒曹寳以傳家大字付之表正以張斯文之盛春分前後徯公一來終前約以衍來慶不可少也麟今日食似增肌肉似減以服天王補心丹而然或者市藥弗精合者偏重望吾契謀忠信之醫家合和一二斤救度梁孟敬老狂百嵗可得麟也踰梁敢忘今日之恩春得藥夏服之秋則生辰吉㐫若執事或有勝逰麟將謀之盧扁必開此闗幸執事憐之若勿藥得年相見一笑老𣆀彭祖人耳豈以梁孟敬為必可則耶不識張果老以為何如鶴童此來真若華亭仙客因其復命忉忉祈請不厭不惓以俟後教十一麟欽服大義自君之終慕也若移之於友久要不忘麟媿不如省訓堂上烏衣從君直到廬居若久要見之行事其梓堂乎惟斯二者今之君子所希逢也有文章納才俊逺聲利脫塵凡又皆出格麟恨不如檣上烏衣随君直窮牛女今年二社再下吾樓大書大作大餽又十倍平時鶴有衣鶻有容妻子霑恩並使不朽何戡何戡賤夫婦所自謀者則速貧速朽敢僭期如是之深長乎反而求之久要實源終慕根本盛大其誰知之麟也太倉一稊明牕一塵何足以知之收拾所施髙於天峰闊於五寖麟如折足之鼎觀者皆曰不祥麟亦莫知所處君能以朴約自待麟將宥密是圖所謂庶幾終譽鳥之將死其鳴若此惟一聴之今書云云别楮具答粘連啓端首柬所謂不忍遽違麟有甚焉中言五峰上逮玉峰竊有未然蓋丞負五峰也餘左簡端不盡十二一清谿堂佳勝豈必重陽客有狂者以菊開為真重陽請一移之第區區命落奔忙是日約菴夫人下世音至本至親又故里賢母以初一受弔今過期已久不安不安溧有髙賢繆南村者令終已葬此老孤介出羣南宫一薦即還不受一命不霑寸禄潔如圭璋宛然銀臺老臣但欠一野航耳矣死之日囊篋蕭蕭麟已為立一髙石題名然不敏于文公一麾毫數語可乎墓有宿草麟未一弔不安不安家碧橋隔橋有馬竹湖者光禄少卿守職逢怒賜杖而殂交親憐之訃至月餘同家有馬孟河吉士於麟拳拳交知不在天池超山之下麟中抱紛紛生老病死種種麟今如在淖泥一足拔一足又落本圖避夀諸公逗阻然燕峰則選鋒也納言則無適不然遂不可脫豈盡一嵗皆生辰乎人曰得年之幸麟曰與死為鄰一笑一笑一諭及衡山五湖則川君所同本春社即思叩頭只淖泥不可出耳即到清谿豈待招號然一揖而退病死甚於生老不然則滅信犯義規者至矣念之念之十三麟今已宿清谿谿畔正不知川老何在能為一出否乏舟乏力乞假雇覓不能如身之使臂當東而西一程分作三程逗留迷程不與焉乃知仙舟之妙匪獨公之髙朗信義過我也専人馳請不一一生麟頓首石川老納言先生門侍只以古沖一喜心緒一亂彼此先聲約信津梁逺近非主管名勝之神鮮不滯左林下與通顯相接甚難惟公注意十四拏舟特造一終鶴壽之約比至則行窩主者入杭賴春洲禪師典却袈娑不鐘而飯不甚寂寥以内外有變不能恭候而去留一二小物在中即横塘家召工計刀尺之義惟川君垂亮怨君感君無限幽悰盡化為三枚兩謊取醉而去古沖之行相見非逺山門冒雨草草不備十五秋社上下情况寒露日柬上云云比至清谿與春洲擘蟹剥橘悵仰之私一柬付春洲和尚云云皆不再黷苐徘徊吳門為日頗久長年三老與官船不同襄敏之内難已寒而古沖之徵進漸迫吉㐫不容並行况親戚兒女相期日久客有能為雞鳴者則度闗而去彼中必少淹留五有堂前恐是會期也若古沖與川君有約不可以區區之故違左自毗陵至金淵不三四日而返麟必遵舊路而來正亳州奏凱淮海澄清之日釃酒臨江行者居者均承萬福與執事平望分攜趨歸刈秫造桑落之酒為八十一嵗之計公許之乎解纜閶門雖若悵往實有後圖伏惟照亮十六苕城覓舟翥鳳如彼跛鼈如此可笑可笑邑中長老聞川公之使即如公車之至過者紛紛拒之不敢甚嚴蓋小狐濡尾之象也短翮能脫蓬蒿十三日可奉接光霽也此非三艫脚船不可尚繫他人籬下嗟乎麟讀傳時方歎息殘生何由一見君子君子至止乃從事不敏私恨以為失禮公論以為負恩蓋蚓蟠泥中不能奮此升天翼也即時努力想人生會合有數其消息彼此全在川公至教温然春至固當敬趨况雷丞之言克謹王事孰謂老臣無狀不逮雷丞接浙就道謹順來㫖盛价畏容苦言先狀先狀謝過伏惟照察讀奉候沖公之作神爽飛動欲次韻未能今以聞召之語書上儻見大人亦昭此寸赤獨得罪社長吾無以自解者均惟憐察俚語上大作小註曰峴山云云今已辦乳羊家有舊醅可復共乎只恐十八國諸侯皆在峴山之山殊勝之寺非吾輩所有也一笑一笑十七春别以來聞動定並佳大慰大慰麟衰病聞警不堪兒輩燕雀處堂事多召亂難言也逺慮小記别楮頃執事有移家之勞又紀綱之臣駐劄在彼封疆之臣畢㑹旦夕咨詢必有四方之客鄴架法書名畫不得相親恐不獨陽山風浪之為祟也想髙懐吟詠不絶異時聖人省方采者得之曰詩史此外無良史矣但野航未得西來所謂孤舟盡日横也惜哉惜哉此際善人憔悴屬當隱避善嗇加餐自重自愛非復常談麟也醉飽耳矣周來得教當熟復不然放乎中流聴其所止而休焉周師慎言力行善業匪惟兒輩得師吾亦得友信如納言所云會乃翁致意已得古沖太宰文皆先生之力也行當録出以聞附告十八計自伏枕盲者放歌以迄於今麟聞今番秋社甚樂惜哉不與聞罪我者甚切麟不與者三如之何其不我疑嗟乎吾情如耳鳴安可使社中大老知之即今不安之狀無以自喻所恃者川君一人如一木之於顛厦如不可支則亦逃之若桃源可矣又不可得則無何有之鄉乎二者不知孰近又思區區明年八袠近可知也必如是可以無責於世君許之否乎麟罪人得公佳圖佳作又召示吾子徐生書云有深刻在彼雖未即拜領譬之渴者已入梅林齒津津其將下咽知恩知罪獨不知報謝其老馬反為駒乎其不澣之衣乎麟不能即逃將謀之浦海濱鄧梓堂儻能垂憐釋我於清涼之淵雖非無何有之鄉亦一社東之桃源也我之於川君猶夷吾之有鮑叔豈惟今少雖古亦不多幸勿以茍簡朽劣之失遽生疑貳麟在投杼之時維先生念之舊疾又作不甚害事然亦無好懐值襄敏人行匆匆諸不能備先一禳罪並一謝恩嗟乎自霅峰家蒼頭來奉覆舟諸作以至九月授衣可謂非久麟罪何言周人飯罷它不一一十九道逢鶴子川君之徳至矣盡矣即當放棹而來苐此出本以述職者例有一見持三日糧作計不逺髙照髙照嗟乎頻年慈惠珠玉盈箱一筆衮襃星河注室皆非尺楮所能云喻惟是登堂叩首少似承藉之法不即死滅不食此言幸容還山授衣與妻子一言一年生理亦殘喘所係非肆為遲緩以重取罪况華誕尚逺均在可寛鶴子告僕云云君子恩信如春陽播物豈尋常尺寸之仁哉只䃘䃘小人應接不暇君如湛露麟非豐草瓊珠下濺多狼籍耳北城擊柝月暗寒更新兼節制自宜奉之燒燈别鶴極草草不足宣布萬一惟有悚慴與陸北川計自秉節西行一嵗間三奉仙語示明誼重士夫進步者能左顧舊老或有之萬里一言足矣所以杜老曰安穩髙詹事也若今者有死生骨肉之誼稀承稀承仰惟鶴山之石升菴之䟦不謂頽齡繼見徳心藻範當與鶴山並永古人或輕富貴而不能輕此必有所重石渠天禄金谷銅駝加災於石非不振躍較之愚溪愚谷衡山湘水似有不同想心逺地偏造物所不靳者故幽人豪士得以騁其竒氣特有取焉不然禹書何以獨在鶴麓鶴麓非禹故迹乃自衡西澗谷中數弓之下疏剔磨洗而後得愽雅君子考古辨訛而後傳凡以隔人境其天全也閣下矜念衰窮固已私矣因使我古沖制作不類草木獨區區受賜也哉羅池廟碑韓文蘇書豈一賢所専力者麟何人斯濫承此美何幸何幸今天下之士豈無託名鴻筆如區區者百世之下豈無光怪竒崛以斯謀斯業酬君者傳竒之事自昔皆然苐遇不遇有幸不幸也惜乎言行膚淺不足以煩北川大儒是可憂也與陳楝塘麟也瞻戀難名或偶言之與内傷客感相值溷我本志匪肆則渙即有不似患不在固耳嘗與先生期一私晤卒不得請以麟為一物與先生格之已格而致其知誠者誠此正者正此至身而止計殘齡無多或曰後是可蓋前愆先生許之乎不得已而忘而愆猶之可也得已而忘而愆將不為君子之棄物乎自棄何言棄之不能以寸成物之仁豈不少損私晤非違公索隱以求異者良由區區受性偏頗又蔽錮拘滯或有四十九年之非居之不疑大可哀也今日髙明滿座誰與圖此可仰而哀者惟先生一人試舉其一安仁展掃是也人禮之恒胡為瑣屑江險道長人短考終命亦非細故方戰於理欲之間非先生誰與裁決昔者康山有疑質之多所判決麟有深銘是以今日懇懇仰祈晤語不寧展掃一事念之念之五月還山生理糾紛理之月餘未復即此亦能碍人考終過此料理終事比兒偶庭過問之曰蓋棺事託之何人兒不能對嗟乎吾志不行於國吾學不信於友吾法不行於家吾夫子曰予不得大葬予死於道路乎以是知夫子非游心於寂滅者麟今蠢然一物不能自格而乃上擬古哲不必楝塘始知其非曾家啓手啓足不可式乎逝者以正全歸生者以徳愛人吾事畢矣豈有友如先生而一終不我圖耶獨剰住月日不可前知潛窺大化諒亦無多今人動以衛武吕望許人劣妻子聞之遂以為真此等人前正好說夢第念麟之蠢蠢學孔不如陽明師友學老不如慧巖主臣蝺蝺寥寥莫有甚於此時鷹虎二旋青牛一駕又非麟所敢知者深惟剰住之業雖小而多有不矜之累徂落之節雖重而短人之命漸㣲不能無望於賢者治槨漆之未乾而金玉之音適至恩施種種一簀佳哉不華而筦此不易之簀也即納之所治之間當步拜乾坤正氣之門四顧尚有窒碍傷哉麟也不學無術守死罔傳善道罔功惟尊慈垂念卜一静宇聚以辨之學焉問焉其朝聞也乎簮筆謹書與張臨溪昔奉義範於新第方之郡前之居頗逺囂塵可愛只朽人匆匆不曾頻頻請教時有小悔幸箬谿在彼常得逺書又有佳惠計所聞見不減苕城以盛徳不泄邇不忘逺也喜足償悔珍重珍重今因顧使敬候起居冀惟寳嗇麟今七十有七苕城之晤滇南之書不知可奉幾迴古語曰逺書珍重何由達信難達也老人尤難升菴曰箬翁已遷幸臨溪獨在蓋記一脈於仁明公不憚煩教麟如箬是一箬也又恐榮擢在邇吾與楊子失望如何幸天書至日勞一徤走坐守楊家數日舊作新吟悉索見寄已登鐵筆者每種悉索副本蓋此中聒索於我者曰箬溪臨溪在彼我亦何辭麟素不以私干撓法家只此一病亮之示予諸件有小單開具粘連奉覆雖鄙瑣甚感荷也區區瞻戀之私不減楊子書何能悉與凌藻泉二首困憊嵗餘得手書播然振動魔祟為之退舎喜閣下澤行於邑而道成於家邑政得之士論徵諸道路家政得之勒文伏想楝溪先生敦仁藻雅昭升上下可大受而弗一小試含章永貞此仁人孝子之所不能處者勒文多矣閣下行之駿惠前修而廟有鼎彛不獨收著作之華勲也辱在切磋之下者豈以言語例論集窮得一小冊是溪長而深練如飛瀑湖月失其光而海風得其委敢以藍青俚說陳於賢喬梓之間哉力疾獵求頗盡巻帙掩巻病作作者一日初得而驚驚斯閱閱斯暢暢斯喜喜斯躍躍傷吾足足痛斯怨一心之㣲一日而氣候不齊吾病固宜也匪閣下大施設能奪吾氣吾氣先弱而重以故義新勲一寒一暑雖十年前亦未能勝也是父是子豈人人可跂及哉詳示腆惠皆奪於勒文失吾故步大罪大罪二病䰟讀二集日無餘力今晨少蘇再誦手教暢别已久前後無論嵗月形容常在千里追存闔闢回獲留放令人坐春臺中百物芸芸彼此暌業雪消雲斂真徤筆無雙豈獨黄丞相蘇學士軒輊有雄辨哉令人加災梨棗豈皆是物君既有此大美三釜三十鍾何足以為練溪有無哉孝徳已詳别楮茲因所示書又復瑣瑣皆愛才之心随得即興是以辭煩意復即刻又讀至凌溪父子璘珣輝映泫然淚下僕以今手書求公其管窺也乎豈惟昨病今日又病病不在足匪擗以慓而戚戚不已老心亦有時而跳乎此可與十九年不寐者言之也遂什襲而藏之枕簟烹茶襪履非凡聊以忱心而憂其真跳七十九嵗跳亦晩矣墨尚未試𤣥覽在茲安安將不在茲乎多謝多謝三見來使愿謹可念不異黔陽熊掌老人二十六年事可勝慨仰復蘆村孫氏麟也一拜粗展而髙堂百禮並加反身修省恐愧不已締觀有孫族屬之茂因承世徳建祠之義非源逺本深何以至此祖母一人下逮吾門變衰為吉真河潤九里也又聞祔食髙寢乃古昔仁孝之盛又里閈所無聞者麟垂死得之歸與孫曾言母家興禮如此麟八十不虚生也當銘於世世麟不即死更圖後會即今感仰恩徳豈一言所能宣與吳月山聞考最將北上雖榮行而勞擾也計貴任一考尚未有轉遷之者且京中故舊亦少似宜遲遲但執事之心決功名之際不敢多論想吉人自有天相登途保愛僕株坐溧城延師教子生理日㣲牖兒可學比前不同敢為至親告翰來論養生一事其𤣥關一竅中而已矣蓋人受天地之中以生故邵子云天向一中分造化合二合三合四以至無筭莫不皆然所論藥物全是只無火候終非至訣苐古人傳藥不傳火其候甚難歸根復命正是𦂳要去處妙在存想存者存吾神也性也想者想吾身也命也存則歸根想則復命存想不已内照光明心不動形都冺羣邪退聴於是藥得火行不運而動不煉而化然後一氣居神常伸於萬物之上未論飛升大道不逺日月恍兮惚兮其中若有所立亦不凢矣真如聖果予生淺見何足以知之綿綿若存惟翁留心下學至於上達必由心悟實所未到不誕與施吾菴日者晉拜草草然髙門上下内外雝雝秩秩曠十餘年而喜見真朽人之大幸也歸路充然豈特一日飲食恩義之厚哉且掌珠之慶曾不踰旬麟又於此際及門豈亦湯餅有分之人耶敢以區區壽年為郎君祝麟能勉强逾百不亦可乎一笑一笑貧窶無以為禮輒有金錢以為佩帶之物雖一鈎之㣲而長命富貴四字或多於萬金冀如所言為慶豈有量哉吉行與吾兒謀作長亭之會事切阿牖當百計追随不後如老朽之不盡於海濵也真切與李友竹四首聞送喪之鬬雄哉雄哉要得長興寜静須猛將一員打合包龍圖恊力治之大則調兵小則盡法黄小峰也不濟事阿狗言眼珠打出隨即放入亦不分意必有此等眼珠方稱此等手段溧陽蠻不足言也一笑一笑四山陳媽小浦翁北溪翁面上俱有掌痕佛惠面上並無一掌終是佛力䕶持今後只宜念佛二古云投桃報李翁遺我以李而今又有甜桃種種爛然盈筥雖方朔所偷未必過此勸翁圖之蓋真味真色西王母家空有名耳大嚼深感不自量輒有稷米數升漫往麟見吾夫子之祀必有黍稷又出后稷聖人所樹麟自勸工不在種桃之下倘少輟膏梁之味一煩見意若以桃李之門方之則大可笑耳多謝多謝三廣心堂蘭花盛開思與翁對坐啜茶風味不減野蔬亭下所少者肥鵞白麪適意處正不必事事相同況半鬚一來百年無事未卜歸皋丘開笑口董老五十造墳九十住世向後未必何如想天開壽域一例施行竹翁處二者之間真訣有聞幸以見教開懐痛飲毋負緑野堂中種花本意不拒幸幸四東原呉推府已從箬溪之子逰於地下矣竹翁振衣亭成能來振衣者幾人闗山八千風塵一柩極目愁雲滿旌酸雨謂人生朝露誠易乾也可傷可傷今後遇飲須當盡醉不宜代之以茶一笑與李養静日來有牽牛而過堂下者今執事賜肉不以其他得毋戒乎古人聞醢即覆所食醢魯醢非衞醢也以其似耳今吾不敢覆以尊者之賜也吾弟為作脯曰行人得牛邑人之災乎亦苦於解紛乎弟如射牛麟亦作脯而已一笑一笑足愈當拜未間惶恐與王槐雪黷擾仙丈固云有罪然滿闌秋色麟多取之而不為貪絶勝金蕉之賜謹謝雅愛更聞翁有不盡之情麟豈無不盡之意公勿真訝以為貪也然受用過度失我本來又非麟之福矣何如謝箬翁紗厨宴柬紗厨之惠西林先生雅致出格若止以金贈公不愛千金何有於此止以帛贈公沖素自如紈綺靡麗非其所尚又何有於此且金帛積亦能散為造物所忌昨見紗厨髙爽洞達非金非帛而意興逼人静可游息動可徜徉春宜遲日夏宜清風秋宜明月冬宜獸爐溪山相映卉木交暉倚檻㣲吟對景小酌雖居天壤逺囂絶塵紗厨主人誠為勝遇今日北邊告警烽火相望聖上祝禱以保社稷羣公夙夜屏息贊襄内事夏老居寵舉朝莫及而主人一旦震怒禍在不測使北騎秋髙未退邊圉未寧君臣之憂殆不可解而公方養静東山透出𤣥闗紗厨寄興莫可限量雖蓬島安期諸公亦止此矣地上行仙非公誰與耶更願時檢道經益究𤣥理調和七情櫛節五味多蓄名香遍植嘉卉鶴髮朱顔優游百嵗造物不忌大盜不取則西林先生之惠豈有紀極耶晨起有感謹此附謝清惠集巻十
