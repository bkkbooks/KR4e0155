body:
  text: 清惠集巻十一明劉麟撰雜著湖南崇雅社引南坦子曰社有小大我則未之前聞日用飲食䃘䃘小人惟立義以篤近將導和而完身逺之不達於邦國近之不及於凡民方之大道𦕈焉若塵皆窮栖無位者之所自好而聊以慰離索於同羣顧安能施愽舉逺敷宏一世而為仁雖固陋之可疾乃敬遜而獨存也甘泉呉子初作是會西溪龍子題諸首簡曰斯社之興將以舒恬曠之懐修契與之好達生委性悠然於順安之境而不自覺也又曰析義考文淑儀寡過相求夫麗澤之承者率藉於斯信斯言也立社為會不於其大而於其雅道固以切近精實為貴也况繼甘泉諸子之後而作士人在四方者為多又不過二三同志而為㑹斯亦可謂為社之小者若大宗之支裔别出曰小宗云正徳辛已孟夏初一日南坦居士劉麟記崇雅社約陳辭南坦子曰是會也因心以篤義合義以厚生漸摩引翼不言而化恒厥徳保厥終康於同好而日優游也四倫百行萬福之所從出敢不敬歟吾人於此將設例以要終乃陳辭而謹始其辭曰崇行檢弗求諸人重規勸必反諸已貞信是守而常變不渝雅素是敦而豐約有制疾病婚喪與凡患難非其所自取者力在可為必加常交一等踰厚者從之登臨取適撫事興懐藻翰相師篇章交會識有所到率意更訂善者必服亦不以藝為賢辭之所達如斯而已若義求其備則吕氏之藍田有約交欲寡尤則范子之座右有戒又或今昔異宜張弛同道二賢所論有未盡者願與諸君共損益之其交會之期儀節之詳以及吕約范戒具於後交期創斯社會者某某凡幾人嗣今以往有慕而入者不拒其來有背而去者不求其合惟是始㑹之人莫之敢廢會期每季為會者一春秋用仲月餘會用孟月皆以朔後一日為期主者先三日具書遍告同會會者即以來書位號下書知字還報主者有故許易期雖易不得過三日過則不赴者聽若會者有故不易也無故雖風雨必赴賓不再速以某嵗某月某日皆赴於太古居為會之始次某次某遂循環而成序儀節凡會之日俱及辰而集會主迎賔於大門之外揖讓入登如常儀始會則逐會交遞再拜分東西序立社長申説今日所以立社為會之義令衆皆曉暢又相向再拜以後止長揖賔坐上席南向主前席相向坐定會主舉曰今日某當勸某當規聽社長與衆從容諷言之又曰某事當舉行某事當止罷俟社長與衆量决若事在㑹主會主不舉社長舉之若事在社長社長不舉衆皆舉之或是日無言則已有頃則會主薦茶茶食菜菓人各限四器茶罷更衣縱觀庭中或步竹林莎徑遊覽少時會主先為席於中堂或池館園亭便適之所皆可饌用菜菓魚肉常品不尚豐竒始會即師雅意後會以始㑹為限踰者規之其山蔬野蔌雖多不限若琴玦圖書諸文房什器薰爐茗鼎壺矢觥籌凢可以娯賔不涉洼淫侈靡者亦不限如無亦不以為異㑹主視其完乃奉賔入始會則會主酌酒逐位獻酬湯饌之類皆然後㑹則會主酌酒置席上交揖如湯饌之類侍者供之飲啖随意不事勸酬至午後則離席散步弄流撫松摘花穿竹皆所不禁移時會主再奉賔入席或觴别所洗盞更酌一行再行㑹主求賓近作乃各出所有得竒文異義則共與賞析社長受而藏之率以為常酒再行或投壺或聮句或鳴琴爇香觀書啜茗不拘不肆劇談盡歡所不可犯者惟范公座戒而已主賔盡日乃罷各更衣升堂相向長揖送賔臨舟或臨輿三顧而别時或風雨或偶倦不安於行則宿於會主之家寢具皆自備以随取其便適從者皆不為飰以期不擾異日主會亦然損益藍田吕氏鄉約徳業相勸事親能孝事君能忠夫婦以禮兄弟以恩朋友以信能睦鄉隣能敬官長能為姻親與人恭遜持身清約容止莊重辭氣安和衣冠合度飲食中節凡此皆謂之徳見善必行聞過必改能教子弟能馭童僕能肅家政能擇交游能廣施惠能受寄託能救患難能導人為善能規人過失能為人謀事能為衆集事能解鬭争能决是非能興利除害愽聞强記疏通義理文詞醇正字法端楷啓札精研讀書治田至於六藝皆可為之外此俱為無益是之謂業右件徳業同社之人各自進修有末盡者會集之日交相勸勉過失相規犯義之過一曰行止踰違二曰輕肆誣毁三曰營私太甚犯約之過一曰徳業不相勸二曰過失不相規三曰禮俗不相交四曰患難不相恤不修之過一曰逰戲怠惰二曰動作無儀三曰臨事不恪四曰用度不節右件過失同社之士各自省察有未改者會集之日交相規戒禮俗相交一曰稱謂閒中稱人如對面然對面有不可者背後不以稱謂此雖細㣲最可觀徳亦以示後生二曰行輩遇同社父兄以事父兄之禮事之見其子弟以待子弟之禮待之至童僕亦然於此少存長厚風度通家之誼由此而篤不矜已以凌分不䧏顔以掠美有賢不肖者不在此限三曰燕飲有故前三日具啓或躬請或遣子弟童僕往請至日再速宿滌器皿辦蔬菓魚肉務令精潔不尚豐竒或吹笛鳴鼓不用粧戲喧譁雅澹禮飲成歡乃罷赴飲亦然但翌日遣謝燕集之日言動衣冠足示儀勸不恣飲啜自同常人同社有燕與會期相逼則併為之有不可併者另為之四曰慶弔同社有吉事則慶之有儀物有㓙事則弔之亦有賵賻豐縮之宜酌於社長有大喪初聞往哭之賵賻之外為經營及殯及葬皆往臨之餘喪則殺其禮若聞所知之喪逺不能往則遣使致奠在至親篤友則素服再拜哭而送之過期則不哭右件禮俗相交之事同社之士各宜遵行患難相恤一曰水火二曰盜賊三曰疾病四曰死喪五曰孤弱六曰誣枉七曰貧乏右件患難相恤之事社中有罹此者同社之士極力經營周給務令得所范益謙座右戒一不言朝廷利害邊報差除二不言州縣官員長短得失三不言衆人所作過惡四不言仕進官職趨時附勢五不言財利多少厭貧求富六不言淫媟戲慢評論女色七不言求覔人物干索酒食一人附書信不可開拆沈滯二與人並坐不可窺人私書三凡入人家不可看人文字四凡借人之物不可損壊不還五凡吃飲食不可揀擇去取六與人同處不可自擇便利凡此數事有犯之者足以見用意之不肖於存心修身大相有害南坦子曰嗟乎斯道之將忘也久矣甘泉始作而吾黨繼之一郡之内雅素同風不圖朽廢之人親逢古道於荒塗斷綆之餘也予又以松石郡公之意得兼逰兩社之間犬馬餘年嚴憚切磋相承在在昨非以覺來過以寡擇里處仁諧俗歸厚神之聴之終和且平為幸何如况追從之際衣冠秩秩而百禮不愆言笑魚魚而五内俱泰萃沖和於樽爼之間契神情於塵鞅之外委身循類卒與道同天畀康寧聿來多福將祗懼弗勝諸君庸可忽乎社成書其本末用存永久因贅數語著珍重不盡之意云示兒牖五首灸艾事甚竒膝以下非而翁所知所可知者上部快樂至於筆硯亦覺有興恐是痰濕下行而心自開朗也不然健啖之力夏月灸三里可作常年治例賴汝勇决成此念之不忘又甘㫖之貢精嘉喜甚寫去詩一首兒以為可以贈誰序不知此味面牆嘿嘿故一示汝能易為易數字亦相長也毋隱毋隱二爾書來一氣字佳一養字尚欠蓋氣所同也養所獨也子車子一篇云云全在養字之難耳豈以是書之亦不易耶細思爾字之未佳或以我之故使獻之在右軍前亦必失措何日飲爾巨觥數十乃伸楮老夫命駕李亭為之當自有不同者今且未暇待後横縮界方純用晉法為我書養氣一章吾將懐之直至蓋棺或以殉葬髙可一尺二三字如棗栗大筆鋒墨色並須留意勿忽三爾藥甚有應騐昨已平安大感爾之藥力不惟製造精嘉雖囊褁亦善所謂敬而文之以禮樂使人中夜捫而食之無疑真養生之物也甚慰所稟賊雖小去兵不可遽弛尤見盡心雖謀國之義亦不外此爾盡爾心爾食爾報當得好子如爾之事我附去醫書一部聊示喜謝之意四方循牆觀帖内云忽肚痛未知冷熱老身隨亦肚痛後又云大黄湯冷熱皆宜爾製黄連藥亦到受藥有如觀帖大可竒也今痛亦止若子者所謂雖小道必有可觀者焉以之事親則大道不逺矣大竒大慰爾其知之五於惟在昔人年七十曰老而傳又曰大夫七十致仕曰致仕者國政還於上曰傳者家政委於下生人至此無貴無賤並已休息豈惟在理宜然雖精力亦云不逮時止則止天之道也予今行年六十有八其去七十亦僅隔嵗適先君上僊之日言之不勝悲悼及此暇日遂作令圖置身安養以俟命期頤孰曰不可皇天眷佑予不敢知惟爾牖也愛親之良不學而能是役其懋承之耳順書十五條南坦子行年六十是年聖曰耳順世人或借以名年吾至是耳則減聽一日臨池又見面目老醜因思楊氏妹有云兄老甚幾不可認澘然淚落顧影之餘益感妹言豈有四十年僕僕風塵憂勞寵辱百變攖心而形神不敝者耶以耳敝先作順耳諸條一念耳癸巳九月二十夜半耳内如裂帛之聲中心震動天明漸改又如大雨之至三日乃止止而又作至今尚然吾將順之斷自甲午以後凡邸報升沉親交毁譽一切勿復以聞客有為牖者謝曰父耳亶不聰無復諜諜一求過孔曰朝聞道夕死可矣一息尚存不容懈也人已杖鄉過而不改更待何時自甲午以後過無大小屈已願聞如以過聞在長者則優禮之在下者則厚勞之一念􅑤祠堂未成是則麟有罪焉守小廉而貧曠大計而老吾死且無所於從租斂小舒即須辦此牖不竭心則牖之罪工力所須大小罔敢或後一念居家業紛張翁所自取老席不煖自貽伊戚期以年餘合而為一我總其凡牖治其目序能為牖亦分治之今雖未一而一之之機則决於此一念歸行年至此前路轉逼墓壙棺殮等事皆當及時營辦資才毋分公私人力毋分爾我人各自盡一念勞僕僕憂勞傷和伐性於汝安乎甲午以後審編均徭里甲理辦稅糧詞訟皆汝牖承之始事告曰某事將來牖將何處終事告曰某事已畢牖處若何翁毫末不動於中雖事事猶無事也時或有出牖為我處作粉版數面衣食紙筆蔬酪一應器數悉書於上臨行書填送覽䙝衣舊履記類責諸僕輩翁所理者道衣一匝圖書一盒亳末無求於世雖小出猶無出也一念動甲午嵗以後凡往必召鳳與牖商度而行可免者止之如不可免者汝等相之身不得相則使人相之夫登髙臨深應機處衆非老耋之所宜傷生取戾皆由於此一念闇人年至此聰明非舊人或掩之襲之能不汶汶自甲午嵗凡有稟白必詳必明或立方尺文簿量為畫界或有所為汝等書於下翁則判於上一念飲戕生喪儀何者非酒暮齡甘飲其禍尤烈近局邊桂二公之死不可鑒乎牖為我書初筵抑戒刪去中君國之辭置吾座右或臨燕執爵而諫吾當勉從古昔監史之法一以養徳一以厚生不在服勞之下一念養吾生平自奉甚薄今適老矣略加資助牖等自今佳果佳肴供辦自當加意此制雖悦我口實悦我心子非才誰與為此婦非賢誰則相汝此正古人甘㫖之義但勿傷多不能過宿者須及午前偶得時物雖一𤓰一蔬亦無不可一念攝老年氣血可知藥物在牖加意必躬必親務求美材翁辦其直炮煉㕮咀剉磨蓋藏爾母暨牖供之耳如周貞菴所謂固本膏少陽丹八珍丸滋陰丸蒼术膏随盡隨合不可暫缺卻病延年不在甘㫖之下一念謬老不知謬吾竊耻之本以簿領致位詩法文體漫無所得今來昏塞尤甚豈宜謬作自今或有誤相齒及者牖為我辭曰父羸質多火怔忡少寐醫云全要却思養血風燭㣲光牖不忍傷之禮弊弗留一念忿君子暴慢不逺則長厚日消今思寡過尚可忿耶且奴不畏刑刑之勞已損徳傷恩大不足觀今後人有違犯小者罷之大者録之累犯乃懲一委於牖必不得已然後一行吾意則期於無一鞭一笞自此不親一念躁人不畏罵吾逞吾躁而罵詈之譬之銜穢噴人人面未汚而吾舌吾唇已不佳矣今後絶口不出交上使下一惟莊敬行之不力牖則我規一念本牖年三十聴言觀行近理頗多但氣稟所拘疵累尚有自今勵行學道功名未卜徳義可求煌煌天爵不卿之卿吾願爾牖言必忠信行必篤敬明庭暗室無往不然生事未忘内本外末汝叔汝弟必感而相勸所謂施于有政若克伐怨欲銷除不盡老夫亦有况汝牖乎吾當與汝更相切磋猛省痛治使老朽嘉乃攸行怡悦夀康謂非道乎耳順之條一十有五此其最大故曰念本惟牖圖之字説凡人名字不可用天地日月山川之屬亦不可用一器一物若禽獸則尤不可靈如龍得非異類乎至金木水火土王諱有禁寧欲犯乎此外人事最佳者可也牖生長子在甲午嵗因命其乳名曰世同蓋牖生甲子與廣洋公同是以曰世同小字應甲名曰祼卿其旁從示今報第二子生在乙未嵗此子已有兄即教之敬兄乳名曰次恭次者不敢先其兄也恭者不敢慢其兄也此子信如吾名能恭其兄於兄之上又當何如小字曰應乙名曰祠卿其旁亦從示也已皆告之祠堂而行矣繼是而生者名皆從示曰禬曰祜曰齋曰祚曰禎曰祥曰祉不足再考再補然有卿字若序得子名皆從衣名雖相似㣲有一㸃不同曰衮曰襲曰裯曰襜曰衷曰裔曰褎不足再考再補亦皆有卿字坦上翁恐後來昏耋日至考撰或不能詳因書記之示牖華封人祝堯惟三爾何幸而得其二但庶之所加非易易者只我時見後人之生不知老之至矣且驚且喜喜劇而懼心生一春燈花不斷令人懼而又喜輾轉在懐吟成數語示爾藏之勿與俗人言也百凡寛和以導迎佳氣慎守慎守吟曰老將為異物唐人曰為異物死也外物乃相仍又曰子孫身外物也曾曾如燕鴈上曽曾我也下曽曾孫也相見幾人曾音層漏巵辯或曰漏巵奉水可塞耶麟曰化機無一息之停吾與巵非類巵不可塞吾可養也吾偶病瀕死及再生若奉盈巵數月以來百骸多復昔誠漏甚今日不然修持之法須性命兼舉若恬淡無為以養厥性又鍊氣化神有養而無害則精氣從之生生不息傳曰茍得其養無物不長吾將盡力以求之漏巵之説無乃畫地以自限者乎與心私謀曰各尊所聞各行所見自今伊始每日用間存省惟食少以寡事稱之血少以寡思稱之元神元氣失養以寡慾養之君子終日乾乾自强不息噫嘻富貴駭世與金張許史相頡頏者其加盈巵於九卵之上乎漏非所論麟更有憂焉嘉靖嵗甲辰南坦子記與窻友蔣子譚文奉命提督紫荆等闗駐節恒陽蔣子以擢内翰過余而言曰文質之論自古較之矣方今文盛而敝于史靡麗勝而實徳衰行將以棘子成之説進焉先生以為何如南坦子曰願聞其概蔣曰文之敝也始於文辭今之為文者類多騁其私智枝葉扶疎且皆誕妄吾欲俾制科經書文義毎篇不越二百字論表策毎篇各不越三百字抑其豔而韜其華毋得馳放以求騁此其一也次則檢束於等威儀飾之繁縟俾不得崇尚澆漓之習昔漢賈生謂民間賣僮繡衣絲履庶人婢妾白縠薄紈緁以黼繡天子后服富民大賈娼優下賤俱得飾之雖以文帝身衣皁綈導以恭儉而民俗尚不能崇雅黜浮今時不有然乎棘子成之髙論正今日所當崇奬者也南坦子作而嘆曰賈生挽俗之論固誠然矣吾聞之工已巧而民不足用者其悦在玩好農已勞而民苦饑者其悦在珍怪衣已製而民苦寒者其悦在文繡是以雕文刻鏤病傷農事錦繢纂組慮害女紅逐末之俗誠當釐之矣但文詞之阨欲使束縛而􅂒閼毋乃不可乎先儒文範叙小心文者欲其簡而切也曰放膽文者欲其宏而肆也蘇子曰孟韓之温醇遷固之雄剛孫呉之簡切投之所向無不如意固安得以字迹限之也竊恐此制行而焚書坑儒之厲階漸矣非盛世所樂聞也先儒謂棘子成矯當時之敝失之過而賜之論尚未恊於夫子彬彬之雅君何以棘之論為賢哉我國家承前代掃蕩之後右文之治尚未愜於古昔風雅之盛而何以遏之且文之用亦甚廣矣藉之以輔養徳義則重經筵紀載謨烈則隆國史祭饗郊廟則嚴祠祀播告寰宇則飭詔令獻替可否則備章疏所以格君心昭鑒戒感通神明宣布徳意别是非以不惑乎聖聰明予奪以求定乎國是若此者非文何以適于用也以至銓衡人物出納財賦申明典章修和禮樂陳師鞠旅明罰勅法若工虞振紀綱外而旬宣糾察於藩臬撫綏勞來於郡邑莫不各有當然之則與其已然之故必欲一一循理奉法敷陳於上訓諭於下粲然有文以相經緯而後行無不達孰非文之適於世用者哉方今聖天子誕膺景運蓋將丕闡人文以化成天下但當驅澆漓詭異之習以囘深厚淳古之風俾言行政事無偏無黨咸躋之正大光明之域者其右文之實効乎君其擇而進焉蔣子曰敬受命矣願先生書諸簡冊書李古沖傳後嗟乎麟何人斯遭斯文哉世際文明敢不慎厥履素獨執之不固勉之不力不敢自以為然君子有教敢不敬承雖然吾何求乎求其似耳吾之氣在吾骨吾之精魂允在斯文古昔張氏子平子得文於崔氏子玉子刻一於南陽又刻一於向後賢收録前聞得其半於南陽又得其半於向遂為完玉後千萬年知有平子以斯文也麟敢以世恩髙堂為南陽國邑輒書之其一將更圖其所謂向者異時吾充吾在史局將之列傳則又非國邑斷碑所可及也伏惟留意清惠集巻十一
