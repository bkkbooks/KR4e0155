body:
  text: 清惠集巻六明劉麟撰奏疏年久損壞軍器疏虞衡清吏司案呈奉本部送工科抄出兵仗局署局事内官監太監王竚等題據本局軍器庫管左副便楊鎭等呈稱本庫收放遽年聖駕㸔牲大祀天地四時享祭開齋等項御馬監官勇士并神機等營擺隊官軍領用盔甲頓項臂手鐵袴馬甲馬臉尾鏡鈴攀等件年久多有損壊不堪領用等因具呈到此臣等逐令經手人匠逐一打㸃中間如果損壊數多不堪披戴照得本局見今成造上用一應物件及修造擺隊盔甲𤓰刀等件并征進官軍領用軍火器械數多工程浩大查得前項損壊不堪軍器原係成化十八年節奉欽依本局差官前去南京兵仗局成造之數今經四十餘年竊照盔甲等件干係朝廷護衞防奸威儀重務比與别項器械不同若不預為奏請誠恐有誤領用闗係非輕合候命下之日本部另行具本照依成化年間事例成造式樣盔甲等件各一件副差委本局官員帶領經手官匠南京兵仗局督工照數如法儹造庶使軍器易得完備則官軍領用亦無有誤矣等因開坐題請奉聖㫖工部㸔了來説欽此欽遵抄出送司查得成化十八年八月中該兵仗局署局事尚衣監太監廖屏等題稱本局見在造盔甲𤓰刀等件並征進領用軍火器械工程浩大及照大祀天地并開齋等項御馬監勇士神機營官軍擺隊闗領盔甲等件年深損壊不堪披用及預備明鋼甲葉欲差長隨帶領經手匠作前去南京兵仗局提調造作合用物料行南京守備太監安寧等督同料計除該局見有及各庫衙門㑹闗外欠少物料著南京工部措辦并應天府上元縣等支給官錢兩平收買應用各色熟絲線絨等料南京内織染局織染做工人匠先儘本局見在如有不敷於南京内外衙門借撥造完該用木櫃繩扛鎻鑰雨罩本局造成馬快船隻軍夫南京兵部應付計開成造明鐵盔三千五百頂甲三千五百副青紵絲縧穿齊腰甲一千七百五十副青改機紬縧明鐵頓項臂手鐵褲各六千五百副馬甲馬臉尾鏡鈴攀各六千五百副明鋼甲葉五千副差去長隨副使等官葉深等四員官匠作頭張聰等一十四員名等因開坐題奉憲宗皇帝聖㫖是該衙門知道欽此欽遵抄出送司已經僃咨南京工部欽遵施行去後今該前因及查今次題造軍器比之成化十八年多造方手三千張撒袋三十副腰刀二千把衮刀一千把少明鋼甲葉五十副既不開有披執官軍數目亦無差官職姓名案呈到部臣等㸔得署兵仗局事太監王竚等題稱御馬監官勇士并神機營擺隊官軍領用盔甲頓項臂手鐵褲馬甲馬臉尾鏡鈴攀等件年久損壊要照成化年間事例成造式樣差官前去南京兵仗局修造一節為照前項盔甲等件係聖駕郊祀等項擺隊官軍領用器械今稱年久損壊相應成造但計所造軍器比之先年數多合用物料工程費用不貲南京各衙門庫藏見今未能充實若一槩派取於民誠恐見今各處災傷重大民有不堪况自成造以來經今四十餘年未加修飾臣等有以仰窺先朝惜財節用之意近因災異節奉綸音拳拳以修省為言又奉有欽依凡一應工役暫皆停止以此修造多在觀美審時度勢亦應少緩以待年豐况今一嵗將終方行南京計造明春大祀擺設已不及用合候命下之日本部行移兵伏局仍將收貯前項器械照舊應行候至四方無事累嵗豐登公私財力寛裕之日另行舉奏如不容已乞令該局從實揀選其中但可披執者雖欠鮮明亦就取用將奏擬之數量減三分之二使新舊相兼工料數少則公私易辦而民力少舒惟伏别有定奪均乞聖裁奏建節愼庫疏營繕清吏司案呈奉本部送准戸部咨嘉靖八年二月二十四日該司禮監太監張欽傳奉聖㫖朕惟天下財物不在民則在官取諸民以貯之官其取之也甚難則用之也豈可無節周易曰節以制度不傷財不害民孔子曰節用而愛人此帝王之明訓也今在外錢糧各有撫按等官督理查考嵗奏月報自可稽察奸弊在京惟太倉俱有成規其餘内外衙門各項錢糧因無官查理積弊多端且如後府柴炭銀兩及團營子粒銀該營官員收管之際多方掊剋比其支用漫無查考多有侵盗私用夫以軍民膏血之餘而徒為奸豪漁獵之資深可痛恨你戸兵工三部即便通行查議但係有錢糧衙門俱要差委科道官監收查理通行嵗報庻革奸弊以裕國用太僕寺常盈庫馬價銀兩但見奏請支用其見在收貯之數不見開報今後年終也著將舊管新收開除實在數目造册繳部具本奏知其餘未盡事宜你各部推廣此意具奏而行以稱朕節財恤民之意欽此欽遵照得本司與虞衡都水屯田共為四司正係在官錢糧衙門本部設立衙門之時盖有大庫一座䂓矩頗宏但無隔别㑹官監查之例其庫設在本部之後有部堂二重并大牆限隔别無中正大路前通加以堂司勢分懸殊非有重大事情各司不敢逕入解官解戸不赴前庫亦已年久但有收放俱是司庫司收候至開支亦是司官自放事雖簡便浮謗易生徃徃正官有缺各官稱疾不肻任事考察之際時論偶及無以自明因無查理以致如斯請官監查義意最善但路道不便相應計處欲將本部大庫量加修葺比照戸部太倉庫行移提督侍郎管理請差御史監查添設庫官庫吏並撥長守之卒立短廵之法量設聼事舖設限以收放之期定以查盤之法按季輪差郎中員外郎等官一員監管其事并照舊䂓輪帶都吏一名知數及辨驗銀色等因案呈到部臣等詳其所議不為無見隨即差人相度得本部本庫之北循鑾駕庫外牆而行正與東朝房一間相對查係兵馬司管住其房年久損漏可以改為門道庫官庫吏不必增添本部所屬皮作局其務甚簡可以改為庫官駕閣庫吏並匹料典吏其役不煩俱可改為庫吏原衙原役各仍其舊其收受也毎年三六九月曉告納户依期聼收止令本部行文該司轉送該庫查收出給庫收送司其於支也該司轉送並同定以每月一次或一季一次俱在毎月二十五日為常一年既周舊管新收開除實在聼本部提督侍郎公同造册具奏仍一二年一次隔别委官查盤積出附餘報官作正支銷其合用籍冊紙張書造工食冬季炭斤並公㑹筆炭許於此内公同支取若有虧折其原收原放官員身任其咎庫門並内外牆門責委虞衡司掌管仍赴堂驗封鎻鑰遇委官到庫禀堂方開或責令提督侍郎封收此法一行在部掌案者與庫藏無干而在庫收受者與徵派無别一官不到則鍵鐍不啟一工不至則支放不行本部本司本庫明立文簿一様三本司務㕔嚴加磨算務查有廵視典守親筆書判方纔准理分毫不明聼本部從實覺舉其循牆南北設立更舖各一於所屬地方武功中等三衛内選取軍人四名若輪班不敷聼於各該厰局㸔守又將本部廵更舊該官吏監生匠作均分一半在彼廵查每夜廵風司官報單具結以憑查考伏候命下之日量支官銀以為工食行取變賣尼僧庵房以為㕔舍將各項朝房一間改為門道空缺之處補築牆垣官吏行移吏部照前改設若有重大工役銀兩數多吏人書辦不前許於本部勘合科内臨期添撥應用收放銀料之日本部行移提督侍郎並管庫委官都察院行移該城御史查照施行其闗防有未盡者事宜聼臣等臨事損益另行具奏如此則利權隔别彼此綱維官吏分役互相覺察百年積弊一旦維新舉部臣工皆有忍渇廻車之義亦可以少禆皇上節財恤民之意於萬一矣原係傳奉及監收革弊事理未敢擅便題請㫖奉聖㫖工部四司俱有錢糧出納前此屬官賢否不一堂上官又不加嚴切查考所以浮謗易生覽卿所奏欲彼此闗防互相覺察深得率屬奉公之義修葺大庫開通道路改設官吏等項都依擬行仍聼本部侍郎一員督理就差該城御史監查務使衙門肅清浮議永息若有未盡事情還徑自損益施行應具奏者具奏定奪欽此欽遵外為照庫藏既立當揭額定名以垂久逺官吏既設當給印信以防奸弊且庫既在部堂之後鑾駕庫之西則腹背空虚前議於武功中三衛選取軍人各四名廵守恐有不敷相應添取又照本庫所貯本以奉國之公伏讀聖㫖有率屬奉公之諭欽承徳意似當名曰奉公之庫若求設庫本意不宜濫興工作以節為本又於收支之際不宜横取悖出以慎為上名為節慎意義亦通又惟一庫雖小而正名訂義非聖莫裁乞為上請等因案呈到部臣等㸔得本部大庫之名出於胥吏口傳未經奏立定名今既特設官員收放巻吏隔别必有闗防印信則庫收可徵若庫名未降則印信無憑鑄造况此庫一嵗之間月無虚日而出入浩繁動累千萬今該司奉舉呈前來相應依擬合候命下之日將本部大庫賜以定名上請轉行禮部照名鑄給印信一顆付與庫官收掌仍行武功中等三衛於餘丁内各選十名前來與原定軍人相兼防守如此則綱維始備名正法嚴而奸弊亦永絶矣緣係傳奉事理未敢擅便謹題請㫖奉聖㫖是庫名定為節慎欽此應詔陳言疏營繕清吏司案呈云云伏承明命下臨曷勝感激連日調集簿冊掲查得本部一應工役雜派皆由内府監局題奉欽依行之本部本部覆題行之天下良以内御尊嚴而綸音渙發或派徵未到那借已入二月之絲五月之糓率以為常於此每切痛心無從下手雖知民貧雜派當減而不知何物可減已知嵗凶工役當罷而不知何工可罷茍利因循積成深痼今日民不聊生臣等豈能辭責兹欲即分緩急亟議節省如大旱之得雲霓而一雨沛然豈不痛快但事闗監局頭緒頗多工役分任有似緩而實急者有似急而實緩者又有一工而緩急相半者推而至於雜派其勢亦然豈敢截然分别徑行節省為今之計莫若審度公私之力叅以沿革之宜求其成額量加減抑通行主典之人於供辦俵散之際各查緩急而自為減殺或謂衆輕易舉又令毎人毎事量加如此則緩急得宜而節省有漸事無窒得而公溥可行今有截然可急而不可緩者臣等先行開豁如悼靈皇后陵域之工惜薪司柴炭之派皆仍其舊已不敢妄煩天聼其内官監等監成造家火金箔鉛膠顔料羊毛牛皮麂皮松柁榆椵木等料軍器局等局成造盔甲旗牌筋鐵翎鰾等物雖係年例名數浩繁一一較量互有緩急冗瑣難分今年各該監局未曾題𣲖到部即有到者日亦未久不曾派行事尤可及乞勅下各該監局各遵徳意念此災傷生民不幸至於相啖工役雜派豈可拘泥常年合照成化𢎞治前年分適中之額為率於此審其急者量減三分之一至於緩者則許其減半又其最緩則停派一年二年若然賜減一分者民䝉一分之惠減其半者則民之受賜亦已半矣全與停罷者則民之䝉惠亦然所奏節省本意雖古先哲王恭儉之道未能盡然而天下生靈汔可小康再有不堪或令查奏未備如造酒家火掠馬索麻之類許令臨事稱停陸續釐正期在皇澤霑濡羣生溥洽使敷天之下咸知大聖人布徳同春而枯槁回生也如各該監局失於查照或喜事貪功或拘常習舊仍欲工繁派重以致皇上悞與准行許令本部覆題改正又不知遵許聼言官論劾必使上無虚文下霑實惠則庻幾乎古先哲王敬天勤民之業若斷然行之不疑有淪膚浹髓之妙雖神禹惡衣服卑宫室之盛何以加焉今將本部工役雜派并應停應減緣由開立前件具題一傳奉事修補恭讓章皇后景皇帝等陵墳前件臣等看得此工宜緩前項陵墳𤣥宫幽壙本自安固止為殿宇門墻觀美不備本部已嘗題請停工未䝉俞允後因冬寒比照悼靈皇后陵役停工之㫖具題方䝉賜允不過暫停節奉欽依又諭令待春和舉奏興工不許違悞欽此近該内官監手本到部催修為照悼靈皇后陵域工程煩費已甚官軍困苦亦久一工未畢即興一工似非今日恪謹天戒深惜民隱之意况值災傷重大不敢派徵小民伏乞聖明降㫖停罷將拆卸之處量加苫葢以待豐年一御馬監監承郭鑑題稱添蓋悼靈皇后果園菜園房屋共六十二間座前件臣等看得此工宜緩凡種木者求用於十年之後見今果木未有萌蘖而輒行蓋造房屋事誠可緩若謂栽種長飬及整理菜畦姑用牆垣遮䕶房屋之工伏乞聖明降㫖停罷待果木有成之日另議一織造局節差陜西南京蘇杭織造内臣四員前去監織前件臣等㸔得此工宜緩近因科道等官建議本部覆題奉有欽依將陜西織造太監梁玉取囬其未完者責付鎭守太監陸續織造又將此項銀兩動支以濟彼中之急臣等聞之陜西軍民以手加額歡呼震動今照南京蘇杭之處織造與陜西事體相同彼中亦有守備内臣可付况今日災害比初尤甚而各府正官尚且免其朝覲以撫人民其急可知二處織造内臣伏乞聖明許照陜西一例取囬未完者亦付彼中守備鎮守等官織解惟或盡行停止實足以昭陛下恭儉事天之實一針工局間年題𣲖成造年例内官長隨内使冬衣紵絲綾紬荒絲折熟絲綿共二萬八百九十七疋斤兩前件臣等㸔得此工緩急相半本部擅難分别其費算該京價六萬一千九百四十七兩二錢五分前項冬衣先年俱該㑹支各庫物料成造冬衣折散本色近來俱作會支奏討折銀遂為常例至今𣲖天下於贜罸銀兩支解縁各處庫藏空虚人民相食賑濟尚且不敷有何官銀可解以至全無解到本部那借别項料銀六萬之多豈能容易處補見今空乏將盡且既不成造本色則針線之物豈煩公辦伏乞聖明敕下司禮監清查各該俵散人員須照天順以前年分額數又於此内分别何者當急何者當緩將最急不可緩者查出實給若干員名念此災傷重大諭令題派量減三分之一豐年照舊其餘可緩者改令間年一俵悉於内庫㑹支本色其事故冐支者於法有碍不問災豐一體罷除俱候該監奏請定奪一内官監成造修理家火事𣲖出杉檀槐椵等木青緑顔料金銀錫箔油漆紙竹篾蒲稻草生熟鐵柴炭等料共三百二十三萬四千一百一十九根片箇斤兩張前件臣等㸔得此工緩急相半本部無從分别算該軍價銀一萬七千四百六十一兩三錢此外又有本色庫厰放支不在此數而派徵至於如此之多且嵗嵗造派豈無一半家火見存若能新舊相兼其料相應議減伏乞聖明敕令減半該監將不急之物暫免修造又查驗先年造辦家火係鐵錫竹木在有可用者許其相兼應用派行折半兌除一光禄寺每年題出修造供應噐皿天順年以前傳聞數少但巻案不存無憑查照成化十二年取用噐皿最多之日查有定數總一萬件本部成造七千南京成造三千合之共為萬件至𢎞治二年又准添造始至一萬二千本部造該八千四百件南京造該三千六百件近年以來常數之外又立預借名色嘉靖七年借過嘉靖八年者四千九百餘件毎年竹木油漆羅絹袱等項共七千七百三十四件合用杉板油漆金箔銀硃羅絹等料共六百六十六件合用銅鐵錫料共四萬五百三十七斤前件臣等㸔得此工難緩此料宜節算該京價共三萬六千七百九十四兩一錢六分為照前項器皿偹足如此數年之内豈宜盡壊縱有損失不過三四存者有六七可以攙修再進一萬二千之數不至缺失以為國患今又立預借之名任情浪費所謂取之無度用之無節者矣盖縁禁御之中難於㸃視飲膳所到逼近尊嚴食噐俱留者有之燒毁折裂者有之由是金硃布漆化為灰燼公侯監署得藏禁器生民膏血有限官府費耗無窮不可不為之處伏望聖明敕下光禄寺今後務加愛惜責令將用過舊器發出以備修補每年工作止造七十數盡即止如新者進十則舊者發七不然亦發五六次年造送之日除戧金器皿係常御俱新造進用外其餘光素硃紅者則新舊相兼亦可以節省一倍著為成例七十數滿不得預支仍着該司廵視御史按季㸃查具奏如此則國制不嫌簡略而小民供器有常數矣一司設監成造牀帳氊絨紗羅紵絲綾紬荒絲折熟絲棉毛皮柴炭松柁等料共七十八萬五千三百斤張根前件臣等看得此工宜緩算該京價一萬三千九十兩前項器物間年派造以嘉靖六年新造至七年乃成迄今未久豈必盡已腐壞縦有缺損亦不過十之一二即欲計料補修亦不過十之一二况先年存積末壊者頗多今値災傷伏乞聖明敕令免派一兵仗局坐派成造軍器水火炭石灰共一百四萬斤臣等看得此派難緩者但查有處補可免派徵除石炭四萬斤水火炭五十萬斤刑部贖罪囚犯内撥納外其水火炭五十萬斤毎年分派順天等府辦解仍該京價一千七百五十兩今各處災傷合儘數於刑部贖罪囚内撥補伏乞聖明敕令該局暫將今年免派豐年仍舊一巾㡌局為年例事坐派年例紗羅皮張等料共四十二萬四千四百七十一疋張斤截三分五兩二錢八分前件臣等㸔得此工緩急相半本部擅難分别其費算該京價八萬四千四百七十兩二分五釐巻查除與上年相同不開外其白硝麂皮比常多派一萬九千三百五張羊毛多三千斤水膠三百斤白生素平羅多一十七疋共多銀一萬一千五兩三錢伏乞聖明特敕司禮監官查出見今各用之處何者當急何者當緩當緩當急之處實該若干員名務照天順以前年分額數將應給之人諭以災重民貧各減三分之一料派所減分數亦同司禮監先行具實上請若近日多派麂皮羊毛平羅等物係妄增非舊不問災豐一例除革此項正徳十六年詔令㑹同查理先儘在庫本色不敷者將没官贜物俵折實憂派徵之重今未舉行反又加派似無紀極相應量減以便遵行或再寛年分以蘇民力一供用庫每年題派散木生熟鐵柴炭等料共六十五萬五千七百二十七根斤叚片箇前件臣等看得此工似不可緩但所派過多查得前料該京價銀四千四百八十六兩八錢其用不過為打造香油一事如板箱先年原計八百箇至嘉靖三年加造四百九十九箇實增大半又如生熟鐵器等件恐無年年盡廢之理而乃年年全辦縦有不堪舊廢殘缺尚堪折造年年有進無出其積必多伏乞聖明敕令該監從實查奏先將妄增板箱徑自革除柴炭等料念災三分減一生熟鐵器定以幾年一次行部新舊攙修一内官監修造浄車一百九十五輛前件臣看得此派宜減巻查修造浄車五年一次先年原議用銀二千二百五十兩派行府徵銀解部該監領銀自造至嘉靖六年又奏添銀五百兩為照修理浄車百十年來相乘之數奈何一二年間遽爾增銀五百伏望聖明敕下該監生止照舊額不必加派一修蓋倉厫事京通二倉毎年該修倉員外郎主事計派柁木等料共六十二萬九千五百八十根斤前件臣等看得此工難停此派可緩算該京價銀二千四百六十三兩七錢五分本色已將嘉靖八年物料共通行免派俱於舊管項下取用若有不敷即於軍辦數内取用俱照前免派候舊料用盡軍辦不足之日許行部議擬上請一明節省之要盖省節須計有無以為損益夫監局累世累年派解不絶如皮張絲線顔色等料不拘本色折色月轉嵗解積之内藏者不可勝數若不通行内外厰局盡行查出雖聖諭諄諄戒令節省然備臣等於此尤不勝拳拳之至嘉靖八年六月二十八日奉聖㫖是悼靈皇后陵域工程惜薪司柴炭派納金山陵墳俱照舊菓園菜園房屋罷其餘工程准待年豐舉行其應該減免定立年分派辦并成造器皿修理倉厫等都依擬行新派妄增之數查出改正明省節之要清緩急之源准議係内府監局的著司禮監㑹同該管衙門用心查理著實舉行欽此清惠集巻六
